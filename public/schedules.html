<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discount Schedules</title>
<script src="/navbar.js?v=2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
  #navbar-container { position: sticky; top: 0; z-index: 100; }
  .page { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .page-title { font-size: 22px; font-weight: 600; }
  .store-pills { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .store-pill { padding: 6px 16px; border: 1.5px solid #ddd; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; background: white; color: #555; transition: all .15s; white-space: nowrap; }
  .store-pill:hover { border-color: #2563eb; color: #2563eb; }
  .store-pill.active { background: #2563eb; color: white; border-color: #2563eb; }
  .btn { padding: 9px 18px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: #2563eb; color: white; }
  .btn-danger { background: #dc2626; color: white; }
  .btn-ghost { background: transparent; border: 1px solid #ddd; color: #444; }
  .btn-sm { padding: 5px 12px; font-size: 13px; }

  .empty { text-align: center; padding: 60px 20px; color: #888; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  .schedule-grid { display: grid; gap: 12px; }
  .schedule-card { background: white; border-radius: 12px; padding: 18px 20px; border: 1px solid #e5e7eb; display: flex; align-items: flex-start; gap: 16px; }
  .schedule-card:hover { border-color: #2563eb44; }
  .schedule-info { flex: 1; min-width: 0; }
  .schedule-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .schedule-meta { font-size: 13px; color: #666; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .schedule-meta span { display: flex; align-items: center; gap: 4px; }
  .schedule-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-scheduled { background: #dbeafe; color: #1d4ed8; }
  .badge-active   { background: #dcfce7; color: #16a34a; }
  .badge-expired  { background: #f3f4f6; color: #6b7280; }
  .badge-cancelled{ background: #fef2f2; color: #dc2626; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 16px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { font-size: 18px; font-weight: 600; }
  .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #888; padding: 4px 8px; }
  .modal-body { padding: 20px 24px; display: grid; gap: 16px; }
  .modal-footer { padding: 0 24px 20px; display: flex; gap: 10px; justify-content: flex-end; }

  .field { display: grid; gap: 6px; }
  .field label { font-size: 13px; font-weight: 500; color: #555; }
  .field input, .field select, .field textarea { padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; width: 100%; }
  .field input:focus, .field select:focus { outline: none; border-color: #2563eb; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .type-btns { display: flex; gap: 8px; }
  .type-btn { flex: 1; padding: 10px; border: 2px solid #e5e7eb; border-radius: 10px; background: white; cursor: pointer; font-size: 13px; font-weight: 500; text-align: center; transition: all .15s; }
  .type-btn.active { border-color: #2563eb; background: #eff6ff; color: #2563eb; }

  .target-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 20px; font-size: 13px; color: #1d4ed8; }
  .chip-remove { background: none; border: none; cursor: pointer; color: #6b7280; font-size: 16px; padding: 0; line-height: 1; }
  .chip-remove:hover { color: #dc2626; }
  .add-target-row { display: flex; gap: 8px; margin-top: 8px; }
  .add-target-row select, .add-target-row input { flex: 1; }
  .search-picker { position: relative; flex: 1; }
  .search-picker-input { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  .search-picker-input:focus { outline: none; border-color: #2563eb; }
  .search-list { display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: white; border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 6px 20px rgba(0,0,0,.12); max-height: 220px; overflow-y: auto; z-index: 500; }
  .search-list.open { display: block; }
  .search-list-item { padding: 10px 14px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #f5f5f5; }
  .search-list-item:last-child { border-bottom: none; }
  .search-list-item:hover { background: #eff6ff; color: #2563eb; }
  .search-list-empty { padding: 10px 14px; font-size: 13px; color: #aaa; font-style: italic; }

  .conflict-banner { background: #fef9c3; border: 1px solid #fde047; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #854d0e; }
  .conflict-banner strong { display: block; margin-bottom: 4px; }
  .toggle-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .time-inputs { display: flex; gap: 8px; align-items: center; }
  .time-inputs input[type="time"] { padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  .inline-label { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 400; cursor: pointer; white-space: nowrap; }
  .report-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }
  .report-table th { background: #f3f4f6; padding: 8px 10px; text-align: left; font-weight: 600; border-bottom: 1px solid #e5e7eb; }
  .report-table td { padding: 7px 10px; border-bottom: 1px solid #f3f4f6; }
  .report-table tr:last-child td { border-bottom: none; }
  .report-totals { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .report-stat { flex: 1; min-width: 100px; background: #f3f4f6; border-radius: 10px; padding: 12px 14px; }
  .report-stat-val { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
  .report-stat-lbl { font-size: 12px; color: #666; }

  @media (max-width: 600px) {
    .field-row { grid-template-columns: 1fr; }
    .schedule-card { flex-direction: column; }
  }
</style>
</head>
<body>
<div id="navbar-container"></div>
<div class="page">
  <div class="page-header">
    <h1 class="page-title">🏷️ Discount Schedules</h1>
    <button class="btn btn-primary" onclick="openCreateModal()">+ New Schedule</button>
  </div>
  <div class="store-pills" id="storePills" style="margin-bottom:20px"></div>

  <div id="scheduleGrid" class="schedule-grid">
    <div class="empty"><div class="empty-icon">🏷️</div><div>Select a store to view discount schedules</div></div>
  </div>
</div>

<!-- Create / Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">New Discount Schedule</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Schedule name</label>
        <input type="text" id="fName" placeholder="e.g. Summer Sale, Weekly Clearance">
      </div>

      <div class="field">
        <label>Discount type</label>
        <div class="type-btns">
          <button class="type-btn active" id="btnPercent" onclick="setDiscountType('percent')">% Percentage off</button>
          <button class="type-btn" id="btnFixed" onclick="setDiscountType('fixed')">$ Fixed amount off</button>
        </div>
      </div>

      <div class="field">
        <label id="valueLabel">Percentage off (e.g. 10 for 10%)</label>
        <input type="number" id="fValue" min="0.01" step="0.01" placeholder="10">
      </div>

      <div class="field-row">
        <div class="field">
          <label>Start date</label>
          <input type="date" id="fStart">
        </div>
        <div class="field">
          <label>End date</label>
          <div class="toggle-row">
            <input type="date" id="fEnd" style="flex:1">
            <label class="inline-label"><input type="checkbox" id="fIndefinite" onchange="toggleIndefinite()"> No end date</label>
          </div>
        </div>
      </div>

      <div class="field">
        <label>Time</label>
        <div class="toggle-row">
          <label class="inline-label"><input type="checkbox" id="fAllDay" checked onchange="toggleAllDay()"> All day</label>
          <div class="time-inputs" id="timeInputs" style="display:none">
            <input type="time" id="fStartTime">
            <span style="color:#888">to</span>
            <input type="time" id="fEndTime">
          </div>
        </div>
      </div>

      <div class="field">
        <label>Apply to</label>
        <div class="type-btns">
          <button class="type-btn active" id="btnCategory" onclick="setTargetType('category')">Category</button>
          <button class="type-btn" id="btnItemGroup" onclick="setTargetType('item_group')">Item Group</button>
          <button class="type-btn" id="btnItem" onclick="setTargetType('item')">Specific Items</button>
        </div>
      </div>

      <div class="field" id="targetPickerField">
        <label id="targetPickerLabel">Select categories</label>
        <div class="add-target-row">
          <div class="search-picker">
            <input type="text" class="search-picker-input" id="targetSearch" placeholder="Type to search..." autocomplete="off"
              oninput="filterPicker()" onfocus="filterPicker()">
            <div class="search-list" id="targetList"></div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="addTarget()">Add</button>
        </div>
        <div class="target-chips" id="targetChips"></div>
      </div>

      <div id="conflictBanner" style="display:none" class="conflict-banner">
        <strong>⚠️ Schedule conflict detected</strong>
        <span id="conflictDetails"></span>
        <div style="margin-top:8px">
          <button class="btn btn-ghost btn-sm" onclick="saveSchedule(true)">Save anyway</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSchedule(false)" id="saveBtn">Create Schedule</button>
    </div>
  </div>
</div>

<!-- Report Modal -->
<div class="modal-overlay" id="reportOverlay">
  <div class="modal" style="max-width:680px">
    <div class="modal-header">
      <h2 id="reportTitle">Sales Report</h2>
      <button class="modal-close" onclick="closeReport()">×</button>
    </div>
    <div class="modal-body" id="reportBody">
      <div style="text-align:center;padding:40px;color:#888">Loading...</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeReport()">Close</button>
    </div>
  </div>
</div>

<script>
const token = localStorage.getItem('token');
let stores = [], currentStoreId = null;
let discountType = 'percent', targetType = 'category';
let selectedTargets = []; // [{id, label}]
let allItems = [], allCategories = [], allGroups = [];
let editingId = null, _lastSchedules = [];

function toggleAllDay() {
  const allDay = document.getElementById('fAllDay').checked;
  document.getElementById('timeInputs').style.display = allDay ? 'none' : 'flex';
}

function toggleIndefinite() {
  const indef = document.getElementById('fIndefinite').checked;
  const fEnd = document.getElementById('fEnd');
  fEnd.disabled = indef;
  fEnd.style.opacity = indef ? '0.4' : '1';
  if (indef) fEnd.value = '';
}

async function api(path, opts = {}) {
  const res = await fetch(path, { headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' }, ...opts });
  return res.json();
}

async function init() {
  if (!token) { window.location.href = '/'; return; }
  const data = await api('/api/inventory/stores');
  stores = data.stores || [];

  const params = new URLSearchParams(location.search);
  const urlStore = params.get('store');
  const defaultStore = urlStore || (stores.length === 1 ? stores[0].id : null);

  const pills = document.getElementById('storePills');
  if (stores.length <= 1) {
    pills.style.display = 'none';
  } else {
    pills.innerHTML = stores.map(s =>
      `<button class="store-pill${s.id === defaultStore ? ' active' : ''}" onclick="selectStore('${s.id}', this)">${s.name}</button>`
    ).join('');
  }

  if (defaultStore) {
    currentStoreId = defaultStore;
    loadSchedules();
  }
}

function selectStore(storeId, btn) {
  document.querySelectorAll('#storePills .store-pill').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  currentStoreId = storeId;
  loadSchedules();
}

async function loadSchedules() {
  const grid = document.getElementById('scheduleGrid');
  if (!currentStoreId) { grid.innerHTML = '<div class="empty"><div class="empty-icon">🏷️</div><div>Select a store to view discount schedules</div></div>'; return; }

  grid.innerHTML = '<div style="padding:40px;text-align:center;color:#888">Loading...</div>';
  const [schedules] = await Promise.all([
    api(`/api/schedules?store_id=${currentStoreId}`),
    preloadInventoryData()
  ]);

  _lastSchedules = Array.isArray(schedules) ? schedules : [];
  if (!Array.isArray(schedules) || schedules.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🏷️</div><div>No discount schedules yet.<br><small>Create one to automatically apply discounts to Clover items on a date range.</small></div></div>';
    return;
  }

  grid.innerHTML = schedules.map(s => {
    const statusClass = `badge-${s.status}`;
    const typeLabel = s.discount_type === 'percent' ? `${s.discount_value}% off` : `$${Number(s.discount_value).toFixed(2)} off`;
    const targetLabel = s.target_type === 'category' ? 'Categories' : s.target_type === 'item_group' ? 'Item Groups' : 'Items';
    const targets = (s.target_ids || []).join(', ');
    const canEdit = s.status === 'scheduled';
    const canCancel = s.status === 'scheduled' || s.status === 'active';
    const safeName = s.name.replace(/'/g,"\\'");
    const dateLabel = s.indefinite
      ? `📅 ${s.start_date} → No end date`
      : `📅 ${s.start_date} → ${s.end_date}`;
    const timeLabel = (!s.start_time && !s.end_time)
      ? ''
      : `<span>🕐 ${(s.start_time||'').slice(0,5)} – ${(s.end_time||'').slice(0,5)}</span>`;
    return `
    <div class="schedule-card">
      <div class="schedule-info">
        <div class="schedule-name">${s.name}</div>
        <div class="schedule-meta">
          <span><span class="badge ${statusClass}">${s.status}</span></span>
          <span>🏷️ ${typeLabel}</span>
          <span>${dateLabel}</span>
          ${timeLabel}
          <span>🎯 ${targetLabel}: ${targets || '—'}</span>
          ${s.status === 'active' && s.applied_item_ids?.length ? `<span>✅ ${s.applied_item_ids.length} items on Clover</span>` : ''}
        </div>
      </div>
      <div class="schedule-actions">
        <button class="btn btn-ghost btn-sm" onclick="openReport('${s.id}')">📊 Report</button>
        ${canEdit ? `<button class="btn btn-ghost btn-sm" onclick="openEditSchedule('${s.id}')">Edit</button>` : ''}
        ${s.status === 'active' ? `<button class="btn btn-primary btn-sm" onclick="applyNow('${s.id}')">⚡ Apply Now</button>` : ''}
        ${canCancel ? `<button class="btn btn-ghost btn-sm" style="color:#d97706;border-color:#d97706" onclick="cancelSchedule('${s.id}','${safeName}')">Cancel</button>` : ''}
        <button class="btn btn-danger btn-sm" onclick="deleteSchedule('${s.id}','${safeName}')">Delete</button>
      </div>
    </div>`;
  }).join('');

}

async function preloadInventoryData() {
  if (!currentStoreId) return;
  const items = await api(`/api/inventory/items?store_id=${currentStoreId}`);
  allItems = items.items || items || [];
  const catSet = new Set(), groupSet = new Set();
  allItems.forEach(i => { if (i.category) catSet.add(i.category); if (i.group_name) groupSet.add(i.group_name); });
  allCategories = [...catSet].sort();
  allGroups = [...groupSet].sort();
}

function openCreateModal() {
  if (!currentStoreId) { alert('Select a store first'); return; }
  editingId = null;
  document.getElementById('modalTitle').textContent = 'New Discount Schedule';
  document.getElementById('saveBtn').textContent = 'Create Schedule';
  document.getElementById('fName').value = '';
  document.getElementById('fValue').value = '';
  document.getElementById('fStart').value = '';
  document.getElementById('fEnd').value = '';
  document.getElementById('fEnd').disabled = false;
  document.getElementById('fEnd').style.opacity = '1';
  document.getElementById('fIndefinite').checked = false;
  document.getElementById('fAllDay').checked = true;
  document.getElementById('fStartTime').value = '';
  document.getElementById('fEndTime').value = '';
  document.getElementById('timeInputs').style.display = 'none';
  document.getElementById('conflictBanner').style.display = 'none';
  selectedTargets = [];
  setDiscountType('percent');
  setTargetType('category');
  renderChips();
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function setDiscountType(type) {
  discountType = type;
  document.getElementById('btnPercent').classList.toggle('active', type === 'percent');
  document.getElementById('btnFixed').classList.toggle('active', type === 'fixed');
  document.getElementById('valueLabel').textContent = type === 'percent' ? 'Percentage off (e.g. 10 for 10%)' : 'Fixed amount off in dollars (e.g. 2.00)';
  document.getElementById('fValue').placeholder = type === 'percent' ? '10' : '2.00';
}

let pickerOptions = [], pickerVal = null, pickerLabel = null;

function setTargetType(type) {
  targetType = type;
  selectedTargets = [];
  pickerVal = null; pickerLabel = null;
  document.getElementById('btnCategory').classList.toggle('active', type === 'category');
  document.getElementById('btnItemGroup').classList.toggle('active', type === 'item_group');
  document.getElementById('btnItem').classList.toggle('active', type === 'item');
  document.getElementById('targetPickerLabel').textContent = type === 'category' ? 'Select categories' : type === 'item_group' ? 'Select item groups' : 'Select items';
  document.getElementById('targetSearch').value = '';
  document.getElementById('targetSearch').placeholder = type === 'category' ? 'Search categories...' : type === 'item_group' ? 'Search item groups...' : 'Search items...';
  document.getElementById('targetList').classList.remove('open');

  if (type === 'category') {
    pickerOptions = allCategories.map(c => ({ value: c, label: c }));
  } else if (type === 'item_group') {
    pickerOptions = allGroups.map(g => ({ value: g, label: g }));
  } else {
    pickerOptions = allItems.map(i => ({ value: i.id, label: (i.group_name ? i.group_name + ' · ' : '') + (i.variant_name || '') }));
  }
  renderChips();
}

function filterPicker() {
  const q = document.getElementById('targetSearch').value.toLowerCase().trim();
  const list = document.getElementById('targetList');
  const filtered = q ? pickerOptions.filter(o => o.label.toLowerCase().includes(q)) : pickerOptions.slice(0, 80);
  if (!filtered.length) {
    list.innerHTML = '<div class="search-list-empty">No matches found</div>';
  } else {
    list.innerHTML = filtered.slice(0, 80).map(o =>
      `<div class="search-list-item" onmousedown="selectPickerItem('${o.value.replace(/'/g,"\\'")}','${o.label.replace(/'/g,"\\'")}')">${o.label}</div>`
    ).join('');
  }
  list.classList.add('open');
}

function selectPickerItem(value, label) {
  pickerVal = value; pickerLabel = label;
  document.getElementById('targetSearch').value = label;
  document.getElementById('targetList').classList.remove('open');
}

function addTarget() {
  if (!pickerVal) return;
  if (selectedTargets.find(t => t.id === pickerVal)) { pickerVal = null; pickerLabel = null; document.getElementById('targetSearch').value = ''; return; }
  selectedTargets.push({ id: pickerVal, label: pickerLabel });
  pickerVal = null; pickerLabel = null;
  document.getElementById('targetSearch').value = '';
  document.getElementById('targetList').classList.remove('open');
  renderChips();
}

function removeTarget(id) {
  selectedTargets = selectedTargets.filter(t => t.id !== id);
  renderChips();
}

function renderChips() {
  document.getElementById('targetChips').innerHTML = selectedTargets.map(t =>
    `<div class="chip">${t.label}<button class="chip-remove" onclick="removeTarget('${t.id}')">×</button></div>`
  ).join('');
}

async function saveSchedule(force = false) {
  const name = document.getElementById('fName').value.trim();
  const value = parseFloat(document.getElementById('fValue').value);
  const start = document.getElementById('fStart').value;
  const indefinite = document.getElementById('fIndefinite').checked;
  const end = indefinite ? null : document.getElementById('fEnd').value;
  const allDay = document.getElementById('fAllDay').checked;
  const startTime = allDay ? null : document.getElementById('fStartTime').value || null;
  const endTime   = allDay ? null : document.getElementById('fEndTime').value   || null;

  if (!name || !value || !start || selectedTargets.length === 0) {
    alert('Please fill in all fields and add at least one target.');
    return;
  }
  if (!indefinite && !end) { alert('Enter an end date or check "No end date".'); return; }
  if (!indefinite && end < start) { alert('End date must be after start date.'); return; }

  document.getElementById('saveBtn').disabled = true;
  document.getElementById('saveBtn').textContent = 'Saving...';

  const payload = {
    store_id: currentStoreId,
    name,
    discount_type: discountType,
    discount_value: value,
    start_date: start,
    end_date: end,
    indefinite,
    start_time: startTime,
    end_time: endTime,
    target_type: targetType,
    target_ids: selectedTargets.map(t => t.id),
    force
  };

  const url = editingId ? `/api/schedules/${editingId}` : '/api/schedules';
  const method = editingId ? 'PUT' : 'POST';
  const res = await fetch(url, {
    method,
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  const data = await res.json();

  document.getElementById('saveBtn').disabled = false;
  document.getElementById('saveBtn').textContent = editingId ? 'Save Changes' : 'Create Schedule';

  if (res.status === 409 && data.conflicts) {
    const details = data.conflicts.map(c => `"${c.schedule}" (${c.overlappingCount} item${c.overlappingCount !== 1 ? 's' : ''} overlap)`).join(', ');
    document.getElementById('conflictDetails').textContent = details;
    document.getElementById('conflictBanner').style.display = 'block';
    return;
  }

  if (!res.ok) { alert('Error: ' + (data.error || 'Unknown error')); return; }

  closeModal();
  loadSchedules();
}

function openEditSchedule(id) {
  const schedules = [...document.querySelectorAll('.schedule-card')];
  // Re-fetch from last loaded data — we need to store them
  const s = _lastSchedules?.find(x => x.id === id);
  if (!s) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Discount Schedule';
  document.getElementById('saveBtn').textContent = 'Save Changes';
  document.getElementById('fName').value = s.name;
  document.getElementById('fValue').value = s.discount_value;
  document.getElementById('fStart').value = s.start_date;
  // End date / indefinite
  document.getElementById('fIndefinite').checked = !!s.indefinite;
  document.getElementById('fEnd').value = s.indefinite ? '' : (s.end_date || '');
  document.getElementById('fEnd').disabled = !!s.indefinite;
  document.getElementById('fEnd').style.opacity = s.indefinite ? '0.4' : '1';
  // Time
  const hasTime = !!(s.start_time || s.end_time);
  document.getElementById('fAllDay').checked = !hasTime;
  document.getElementById('fStartTime').value = s.start_time ? s.start_time.slice(0,5) : '';
  document.getElementById('fEndTime').value = s.end_time ? s.end_time.slice(0,5) : '';
  document.getElementById('timeInputs').style.display = hasTime ? 'flex' : 'none';
  document.getElementById('conflictBanner').style.display = 'none';
  setDiscountType(s.discount_type);

  // Rebuild selectedTargets from stored data
  selectedTargets = (s.target_ids || []).map(id => ({ id, label: id }));
  setTargetType(s.target_type); // resets selectedTargets — set after
  selectedTargets = (s.target_ids || []).map(tid => {
    if (s.target_type === 'item') {
      const item = allItems.find(i => i.id === tid);
      return { id: tid, label: item ? (item.group_name ? item.group_name + ' · ' : '') + (item.variant_name || '') : tid };
    }
    return { id: tid, label: tid };
  });
  renderChips();
  document.getElementById('modalOverlay').classList.add('open');
}

async function applyNow(id) {
  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Applying...';
  const res = await fetch(`/api/schedules/${id}/apply`, { method: 'POST', headers: { Authorization: 'Bearer ' + token } });
  const data = await res.json();
  if (res.ok) {
    const count = data.applied?.length || 0;
    const errors = data.errors || [];
    const total = data.itemCount || 0;
    let msg = `✅ Applied to ${count}/${total} items on Clover.`;
    if (errors.length) msg += `\n\nFailed (${errors.length}):\n` + errors.slice(0, 5).join('\n');
    alert(msg);
    loadSchedules();
  } else {
    alert('Error: ' + (data.error || 'Failed'));
    btn.disabled = false; btn.textContent = '⚡ Apply Now';
  }
}

async function cancelSchedule(id, name) {
  if (!confirm(`Cancel the discount schedule "${name}"?\n\nIf it's currently active on Clover, prices will be restored to normal.`)) return;
  const res = await fetch(`/api/schedules/${id}/cancel`, { method: 'PUT', headers: { Authorization: 'Bearer ' + token } });
  if (res.ok) { loadSchedules(); } else { alert('Failed to cancel schedule'); }
}

async function deleteSchedule(id, name) {
  if (!confirm(`Permanently delete "${name}"?\n\nThis cannot be undone. If it's active on Clover, prices will be restored first.`)) return;
  const res = await fetch(`/api/schedules/${id}`, { method: 'DELETE', headers: { Authorization: 'Bearer ' + token } });
  if (res.ok) { loadSchedules(); } else { alert('Failed to delete schedule'); }
}

async function openReport(id) {
  document.getElementById('reportTitle').textContent = 'Sales Report';
  document.getElementById('reportBody').innerHTML = '<div style="text-align:center;padding:40px;color:#888">Loading...</div>';
  document.getElementById('reportOverlay').classList.add('open');

  const res = await fetch(`/api/schedules/${id}/report`, { headers: { Authorization: 'Bearer ' + token } });
  if (!res.ok) {
    document.getElementById('reportBody').innerHTML = '<div style="color:#dc2626;padding:20px">Failed to load report.</div>';
    return;
  }
  const data = await res.json();
  const s = data.schedule;
  const dateRange = s.indefinite ? `${s.start_date} → No end date` : `${s.start_date} → ${s.end_date}`;
  const discLabel = s.discount_type === 'percent' ? `${s.discount_value}% off` : `$${Number(s.discount_value).toFixed(2)} off`;

  document.getElementById('reportTitle').textContent = `📊 ${s.name}`;

  const rows = data.items.map(item => `
    <tr>
      <td>${item.name}</td>
      <td style="text-align:right">${item.units_sold}</td>
      <td style="text-align:right">$${item.orig_price.toFixed(2)}</td>
      <td style="text-align:right">$${item.sale_price.toFixed(2)}</td>
      <td style="text-align:right">$${item.revenue.toFixed(2)}</td>
      <td style="text-align:right;color:#dc2626">-$${item.discount_given.toFixed(2)}</td>
    </tr>`).join('');

  document.getElementById('reportBody').innerHTML = `
    <div style="font-size:13px;color:#666;margin-bottom:16px">
      <strong>${discLabel}</strong> &nbsp;·&nbsp; ${dateRange} &nbsp;·&nbsp;
      <span class="badge badge-${s.status}">${s.status}</span>
    </div>
    <div class="report-totals">
      <div class="report-stat"><div class="report-stat-val">${data.totals.units}</div><div class="report-stat-lbl">Units sold</div></div>
      <div class="report-stat"><div class="report-stat-val">$${data.totals.revenue.toFixed(2)}</div><div class="report-stat-lbl">Revenue (at sale price)</div></div>
      <div class="report-stat"><div class="report-stat-val" style="color:#dc2626">-$${data.totals.discount_given.toFixed(2)}</div><div class="report-stat-lbl">Discount given</div></div>
    </div>
    ${data.items.length === 0 ? '<div style="text-align:center;color:#888;padding:20px">No sales data found for this period.</div>' : `
    <div style="overflow-x:auto">
      <table class="report-table">
        <thead><tr>
          <th>Item</th><th style="text-align:right">Units</th>
          <th style="text-align:right">Reg. Price</th><th style="text-align:right">Sale Price</th>
          <th style="text-align:right">Revenue</th><th style="text-align:right">Discount</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`}
    <div style="font-size:11px;color:#aaa;margin-top:12px">Revenue and discount figures use sale pricing. Sales data pulled from transaction logs for the schedule date range.</div>`;
}

function closeReport() {
  document.getElementById('reportOverlay').classList.remove('open');
}

document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) closeModal(); });
document.getElementById('reportOverlay').addEventListener('click', e => { if (e.target === document.getElementById('reportOverlay')) closeReport(); });
document.addEventListener('click', e => { if (!e.target.closest('.search-picker')) document.querySelectorAll('.search-list').forEach(l => l.classList.remove('open')); });

init();
</script>
