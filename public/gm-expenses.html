<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Log</title>
<script src="/navbar.js?v=5"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
#navbar-container { position: sticky; top: 0; z-index: 100; }
.page { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.page-title { font-size: 22px; font-weight: 600; }
.btn { padding: 9px 18px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .15s; }
.btn:hover { opacity: .85; }
.btn-primary { background: #2563eb; color: white; }
.btn-danger { background: #dc2626; color: white; }
.btn-ghost { background: transparent; border: 1px solid #ddd; color: #444; }
.btn-sm { padding: 5px 12px; font-size: 13px; }

.filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
.filters input, .filters select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: white; }
.filters label { font-size: 13px; color: #555; font-weight: 500; }

/* Summary cards */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 24px; }
.summary-card { background: white; border-radius: 10px; border: 1px solid #e5e7eb; padding: 14px 16px; }
.summary-card .label { font-size: 12px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
.summary-card .value { font-size: 20px; font-weight: 700; color: #1a1a1a; }
.summary-card.total { border-color: #2563eb; }
.summary-card.total .value { color: #2563eb; }

/* Table */
.table-wrap { background: white; border-radius: 12px; border: 1px solid #e5e7eb; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th { background: #f9fafb; padding: 10px 14px; text-align: left; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: #6b7280; border-bottom: 1px solid #e5e7eb; }
td { padding: 12px 14px; font-size: 14px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafafa; }
.amount-cell { font-weight: 600; color: #dc2626; }

.category-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.cat-payroll { background: #dbeafe; color: #1d4ed8; }
.cat-rent { background: #fce7f3; color: #9d174d; }
.cat-utilities { background: #fef3c7; color: #92400e; }
.cat-marketing { background: #d1fae5; color: #065f46; }
.cat-supplies { background: #ede9fe; color: #5b21b6; }
.cat-maintenance { background: #ffedd5; color: #9a3412; }
.cat-misc { background: #f3f4f6; color: #374151; }
.store-pill { padding: 6px 16px; border: 1.5px solid #ddd; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; background: white; color: #555; transition: all .15s; white-space: nowrap; }
.store-pill:hover { border-color: #2563eb; color: #2563eb; }
.store-pill.active { background: #2563eb; color: white; border-color: #2563eb; }
.period-btn { padding: 7px 16px; border-radius: 8px; border: 1.5px solid #ddd; background: white; font-size: 13px; font-weight: 600; cursor: pointer; color: #555; transition: all .15s; }
.period-btn:hover { border-color: #2563eb; color: #2563eb; }
.period-btn.active { border-color: #2563eb; background: #2563eb; color: white; }

.receipt-link { font-size: 12px; color: #2563eb; text-decoration: none; }
.receipt-link:hover { text-decoration: underline; }
.empty { text-align: center; padding: 48px 20px; color: #888; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: 16px; width: 100%; max-width: 480px; }
.modal-header { padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between; }
.modal-header h2 { font-size: 18px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #888; }
.modal-body { padding: 20px 24px; display: grid; gap: 14px; }
.modal-footer { padding: 0 24px 20px; display: flex; gap: 10px; justify-content: flex-end; }
.field { display: grid; gap: 6px; }
.field label { font-size: 13px; font-weight: 500; color: #555; }
.field input, .field select, .field textarea { padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; width: 100%; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #2563eb; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.file-hint { font-size: 12px; color: #888; }
.recurring-toggle-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
.recurring-options { background: #f8faff; border: 1px solid #dbeafe; border-radius: 10px; padding: 12px 14px; display: grid; gap: 10px; margin-top: 4px; }
.recurring-badge { display: inline-block; font-size: 11px; background: #ede9fe; color: #5b21b6; padding: 2px 7px; border-radius: 20px; font-weight: 600; margin-left: 4px; }
.auto-badge { display: inline-block; font-size: 11px; background: #f0fdf4; color: #15803d; padding: 2px 7px; border-radius: 20px; font-weight: 600; margin-left: 4px; }
/* Toggle switch (reuse from settings) */
.sw { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
.sw input { opacity: 0; width: 0; height: 0; }
.sw-slider { position: absolute; cursor: pointer; inset: 0; background: #ddd; border-radius: 22px; transition: .2s; }
.sw-slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .2s; }
input:checked + .sw-slider { background: #2563eb; }
input:checked + .sw-slider:before { transform: translateX(18px); }
</style>
</head>
<body>
<div id="navbar-container"></div>
<div class="page">
  <div class="page-header">
    <h1 class="page-title">💼 Expense Log</h1>
    <button class="btn btn-primary" onclick="openAddModal()">+ Add Expense</button>
  </div>

  <!-- Controls card (P&L style) -->
  <div style="background:white;padding:16px;border-radius:12px;border:1px solid #e5e7eb;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:16px">
    <div>
      <div style="font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">Period</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="period-btn active" onclick="setPeriod('weekly',this)">Weekly</button>
        <button class="period-btn"        onclick="setPeriod('monthly',this)">Monthly</button>
        <button class="period-btn"        onclick="setPeriod('quarterly',this)">Quarterly</button>
        <button class="period-btn"        onclick="setPeriod('custom',this)">Custom</button>
      </div>
    </div>
    <div id="periodPickerWrap">
      <label id="periodPickerLabel" style="display:block;font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">Week of</label>
      <select id="weekDatePicker" style="padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:white;cursor:pointer" onchange="loadFromPicker()"></select>
    </div>
    <div id="monthPickerWrap" style="display:none">
      <label style="display:block;font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">Month</label>
      <input type="month" id="monthPicker" style="padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:white" onchange="loadFromPicker()">
    </div>
    <div id="quarterPickerWrap" style="display:none">
      <label style="display:block;font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">Quarter</label>
      <input type="text" id="quarterPicker" placeholder="e.g. 2026-Q2" style="padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:white;width:120px" onchange="loadFromPicker()">
    </div>
    <div id="customDateRow" style="display:none;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div><label style="display:block;font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">From</label><input type="date" id="filterStart" onchange="loadFromPicker()" style="padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:white"></div>
      <div><label style="display:block;font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">To</label><input type="date" id="filterEnd" onchange="loadFromPicker()" style="padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:white"></div>
    </div>
    <div>
      <label style="display:block;font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">Category</label>
      <select id="filterCat" onchange="render()" style="padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:white">
        <option value="">All categories</option>
        <option value="payroll">Payroll</option>
        <option value="rent">Rent</option>
        <option value="utilities">Utilities</option>
        <option value="marketing">Marketing</option>
        <option value="supplies">Supplies</option>
        <option value="maintenance">Maintenance</option>
        <option value="misc">Misc</option>
      </select>
    </div>
  </div>

  <div id="storeButtonsWrap" style="display:none;flex-wrap:wrap;gap:8px;margin-bottom:16px"></div>

  <div class="summary-grid" id="summaryGrid"></div>

  <div class="table-wrap">
    <table>
      <thead id="expenseHead"></thead>
      <tbody id="expenseBody">
        <tr><td colspan="7" class="empty">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Add Expense Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Add Expense</h2>
      <button class="modal-close" onclick="closeAddModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field">
          <label>Date</label>
          <input type="date" id="fDate">
        </div>
        <div class="field">
          <label>Amount ($)</label>
          <input type="number" id="fAmount" min="0" step="0.01" placeholder="0.00">
        </div>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="fCategory">
          <option value="">Select...</option>
          <option value="payroll">Payroll</option>
          <option value="rent">Rent</option>
          <option value="utilities">Utilities</option>
          <option value="marketing">Marketing</option>
          <option value="supplies">Supplies</option>
          <option value="maintenance">Maintenance</option>
          <option value="misc">Misc</option>
        </select>
      </div>
      <div class="field">
        <label>Description <small style="color:#888">(optional)</small></label>
        <input type="text" id="fDesc" placeholder="e.g. June payroll, electric bill...">
      </div>
      <div class="field">
        <label>Receipt / Invoice <small style="color:#888">(optional — PDF or image)</small></label>
        <input type="file" id="fReceipt" accept=".pdf,image/*">
        <span class="file-hint">Max 10MB · PDF, JPG, PNG</span>
      </div>
      <div class="field">
        <div class="recurring-toggle-row">
          <label class="sw">
            <input type="checkbox" id="fRecurring" onchange="toggleRecurring()">
            <span class="sw-slider"></span>
          </label>
          <span style="font-size:14px;font-weight:500;color:#333">Recurring expense</span>
        </div>
        <div class="recurring-options" id="recurringOptions" style="display:none">
          <div class="field">
            <label>Frequency</label>
            <select id="fRecurFreq" onchange="updateDayOptions()">
              <option value="monthly">Monthly</option>
              <option value="weekly">Weekly</option>
              <option value="yearly">Yearly</option>
            </select>
          </div>
          <div class="field">
            <label id="recurDayLabel">Day of month</label>
            <select id="fRecurDay"></select>
          </div>
          <div style="font-size:12px;color:#6b7280">🔄 This expense will be automatically added on the selected schedule.</div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveExpense()">Save Expense</button>
    </div>
  </div>
</div>

<script>
const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user') || '{}');
const isElevated = ['him', 'regional_manager', 'admin', 'owner'].includes(user.role);
let expenses = [];
let currentStoreId = '';  // '' = all stores
let currentPeriod = 'weekly';
let filterStart = '', filterEnd = '';

// Build thead dynamically so isElevated JS var can control columns
function buildHead() {
  document.getElementById('expenseHead').innerHTML = `<tr>
    <th>Date</th>
    ${isElevated ? '<th>Store</th>' : ''}
    <th>Category</th>
    <th>Description</th>
    <th>Amount</th>
    <th>Receipt</th>
    <th></th>
  </tr>`;
}

async function initStoreButtons() {
  if (!isElevated) return;
  const res = await fetch('/api/owner/stores', { headers: { Authorization: 'Bearer ' + token } });
  if (!res.ok) return;
  const stores = await res.json();
  const wrap = document.getElementById('storeButtonsWrap');
  wrap.style.display = 'flex';
  wrap.innerHTML = `
    <button class="store-pill active" onclick="setStore('', this)">All Stores</button>
    ${stores.map(s => `<button class="store-pill" onclick="setStore('${s.id}', this)">${s.name}</button>`).join('')}
  `;
}

function setStore(storeId, btn) {
  currentStoreId = storeId;
  document.querySelectorAll('.store-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  load();
}


function setPeriod(period, btn) {
  currentPeriod = period;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const todayStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;

  document.getElementById('periodPickerWrap').style.display  = 'none';
  document.getElementById('monthPickerWrap').style.display   = 'none';
  document.getElementById('quarterPickerWrap').style.display = 'none';
  document.getElementById('customDateRow').style.display     = 'none';

  if (period === 'weekly') {
    document.getElementById('periodPickerWrap').style.display = '';
    const picker = document.getElementById('weekDatePicker');
    if (!picker.value) picker.value = todayStr;
    const d = new Date(picker.value + 'T00:00:00');
    const day = d.getDay();
    const weekStart = new Date(d); weekStart.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
    const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
    filterStart = weekStart.toISOString().split('T')[0];
    filterEnd   = weekEnd.toISOString().split('T')[0];
  } else if (period === 'monthly') {
    document.getElementById('monthPickerWrap').style.display = '';
    const picker = document.getElementById('monthPicker');
    if (!picker.value) picker.value = `${now.getFullYear()}-${pad(now.getMonth()+1)}`;
    const [y, m] = picker.value.split('-');
    const lastDay = new Date(y, m, 0).getDate();
    filterStart = `${y}-${m}-01`;
    filterEnd   = `${y}-${m}-${pad(lastDay)}`;
  } else if (period === 'quarterly') {
    document.getElementById('quarterPickerWrap').style.display = '';
    const picker = document.getElementById('quarterPicker');
    if (!picker.value) { const q = Math.ceil((now.getMonth()+1)/3); picker.value = `${now.getFullYear()}-Q${q}`; }
    const match = picker.value.match(/(\d{4})-Q(\d)/);
    if (!match) return;
    const [, y, q] = match;
    const sm = (parseInt(q)-1)*3+1; const em = sm+2;
    filterStart = `${y}-${pad(sm)}-01`;
    filterEnd   = `${y}-${pad(em)}-${pad(new Date(y,em,0).getDate())}`;
  } else if (period === 'custom') {
    document.getElementById('customDateRow').style.display = 'flex';
    filterStart = document.getElementById('filterStart').value;
    filterEnd   = document.getElementById('filterEnd').value;
    if (!filterStart || !filterEnd) return;
  }

  document.getElementById('filterStart').value = filterStart;
  document.getElementById('filterEnd').value   = filterEnd;
  load();
}

function loadFromPicker() { setPeriod(currentPeriod, document.querySelector('.period-btn.active')); }

function applyPeriodDates(period) {
  const now = new Date();
  const fmt = d => d.toISOString().split('T')[0];
  let start, end = fmt(now);
  if (period === 'week') {
    const day = now.getDay(); // 0=Sun
    const weekStart = new Date(now); weekStart.setDate(now.getDate() - day);
    start = fmt(weekStart);
  } else if (period === 'month') {
    start = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
    const last = new Date(now.getFullYear(), now.getMonth()+1, 0);
    end = fmt(last);
  } else if (period === 'quarter') {
    const q = Math.floor(now.getMonth() / 3);
    const qStart = new Date(now.getFullYear(), q * 3, 1);
    const qEnd   = new Date(now.getFullYear(), q * 3 + 3, 0);
    start = fmt(qStart); end = fmt(qEnd);
  }
  document.getElementById('filterStart').value = start;
  document.getElementById('filterEnd').value   = end;
}

function buildWeekOptions(sel) {
  const now = new Date();
  const day = now.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const thisMonday = new Date(now); thisMonday.setDate(now.getDate() + diff); thisMonday.setHours(0,0,0,0);
  let html = '';
  for (let i = -4; i <= 52; i++) {
    const mon = new Date(thisMonday); mon.setDate(thisMonday.getDate() - i * 7);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    const val = mon.toISOString().split('T')[0];
    const label = mon.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'})
                + ' – ' + sun.toLocaleDateString('en-US', {month:'short',day:'numeric'});
    html += `<option value="${val}"${i === 0 ? ' selected' : ''}>${label}</option>`;
  }
  sel.innerHTML = html;
}

function setDefaultDates() {
  const sel = document.getElementById('weekDatePicker');
  if (sel.tagName === 'SELECT' && !sel.options.length) buildWeekOptions(sel);
  setPeriod('weekly', document.querySelector('.period-btn.active'));
}

async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { Authorization: 'Bearer ' + token, ...opts.headers },
    ...opts
  });
  return res;
}

async function load() {
  const start = document.getElementById('filterStart').value;
  const end = document.getElementById('filterEnd').value;
  let url = `/api/store-expenses?start=${start}&end=${end}`;
  if (currentStoreId) url += `&store_id=${currentStoreId}`;

  const res = await api(url);
  if (!res.ok) { expenses = []; render(); return; }
  expenses = await res.json();
  render();
}

function catClass(cat) {
  return `cat-${cat}`;
}

function catLabel(cat) {
  return cat.charAt(0).toUpperCase() + cat.slice(1);
}

function fmt(n) {
  return '$' + parseFloat(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function render() {
  const filterCat = document.getElementById('filterCat').value;
  const filtered = filterCat ? expenses.filter(e => e.category === filterCat) : expenses;

  // Summary cards
  const totals = {};
  let grand = 0;
  for (const e of expenses) {
    totals[e.category] = (totals[e.category] || 0) + parseFloat(e.amount);
    grand += parseFloat(e.amount);
  }
  const CATS = ['payroll','rent','utilities','marketing','supplies','maintenance','misc'];
  const summaryGrid = document.getElementById('summaryGrid');
  summaryGrid.innerHTML = `
    <div class="summary-card total">
      <div class="label">Total Expenses</div>
      <div class="value">${fmt(grand)}</div>
    </div>
    ${CATS.filter(c => totals[c]).map(c => `
    <div class="summary-card">
      <div class="label">${catLabel(c)}</div>
      <div class="value">${fmt(totals[c])}</div>
    </div>`).join('')}
  `;

  // Table
  const tbody = document.getElementById('expenseBody');
  if (!filtered.length) {
    const cols = isElevated ? 7 : 6;
    tbody.innerHTML = `<tr><td colspan="${cols}" class="empty">No expenses found for this period.</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(e => `
    <tr>
      <td>${e.expense_date}</td>
      ${isElevated ? `<td style="font-size:13px;color:#555;font-weight:500">${e.store_name || '—'}</td>` : ''}
      <td>
        <span class="category-badge ${catClass(e.category)}">${catLabel(e.category)}</span>
        ${e.is_recurring ? `<span class="recurring-badge">🔄 Recurring</span>` : ''}
        ${e.recur_source_id ? `<span class="auto-badge">auto</span>` : ''}
      </td>
      <td style="color:#555">${e.description || '—'}</td>
      <td class="amount-cell">${fmt(e.amount)}</td>
      <td>${e.receipt_url
        ? `<a class="receipt-link" href="${e.receipt_url}" target="_blank">📄 View</a>`
        : '<span style="color:#ccc;font-size:13px">—</span>'
      }</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteExpense('${e.id}')">Delete</button></td>
    </tr>
  `).join('');
}

function toggleRecurring() {
  const on = document.getElementById('fRecurring').checked;
  document.getElementById('recurringOptions').style.display = on ? 'grid' : 'none';
  if (on) updateDayOptions();
}

function updateDayOptions() {
  const freq = document.getElementById('fRecurFreq').value;
  const sel = document.getElementById('fRecurDay');
  const label = document.getElementById('recurDayLabel');

  if (freq === 'monthly' || freq === 'yearly') {
    label.textContent = 'Day of month';
    sel.innerHTML = Array.from({length: 28}, (_, i) =>
      `<option value="${i+1}">${i+1}${['st','nd','rd'][i] || 'th'}</option>`
    ).join('');
  } else if (freq === 'weekly') {
    label.textContent = 'Day of week';
    sel.innerHTML = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']
      .map((d, i) => `<option value="${i}">${d}</option>`).join('');
  }
}

function openAddModal() {
  document.getElementById('fAmount').value = '';
  document.getElementById('fCategory').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fReceipt').value = '';
  document.getElementById('fRecurring').checked = false;
  document.getElementById('recurringOptions').style.display = 'none';
  document.getElementById('fRecurFreq').value = 'monthly';
  updateDayOptions();
  document.getElementById('addModal').classList.add('open');
}
function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }

async function saveExpense() {
  const date = document.getElementById('fDate').value;
  const amount = document.getElementById('fAmount').value;
  const category = document.getElementById('fCategory').value;
  const description = document.getElementById('fDesc').value;
  const receiptFile = document.getElementById('fReceipt').files[0];

  if (!date || !amount || !category) { alert('Date, amount, and category are required.'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving...';

  try {
    const formData = new FormData();
    formData.append('expense_date', date);
    formData.append('amount', amount);
    formData.append('category', category);
    if (description) formData.append('description', description);
    if (receiptFile) formData.append('receipt', receiptFile);

    const isRecurring = document.getElementById('fRecurring').checked;
    if (isRecurring) {
      formData.append('is_recurring', 'true');
      formData.append('recur_frequency', document.getElementById('fRecurFreq').value);
      formData.append('recur_day', document.getElementById('fRecurDay').value);
    }

    const res = await fetch('/api/store-expenses', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token },
      body: formData
    });

    if (!res.ok) {
      const d = await res.json();
      alert('Error: ' + (d.error || 'Failed to save'));
      return;
    }

    closeAddModal();
    load();
  } catch (err) {
    alert('Error: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Save Expense';
  }
}

async function deleteExpense(id) {
  if (!confirm('Delete this expense? This cannot be undone.')) return;
  const res = await fetch(`/api/store-expenses/${id}`, {
    method: 'DELETE', headers: { Authorization: 'Bearer ' + token }
  });
  if (res.ok) load();
  else { const d = await res.json(); alert('Error: ' + d.error); }
}

document.getElementById('addModal').addEventListener('click', e => {
  if (e.target === document.getElementById('addModal')) closeAddModal();
});

async function init() {
  if (!token) { window.location.href = '/'; return; }
  buildHead();
  await initStoreButtons();
  setDefaultDates();
}
init();
</script>
