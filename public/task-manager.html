<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud 9 - Task Manager</title>
  <script src="/navbar.js?v=5"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }
    .page { max-width: 1000px; margin: 0 auto; padding: 24px 16px; }
    .page-title { font-size: 24px; font-weight: 700; color: #1a1a2e; }
    .page-subtitle { color: #666; font-size: 14px; margin-top: 4px; margin-bottom: 28px; }

    /* Create form */
    .create-card { background: white; border-radius: 12px; border: 1px solid #e5e7eb; padding: 24px; margin-bottom: 28px; }
    .create-title { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 18px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: .04em; }
    input, select, textarea { padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; background: white; }
    textarea { resize: vertical; min-height: 72px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #2563eb; }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-sm { padding: 5px 14px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
    .btn-complete { background: #16a34a; color: white; }
    .btn-complete:hover { background: #15803d; }
    .btn-delete { background: #f3f4f6; color: #ef4444; border: 1px solid #fca5a5; }
    .btn-delete:hover { background: #fee2e2; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid #e5e7eb; }
    .tab { padding: 9px 18px; font-size: 13px; font-weight: 600; color: #888; cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .tab.active { color: #2563eb; border-bottom-color: #2563eb; }

    /* Task list */
    .task-card { background: white; border-radius: 10px; border: 1px solid #e5e7eb; padding: 18px 20px; margin-bottom: 12px; display: flex; align-items: flex-start; gap: 16px; }
    .task-card.complete { opacity: .6; }
    .task-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #d1d5db; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; }
    .task-check.done { background: #16a34a; border-color: #16a34a; color: white; font-size: 12px; }
    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .task-desc { font-size: 13px; color: #555; margin-bottom: 8px; }
    .task-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .meta-pill { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 10px; }
    .pill-user { background: #e0f2fe; color: #0369a1; }
    .pill-due { background: #fef9c3; color: #854d0e; }
    .pill-overdue { background: #fee2e2; color: #dc2626; }
    .pill-done { background: #d1fae5; color: #065f46; }
    .pill-store { background: #f3e8ff; color: #7c3aed; }
    .task-actions { display: flex; gap: 8px; margin-top: 10px; }

    .empty { text-align: center; padding: 40px; color: #999; font-size: 14px; }
    .loading { text-align: center; padding: 40px; color: #999; font-size: 14px; }

    /* Toast */
    #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: white; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 9999; display: none; }
  </style>
</head>
<body>
<script>loadNavbar();</script>
<div id="toast"></div>

<div class="page">
  <div class="page-title">📋 Task Manager</div>
  <div class="page-subtitle">Assign tasks to team members, track completion</div>

  <!-- Create form (creators only) -->
  <div class="create-card" id="createSection" style="display:none">
    <div class="create-title">➕ Assign New Task</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Assign To</label>
        <select id="assignTo">
          <option value="">Select user...</option>
        </select>
      </div>
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" id="dueDate">
      </div>
      <div class="form-group full">
        <label>Task Title</label>
        <input type="text" id="taskTitle" placeholder="e.g. Complete monthly stock count">
      </div>
      <div class="form-group full">
        <label>Description (optional)</label>
        <textarea id="taskDesc" placeholder="Add any details or instructions..."></textarea>
      </div>
    </div>
    <div style="margin-top:16px">
      <button class="btn btn-primary" onclick="createTask()" id="createBtn">Assign Task</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('pending', this)">Pending</button>
    <button class="tab" onclick="switchTab('complete', this)">Completed</button>
  </div>

  <div id="taskList"><div class="loading">Loading...</div></div>
</div>

<script>
const token = localStorage.getItem('token');
const user  = JSON.parse(localStorage.getItem('user') || '{}');
const ALLOWED = ['regional_manager', 'him', 'admin', 'owner', 'gm', 'store_user', 'media'];
const CREATOR_ROLES = ['regional_manager', 'him', 'admin'];
const isCreator = CREATOR_ROLES.includes(user.role);

if (!token || !ALLOWED.includes(user.role)) window.location.href = '/dashboard';

let currentTab = 'pending';
let allTasks = [];
let storesMap = {};

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

async function init() {
  // Show create form for creators
  if (isCreator) {
    document.getElementById('createSection').style.display = 'block';
    await loadUsers();
  }

  // Load stores map
  try {
    const r = await fetch('/api/stores', { headers: { Authorization: 'Bearer ' + token } });
    const d = await r.json();
    (d.stores || d || []).forEach(s => { storesMap[s.id] = s.name; });
  } catch (e) {}

  await loadTasks();
}

async function loadUsers() {
  try {
    const r = await fetch('/api/users', { headers: { Authorization: 'Bearer ' + token } });
    const d = await r.json();
    const users = d.users || d || [];
    const sel = document.getElementById('assignTo');
    users
      .filter(u => u.id !== user.id)
      .sort((a, b) => (a.name || a.email).localeCompare(b.name || b.email))
      .forEach(u => {
        const o = document.createElement('option');
        o.value = u.id;
        o.textContent = `${u.name || u.email} (${u.role})`;
        sel.appendChild(o);
      });
  } catch (e) { console.error('loadUsers error', e); }
}

async function loadTasks() {
  document.getElementById('taskList').innerHTML = '<div class="loading">Loading...</div>';
  try {
    const r = await fetch('/api/assigned-tasks', { headers: { Authorization: 'Bearer ' + token } });
    const d = await r.json();
    allTasks = d.tasks || [];
    renderTasks();
  } catch (e) {
    document.getElementById('taskList').innerHTML = '<div class="empty">Failed to load tasks.</div>';
  }
}

function renderTasks() {
  const filtered = allTasks.filter(t => t.status === currentTab);
  if (!filtered.length) {
    document.getElementById('taskList').innerHTML = `<div class="empty">${currentTab === 'pending' ? 'No pending tasks.' : 'No completed tasks yet.'}</div>`;
    return;
  }

  const today = new Date().toISOString().split('T')[0];
  document.getElementById('taskList').innerHTML = filtered.map(t => {
    const assigneeName = t.assignee?.name || t.assignee?.email || '—';
    const creatorName  = t.creator?.name  || t.creator?.email  || '—';
    const isOverdue = t.due_date && t.due_date < today && t.status === 'pending';
    const isDone = t.status === 'complete';
    const storeName = t.store_id ? storesMap[t.store_id] : null;

    const canComplete = (t.assigned_to === user.id || isCreator) && !isDone;
    const canDelete = isCreator && !isDone;

    return `<div class="task-card${isDone ? ' complete' : ''}">
      <div class="task-check${isDone ? ' done' : ''}">
        ${isDone ? '✓' : ''}
      </div>
      <div class="task-body">
        <div class="task-title">${escHtml(t.title)}</div>
        ${t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : ''}
        <div class="task-meta">
          ${isCreator ? `<span class="meta-pill pill-user">→ ${escHtml(assigneeName)}</span>` : `<span class="meta-pill pill-user">From: ${escHtml(creatorName)}</span>`}
          ${storeName ? `<span class="meta-pill pill-store">${escHtml(storeName)}</span>` : ''}
          ${t.due_date ? `<span class="meta-pill ${isOverdue ? 'pill-overdue' : 'pill-due'}">${isOverdue ? '⚠️ Overdue · ' : ''}Due ${t.due_date}</span>` : ''}
          ${isDone ? `<span class="meta-pill pill-done">✓ Done ${t.completed_at ? fmtDate(t.completed_at) : ''}</span>` : ''}
        </div>
        <div class="task-actions">
          ${canComplete ? `<button class="btn-sm btn-complete" onclick="completeTask('${t.id}')">✓ Mark Complete</button>` : ''}
          ${canDelete   ? `<button class="btn-sm btn-delete"   onclick="deleteTask('${t.id}')">Delete</button>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTasks();
}

async function createTask() {
  const assignTo  = document.getElementById('assignTo').value;
  const title     = document.getElementById('taskTitle').value.trim();
  const desc      = document.getElementById('taskDesc').value.trim();
  const dueDate   = document.getElementById('dueDate').value;

  if (!assignTo || !title) { toast('Please fill in assign-to and title.'); return; }

  const btn = document.getElementById('createBtn');
  btn.disabled = true;
  btn.textContent = 'Assigning...';

  try {
    const r = await fetch('/api/assigned-tasks', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, description: desc || null, due_date: dueDate || null, assigned_to: assignTo })
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Failed');

    // Reset form
    document.getElementById('assignTo').value = '';
    document.getElementById('taskTitle').value = '';
    document.getElementById('taskDesc').value = '';
    document.getElementById('dueDate').value = '';

    toast('Task assigned ✓');
    await loadTasks();
  } catch (e) {
    toast('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Assign Task';
  }
}

async function completeTask(id) {
  if (!confirm('Mark this task as complete?')) return;
  try {
    const r = await fetch(`/api/assigned-tasks/${id}/complete`, {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + token }
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Failed');
    toast('Task marked complete ✓');
    await loadTasks();
  } catch (e) {
    toast('Error: ' + e.message);
  }
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  try {
    const r = await fetch(`/api/assigned-tasks/${id}`, {
      method: 'DELETE',
      headers: { Authorization: 'Bearer ' + token }
    });
    if (!r.ok) throw new Error('Failed');
    toast('Task deleted');
    await loadTasks();
  } catch (e) {
    toast('Error: ' + e.message);
  }
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

init();
</script>
</body>
</html>
