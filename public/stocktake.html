<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud 9 - Stock Take</title>
  <script src="/navbar.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-title { font-size: 24px; font-weight: 700; color: #1a1a2e; }
    .page-subtitle { color: #666; font-size: 14px; margin-top: 4px; }
    .btn {
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-blue { background: #2f5597; color: white; }
    .btn-blue:hover { background: #1e3a6e; }
    .btn-gray { background: #666; color: white; }
    .btn-green { background: #38761d; color: white; }
    .btn-orange { background: #c55a11; color: white; }
    .store-filter {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 2px solid #e0e0e0;
      background: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: #444;
      transition: all 0.2s;
    }
    .filter-btn.active {
      border-color: #2f5597;
      background: #2f5597;
      color: white;
    }
    .reports-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .report-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border-left: 4px solid #2f5597;
    }
    .report-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .report-card.has-issues { border-left-color: #c55a11; }
    .report-card.resolved { border-left-color: #38761d; }
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .report-store { font-size: 16px; font-weight: 700; color: #1a1a2e; }
    .report-date { font-size: 12px; color: #999; margin-top: 2px; }
    .status-badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .status-pending { background: #fff3cd; color: #c55a11; }
    .status-reviewed { background: #dce8f8; color: #2f5597; }
    .status-resolved { background: #d9ead3; color: #38761d; }
    .report-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    @media (max-width: 700px) {
      .report-stats, .report-stats[style*="grid-template-columns"] { grid-template-columns: repeat(2, 1fr) !important; }
    }
    .report-stat {
      background: #f8f9fa;
      border-radius: 6px;
      padding: 8px;
      text-align: center;
    }
    .report-stat-value { font-size: 18px; font-weight: 800; color: #1a1a2e; }
    .report-stat-label { font-size: 10px; color: #999; font-weight: 600; margin-top: 2px; }
    .report-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #999;
    }
    .report-categories {
      font-size: 11px;
      color: #666;
      margin-bottom: 8px;
    }
    .applied-badge {
      background: #d9ead3;
      color: #38761d;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .not-applied-badge {
      background: #fff3cd;
      color: #c55a11;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 12px;
    }
    .loading { text-align: center; padding: 60px; color: #999; }
    .empty {
      text-align: center;
      padding: 60px;
      color: #999;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .empty h3 { font-size: 18px; color: #666; margin-bottom: 8px; }
  </style>
</head>
<body>

  <div class="container">
    <div class="page-header">
      <div>
        <div class="page-title">📋 Stock Takes</div>
        <div class="page-subtitle">View and manage inventory count reports</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap" id="newStockBtns"></div>
    </div>

    <div class="store-filter" id="storeFilter"></div>
    <div id="reportsContainer" class="loading">Loading reports...</div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!token) window.location.href = '/';

    let allReports = [];
    let allDrafts = [];
    let allStores = [];
    let selectedStore = '';

    async function loadStores() {
      const res = await fetch('/api/inventory/stores', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      allStores = data.stores || [];

      const btns = document.getElementById('newStockBtns');
      if (allStores.length === 1) {
        btns.innerHTML = `<button class="btn btn-blue" onclick="window.location.href='/stocktake/new?store=${allStores[0].id}'">➕ New Stock Take</button>`;
      } else if (['admin', 'him', 'regional_manager'].includes(user.role)) {
        btns.innerHTML = `
          <select id="newStoreSelect" style="padding:10px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none">
            <option value="">Select store...</option>
            ${allStores.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
          </select>
          <button class="btn btn-blue" onclick="startNewStockTake()">➕ New Stock Take</button>
        `;
      }

      if (['admin', 'him', 'regional_manager'].includes(user.role) && allStores.length > 1) {
        const filter = document.getElementById('storeFilter');
        filter.innerHTML = `<button class="filter-btn active" onclick="filterStore('', this)">All Stores</button>` +
          allStores.map(s => `<button class="filter-btn" onclick="filterStore('${s.id}', this)">${s.name}</button>`).join('');
      }
    }

    function startNewStockTake() {
      const storeId = document.getElementById('newStoreSelect').value;
      if (!storeId) { alert('Please select a store first!'); return; }
      window.location.href = `/stocktake/new?store=${storeId}`;
    }

    function filterStore(storeId, btn) {
      selectedStore = storeId;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderReports();
    }

    async function loadReports() {
      try {
        const [reportsRes, draftsRes] = await Promise.all([
          fetch('/api/inventory/stocktake/reports', {
            headers: { 'Authorization': 'Bearer ' + token }
          }),
          fetch('/api/inventory/stocktake/drafts', {
            headers: { 'Authorization': 'Bearer ' + token }
          })
        ]);

        const reportsData = await reportsRes.json();
        const draftsData = await draftsRes.json();

        allReports = reportsData.reports || [];
        allDrafts = draftsData.drafts || [];
        renderReports();
      } catch (err) {
        document.getElementById('reportsContainer').innerHTML = '<div class="empty"><h3>Error loading reports</h3></div>';
      }
    }

    function renderReports() {
      const filteredReports = selectedStore
        ? allReports.filter(r => r.store_id === selectedStore)
        : allReports;

      const filteredDrafts = selectedStore
        ? allDrafts.filter(d => d.store_id === selectedStore)
        : allDrafts;

      const container = document.getElementById('reportsContainer');

      if (filteredReports.length === 0 && filteredDrafts.length === 0) {
        container.innerHTML = `
          <div class="empty">
            <h3>No stock takes yet</h3>
            <p>Start your first stock take to track inventory accuracy</p>
          </div>`;
        return;
      }

      container.className = '';
      let html = '';

      // In progress drafts
      if (filteredDrafts.length > 0) {
        html += `<div style="margin-bottom:32px">
          <div class="section-title">🔄 In Progress</div>
          <div class="reports-grid">`;

        html += filteredDrafts.map(draft => {
          const store = allStores.find(s => s.id === draft.store_id);
          const storeName = store?.name || 'Unknown Store';
          const date = new Date(draft.updated_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
          const time = new Date(draft.updated_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
          const countedItems = Object.keys(draft.counts || {}).length;
          const doneCats = Object.keys(draft.cat_status || {}).length;

          return `
            <div class="report-card" style="border-left-color:#c55a11" onclick="window.location.href='/stocktake/new?store=${draft.store_id}'">
              <div class="report-header">
                <div>
                  <div class="report-store">${storeName}</div>
                  <div class="report-date">Last updated: ${date} at ${time}</div>
                </div>
                <span class="status-badge" style="background:#fff3cd;color:#c55a11">🔄 In Progress</span>
              </div>
              <div class="report-categories">📁 ${doneCats} categories counted so far</div>
              <div class="report-stats">
                <div class="report-stat">
                  <div class="report-stat-value">${countedItems}</div>
                  <div class="report-stat-label">Items Counted</div>
                </div>
                <div class="report-stat">
                  <div class="report-stat-value">${doneCats}</div>
                  <div class="report-stat-label">Categories Done</div>
                </div>
                <div class="report-stat">
                  <div class="report-stat-value">—</div>
                  <div class="report-stat-label">Shortages</div>
                </div>
                <div class="report-stat">
                  <div class="report-stat-value">—</div>
                  <div class="report-stat-label">Overages</div>
                </div>
              </div>
              <div class="report-footer">
                <span>By: ${draft.created_by_name || 'Unknown'}</span>
                <span style="color:#2f5597;font-weight:600;font-size:12px">Click to Resume →</span>
              </div>
            </div>`;
        }).join('');

        html += `</div></div>`;
      }

      // Completed reports
      if (filteredReports.length > 0) {
        html += `<div>
          <div class="section-title">✅ Completed</div>
          <div class="reports-grid">`;

        html += filteredReports.map(report => {
          const store = allStores.find(s => s.id === report.store_id);
          const storeName = store?.name || report.stores?.name || 'Unknown Store';
          const date = new Date(report.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
          const time = new Date(report.created_at).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
          const hasIssues = report.total_shortages > 0 || report.total_overages > 0;
          const cardClass = report.status === 'resolved' ? 'resolved' : hasIssues ? 'has-issues' : '';
          const cats = (report.categories || []).join(', ') || 'All categories';

          return `
            <div class="report-card ${cardClass}" onclick="window.location.href='/stocktake/report?id=${report.id}'">
              <div class="report-header">
                <div>
                  <div class="report-store">${storeName}</div>
                  <div class="report-date">${date} at ${time}</div>
                </div>
                <span class="status-badge status-${report.status}">${report.status}</span>
              </div>
              <div class="report-categories">📁 ${cats.length > 60 ? cats.substring(0, 60) + '...' : cats}</div>
              <div class="report-stats" style="grid-template-columns: repeat(5, 1fr)">
                <div class="report-stat">
                  <div class="report-stat-value">${report.total_counted || 0}</div>
                  <div class="report-stat-label">Counted</div>
                </div>
                <div class="report-stat">
                  <div class="report-stat-value" style="color:#38761d">${report.total_matches || 0}</div>
                  <div class="report-stat-label">Matches</div>
                </div>
                <div class="report-stat">
                  <div class="report-stat-value" style="color:#c00">${report.total_shortages || 0}</div>
                  <div class="report-stat-label">Shortages</div>
                </div>
                <div class="report-stat">
                  <div class="report-stat-value" style="color:#c55a11">${report.total_overages || 0}</div>
                  <div class="report-stat-label">Overages</div>
                </div>
                <div class="report-stat" style="background:#fff0f0">
                  <div class="report-stat-value" style="color:#c00;font-size:14px">$${(report.total_loss_value || 0).toFixed(2)}</div>
                  <div class="report-stat-label">$ Lost</div>
                </div>
              </div>
              <div class="report-footer">
                <span>By: ${report.created_by_name || 'Unknown'}</span>
                <span class="${report.applied_to_clover ? 'applied-badge' : 'not-applied-badge'}">
                  ${report.applied_to_clover ? '✅ Applied' : '⏳ Not Applied'}
                </span>
              </div>
            </div>`;
        }).join('');

        html += `</div></div>`;
      }

      container.innerHTML = html;
    }

    loadStores();
    loadReports();
  </script>
  <script>loadNavbar();</script>
</body>
</html>
