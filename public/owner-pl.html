<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P&L Statements</title>
<script src="/navbar.js?v=2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
#navbar-container { position: sticky; top: 0; z-index: 100; }
.page { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
.page-title { font-size: 22px; font-weight: 600; margin-bottom: 20px; }

/* Controls */
.controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; margin-bottom: 24px; background: white; padding: 16px; border-radius: 12px; border: 1px solid #e5e7eb; }
.control-group { display: flex; flex-direction: column; gap: 5px; }
.control-group label { font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: .04em; }
.controls input, .controls select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: white; }
.period-tabs { display: flex; gap: 2px; background: #f3f4f6; border-radius: 8px; padding: 3px; }
.period-tab { padding: 6px 14px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: #555; transition: all .15s; }
.period-tab.active { background: white; color: #1a1a1a; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.btn { padding: 9px 18px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-primary { background: #2563eb; color: white; }
.btn:hover { opacity: .85; }
.store-btn { padding: 7px 16px; border: 1px solid #ddd; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; background: white; color: #555; transition: all .15s; }
.store-btn:hover { border-color: #2563eb; color: #2563eb; }
.store-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
.shortage-banner { display:flex; align-items:center; gap:16px; background:#fff8f0; border:1px solid #f97316; border-radius:10px; padding:12px 18px; margin-bottom:20px; }
.shortage-banner strong { color:#c2410c; }
.shortage-stats { margin-left:auto; display:flex; gap:16px; font-size:14px; font-weight:600; color:#c2410c; }
.shortage-value { }
.row-shortage td { background:#fff8f0 !important; color:#c2410c; font-size:13px; }
.shortage-cell { padding:8px 12px !important; }
.shortage-date { font-weight:400; color:#999; margin-left:6px; font-size:12px; }

/* View tabs */
.view-tabs { display: flex; gap: 2px; background: #f3f4f6; border-radius: 10px; padding: 4px; margin-bottom: 20px; width: fit-content; }
.view-tab { padding: 8px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; background: transparent; color: #555; transition: all .15s; }
.view-tab.active { background: white; color: #1a1a1a; box-shadow: 0 1px 3px rgba(0,0,0,.1); }

/* Summary row across all stores */
.summary-banner { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.metric-card { background: white; border-radius: 12px; border: 1px solid #e5e7eb; padding: 16px 18px; }
.metric-card .label { font-size: 12px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
.metric-card .value { font-size: 24px; font-weight: 700; }
.metric-card.revenue .value { color: #16a34a; }
.metric-card.expenses .value { color: #dc2626; }
.metric-card.net.positive .value { color: #16a34a; }
.metric-card.net.negative .value { color: #dc2626; }
.metric-card .sub { font-size: 12px; color: #888; margin-top: 3px; }

/* P&L table */
.pl-table-wrap { background: white; border-radius: 12px; border: 1px solid #e5e7eb; overflow: hidden; margin-bottom: 20px; }
.pl-table-title { padding: 14px 18px; font-weight: 600; font-size: 15px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; }
table { width: 100%; border-collapse: collapse; }
th { padding: 10px 16px; text-align: left; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: #6b7280; background: #f9fafb; border-bottom: 1px solid #e5e7eb; }
th.num { text-align: right; }
td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
td.num { text-align: right; font-variant-numeric: tabular-nums; }
tr:last-child td { border-bottom: none; }
.row-subtotal td { background: #f9fafb; font-weight: 600; }
.row-net td { background: #f0fdf4; font-weight: 700; font-size: 15px; }
.row-net.negative td { background: #fef2f2; color: #dc2626; }
.profit { color: #16a34a; }
.loss { color: #dc2626; }
.store-name { font-weight: 600; }
.margin-pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.margin-good { background: #dcfce7; color: #16a34a; }
.margin-ok { background: #fef9c3; color: #854d0e; }
.margin-bad { background: #fef2f2; color: #dc2626; }

/* Expense breakdown expand */
.exp-breakdown { background: #fafafa; }
.exp-breakdown td { padding: 6px 16px; font-size: 13px; color: #666; }
.exp-breakdown td:first-child { padding-left: 32px; }

/* Top products */
.top-products-wrap { background: white; border-radius: 12px; border: 1px solid #e5e7eb; overflow: hidden; }

.empty { text-align: center; padding: 60px 20px; color: #888; }
.loading { text-align: center; padding: 40px; color: #888; }
</style>
</head>
<body>
<div id="navbar-container"></div>
<div class="page">
  <h1 class="page-title">📊 P&L Statements</h1>

  <!-- Controls -->
  <div class="controls">
    <div class="control-group">
      <label>Period</label>
      <div class="period-tabs">
        <button class="period-tab active" onclick="setPeriod('weekly',this)">Weekly</button>
        <button class="period-tab" onclick="setPeriod('monthly',this)">Monthly</button>
        <button class="period-tab" onclick="setPeriod('quarterly',this)">Quarterly</button>
        <button class="period-tab" onclick="setPeriod('custom',this)">Custom</button>
      </div>
    </div>
    <div class="control-group" id="periodPickerWrap">
      <label id="periodPickerLabel">Week of</label>
      <input type="date" id="weekDatePicker" onchange="load()" style="display:none">
      <input type="month" id="monthPicker" onchange="load()">
    </div>
    <div class="control-group" id="customDateWrap" style="display:none;flex-direction:row;gap:8px;align-items:flex-end">
      <div>
        <label style="display:block;font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">From</label>
        <input type="date" id="customStart" onchange="load()">
      </div>
      <div>
        <label style="display:block;font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">To</label>
        <input type="date" id="customEnd" onchange="load()">
      </div>
    </div>
    <div class="control-group" style="margin-left:auto;flex-direction:row;align-items:flex-end;gap:8px;">
      <button class="btn btn-primary" onclick="savePLSnapshot()" id="saveBtn" title="Save snapshot to history">💾 Save</button>
      <button class="btn" style="background:#f3f4f6;color:#1a1a1a;" onclick="printPDF()" title="Download / Print as PDF">🖨️ PDF</button>
      <button class="btn" style="background:#f3f4f6;color:#1a1a1a;" onclick="toggleSnapshotPanel()">📂 History</button>
    </div>
  </div>

  <!-- Store buttons -->
  <div id="storeButtonsWrap" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;"></div>

  <!-- Snapshot history panel -->
  <div id="snapshotPanel" style="display:none;background:white;border:1px solid #e5e7eb;border-radius:12px;padding:18px 20px;margin-bottom:20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span style="font-weight:600;font-size:15px;">📂 Saved P&L Reports</span>
      <button onclick="toggleSnapshotPanel()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#888;">✕</button>
    </div>
    <div id="snapshotList"><div style="color:#999;font-size:13px;">Loading...</div></div>
  </div>

  <!-- View tabs -->
  <div class="view-tabs">
    <button class="view-tab active" onclick="setView('pl',this)">P&L Overview</button>
    <button class="view-tab" onclick="setView('compare',this)">Store Comparison</button>
    <button class="view-tab" onclick="setView('topproducts',this)">Top Products</button>
    <button class="view-tab" onclick="setView('invvalue',this)">Inventory Value</button>
  </div>

  <div id="content"><div class="loading">Loading...</div></div>
</div>

<script>
const token = localStorage.getItem('token');
let currentPeriod = 'weekly';
let currentView = 'pl';
let stores = [];
let plData = [], topProductsData = [], invValueData = [];

async function api(path) {
  const res = await fetch(path, { headers: { Authorization: 'Bearer ' + token } });
  return res.json();
}

let currentStoreId = '';

async function init() {
  if (!token) { window.location.href = '/'; return; }
  stores = await api('/api/owner/stores');

  // Build store toggle buttons
  const wrap = document.getElementById('storeButtonsWrap');
  wrap.innerHTML = `
    <button class="store-btn active" onclick="setStore('', this)">All Stores</button>
    ${stores.map(s => `<button class="store-btn" onclick="setStore('${s.id}', this)">${s.name}</button>`).join('')}
  `;

  // Default to current week using date picker
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('weekDatePicker').value = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  document.getElementById('weekDatePicker').style.display = '';
  document.getElementById('monthPicker').style.display = 'none';
  document.getElementById('periodPickerLabel').textContent = 'Week of';
  await load();
}

function setStore(storeId, btn) {
  currentStoreId = storeId;
  document.querySelectorAll('.store-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  load();
}

function setPeriod(period, btn) {
  currentPeriod = period;
  document.querySelectorAll('.period-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const pickerWrap = document.getElementById('periodPickerWrap');
  const customWrap = document.getElementById('customDateWrap');
  const monthPicker = document.getElementById('monthPicker');
  const weekPicker = document.getElementById('weekDatePicker');
  const label = document.getElementById('periodPickerLabel');

  if (period === 'custom') {
    pickerWrap.style.display = 'none';
    customWrap.style.display = 'flex';
    monthPicker.style.display = 'none';
    weekPicker.style.display = 'none';
  } else {
    pickerWrap.style.display = '';
    customWrap.style.display = 'none';
    if (period === 'weekly') {
      weekPicker.style.display = '';
      monthPicker.style.display = 'none';
      label.textContent = 'Week of';
      if (!weekPicker.value) {
        const now = new Date();
        const pad = n => String(n).padStart(2, '0');
        weekPicker.value = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
      }
    } else if (period === 'quarterly') {
      weekPicker.style.display = 'none';
      monthPicker.style.display = '';
      monthPicker.type = 'text'; monthPicker.placeholder = 'e.g. 2026-Q2';
      label.textContent = 'Quarter';
      const now = new Date();
      const q = Math.ceil((now.getMonth()+1)/3);
      monthPicker.value = `${now.getFullYear()}-Q${q}`;
    } else {
      weekPicker.style.display = 'none';
      monthPicker.style.display = '';
      monthPicker.type = 'month'; label.textContent = 'Month';
    }
  }
  load();
}

function getDateRange() {
  const now = new Date();
  if (currentPeriod === 'custom') {
    return { start: document.getElementById('customStart').value, end: document.getElementById('customEnd').value };
  }
  if (currentPeriod === 'monthly') {
    const val = document.getElementById('monthPicker').value;
    if (!val) return null;
    const [y, m] = val.split('-');
    const lastDay = new Date(y, m, 0).getDate();
    return { start: `${y}-${m}-01`, end: `${y}-${m}-${String(lastDay).padStart(2,'0')}` };
  }
  if (currentPeriod === 'weekly') {
    const val = document.getElementById('weekDatePicker').value;
    if (!val) return null;
    const d = new Date(val + 'T00:00:00');
    // Get Monday of the week containing this date
    const day = d.getDay(); // 0=Sun
    const diff = day === 0 ? -6 : 1 - day; // Mon = start
    const weekStart = new Date(d);
    weekStart.setDate(d.getDate() + diff);
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 6);
    const fmt = d => d.toISOString().split('T')[0];
    return { start: fmt(weekStart), end: fmt(weekEnd) };
  }
  if (currentPeriod === 'quarterly') {
    const val = document.getElementById('monthPicker').value || '';
    const match = val.match(/(\d{4})-Q(\d)/);
    if (!match) return null;
    const [, y, q] = match;
    const startMonth = (parseInt(q)-1)*3 + 1;
    const endMonth = startMonth + 2;
    const lastDay = new Date(y, endMonth, 0).getDate();
    return {
      start: `${y}-${String(startMonth).padStart(2,'0')}-01`,
      end: `${y}-${String(endMonth).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`
    };
  }
  return null;
}

function fmtMoney(n) {
  return '$' + parseFloat(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function marginPill(pct) {
  if (pct === null) return '<span style="color:#ccc">—</span>';
  const p = parseFloat(pct);
  const cls = p >= 20 ? 'margin-good' : p >= 5 ? 'margin-ok' : 'margin-bad';
  return `<span class="margin-pill ${cls}">${p}%</span>`;
}

async function load() {
  const range = getDateRange();
  if (!range?.start || !range?.end) return;
  const storeId = currentStoreId;

  document.getElementById('content').innerHTML = '<div class="loading">Loading...</div>';

  const qs = `start=${range.start}&end=${range.end}${storeId ? '&store_id='+storeId : ''}`;

  // Load data based on current view (and pre-load PL for the banner)
  [plData, topProductsData, invValueData] = await Promise.all([
    api(`/api/owner/pl?${qs}`),
    api(`/api/owner/top-products?${qs}&limit=20`),
    api('/api/owner/inventory-value' + (storeId ? '?store_id='+storeId : ''))
  ]);

  renderView();
}

function setView(view, btn) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderView();
}

function renderView() {
  if (currentView === 'pl') renderPL();
  else if (currentView === 'compare') renderCompare();
  else if (currentView === 'topproducts') renderTopProducts();
  else if (currentView === 'invvalue') renderInvValue();
}

function renderPL() {
  if (!Array.isArray(plData) || !plData.length) {
    document.getElementById('content').innerHTML = '<div class="empty">No data for this period.</div>';
    return;
  }

  const totRevenue = plData.reduce((s, r) => s + r.revenue, 0);
  const totCOGS = plData.reduce((s, r) => s + r.cogs, 0);
  const totGMExp = plData.reduce((s, r) => s + r.gm_expenses, 0);
  const totNet = plData.reduce((s, r) => s + r.net_profit, 0);
  const totMargin = totRevenue > 0 ? ((totNet/totRevenue)*100).toFixed(1) : null;
  const totShortageItems = plData.reduce((s, r) => s + (r.shortages?.items || 0), 0);
  const totShortageValue = plData.reduce((s, r) => s + (r.shortages?.value || 0), 0);

  const netClass = totNet >= 0 ? 'positive' : 'negative';

  let html = `
  <div class="summary-banner">
    <div class="metric-card revenue">
      <div class="label">Total Revenue</div>
      <div class="value">${fmtMoney(totRevenue)}</div>
      <div class="sub">All stores</div>
    </div>
    <div class="metric-card expenses">
      <div class="label">Total COGS</div>
      <div class="value">${fmtMoney(totCOGS)}</div>
      <div class="sub">Budget invoices</div>
    </div>
    <div class="metric-card expenses">
      <div class="label">GM Expenses</div>
      <div class="value">${fmtMoney(totGMExp)}</div>
      <div class="sub">Payroll, rent, etc.</div>
    </div>
    <div class="metric-card net ${netClass}">
      <div class="label">Net Profit</div>
      <div class="value">${fmtMoney(totNet)}</div>
      <div class="sub">${totMargin !== null ? totMargin + '% margin' : '—'}</div>
    </div>
  </div>
  ${totShortageItems > 0 ? `
  <div class="shortage-banner">
    <span class="shortage-icon">⚠️</span>
    <div>
      <strong>Potentially Lost / Stolen Inventory</strong> — based on most recent stocktake
    </div>
    <div class="shortage-stats">
      <span>${totShortageItems} items</span>
      <span class="shortage-value">${fmtMoney(totShortageValue)} estimated retail value</span>
    </div>
  </div>` : ''}`;

  // Per-store P&L tables
  for (const store of plData) {
    const netClass2 = store.net_profit >= 0 ? '' : 'negative';
    const expBreakdown = Object.entries(store.expense_breakdown || {});
    html += `
    <div class="pl-table-wrap">
      <div class="pl-table-title">
        <span>🏪 ${store.store_name}</span>
        ${marginPill(store.margin_pct)}
      </div>
      <table>
        <thead>
          <tr>
            <th>Line Item</th>
            <th class="num">Amount</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>💰 Revenue (Sales)</td><td class="num profit">${fmtMoney(store.revenue)}</td></tr>
          <tr><td>📦 COGS (Budget Invoices)</td><td class="num loss">(${fmtMoney(store.cogs)})</td></tr>
          <tr class="row-subtotal"><td>Gross Profit</td><td class="num ${store.gross_profit >= 0 ? 'profit' : 'loss'}">${fmtMoney(store.gross_profit)}</td></tr>
          <tr><td>💼 GM Expenses (Total)</td><td class="num loss">(${fmtMoney(store.gm_expenses)})</td></tr>
          ${expBreakdown.map(([cat, amt]) => `
          <tr class="exp-breakdown"><td>— ${cat.charAt(0).toUpperCase()+cat.slice(1)}</td><td class="num" style="color:#888">(${fmtMoney(amt)})</td></tr>`).join('')}
          <tr class="row-net ${netClass2}"><td>Net Profit / Loss</td><td class="num">${fmtMoney(store.net_profit)}</td></tr>
          ${store.shortages && store.shortages.items > 0 ? `
          <tr class="row-shortage"><td colspan="2" class="shortage-cell">
            ⚠️ <strong>Potentially Lost/Stolen:</strong> ${store.shortages.items} items &nbsp;·&nbsp; ${fmtMoney(store.shortages.value)} estimated value
            <span class="shortage-date">(stocktake ${store.shortages.stocktake_date || ''})</span>
          </td></tr>` : ''}
        </tbody>
      </table>
    </div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function renderCompare() {
  if (!Array.isArray(plData) || !plData.length) {
    document.getElementById('content').innerHTML = '<div class="empty">No data for this period.</div>';
    return;
  }

  let html = `
  <div class="pl-table-wrap">
    <div class="pl-table-title">Store Comparison</div>
    <table>
      <thead>
        <tr>
          <th>Store</th>
          <th class="num">Revenue</th>
          <th class="num">COGS</th>
          <th class="num">Gross Profit</th>
          <th class="num">GM Expenses</th>
          <th class="num">Net Profit</th>
          <th class="num">Margin</th>
        </tr>
      </thead>
      <tbody>
        ${plData.map(s => `
        <tr>
          <td class="store-name">${s.store_name}</td>
          <td class="num profit">${fmtMoney(s.revenue)}</td>
          <td class="num loss">${fmtMoney(s.cogs)}</td>
          <td class="num ${s.gross_profit >= 0 ? 'profit' : 'loss'}">${fmtMoney(s.gross_profit)}</td>
          <td class="num loss">${fmtMoney(s.gm_expenses)}</td>
          <td class="num ${s.net_profit >= 0 ? 'profit' : 'loss'}">${fmtMoney(s.net_profit)}</td>
          <td class="num">${marginPill(s.margin_pct)}</td>
        </tr>`).join('')}
        ${plData.length > 1 ? `
        <tr class="row-subtotal">
          <td>All Stores Total</td>
          <td class="num">${fmtMoney(plData.reduce((s,r)=>s+r.revenue,0))}</td>
          <td class="num">${fmtMoney(plData.reduce((s,r)=>s+r.cogs,0))}</td>
          <td class="num">${fmtMoney(plData.reduce((s,r)=>s+r.gross_profit,0))}</td>
          <td class="num">${fmtMoney(plData.reduce((s,r)=>s+r.gm_expenses,0))}</td>
          <td class="num">${fmtMoney(plData.reduce((s,r)=>s+r.net_profit,0))}</td>
          <td class="num">${marginPill((plData.reduce((s,r)=>s+r.net_profit,0)/Math.max(1,plData.reduce((s,r)=>s+r.revenue,0))*100).toFixed(1))}</td>
        </tr>` : ''}
      </tbody>
    </table>
  </div>`;

  document.getElementById('content').innerHTML = html;
}

function renderTopProducts() {
  if (!Array.isArray(topProductsData) || !topProductsData.length) {
    document.getElementById('content').innerHTML = '<div class="empty">No sales data for this period.</div>';
    return;
  }

  const html = `
  <div class="top-products-wrap">
    <div class="pl-table-title">Top Products by Revenue</div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Product</th>
          <th class="num">Revenue</th>
          <th class="num">Units Sold</th>
          <th>Stores</th>
        </tr>
      </thead>
      <tbody>
        ${topProductsData.map((p, i) => `
        <tr>
          <td style="color:#888;font-weight:600">${i+1}</td>
          <td class="store-name">${p.item_name}</td>
          <td class="num profit">${fmtMoney(p.total_revenue)}</td>
          <td class="num">${p.total_qty.toLocaleString()}</td>
          <td style="font-size:13px;color:#666">${p.stores.join(', ')}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;

  document.getElementById('content').innerHTML = html;
}

function renderInvValue() {
  if (!Array.isArray(invValueData) || !invValueData.length) {
    document.getElementById('content').innerHTML = '<div class="empty">No inventory data found.</div>';
    return;
  }

  const totalValue = invValueData.reduce((s, r) => s + r.total_cost_value, 0);
  const totalUnits = invValueData.reduce((s, r) => s + r.total_units, 0);

  const html = `
  <div class="summary-banner" style="margin-bottom:16px">
    <div class="metric-card">
      <div class="label">Total Inventory Value</div>
      <div class="value" style="color:#2563eb">${fmtMoney(totalValue)}</div>
      <div class="sub">At cost, all stores</div>
    </div>
    <div class="metric-card">
      <div class="label">Total Units on Hand</div>
      <div class="value">${totalUnits.toLocaleString()}</div>
      <div class="sub">Across all stores</div>
    </div>
  </div>
  <div class="pl-table-wrap">
    <div class="pl-table-title">Inventory Value by Store</div>
    <table>
      <thead>
        <tr>
          <th>Store</th>
          <th class="num">Value at Cost</th>
          <th class="num">Units on Hand</th>
          <th class="num">SKUs</th>
        </tr>
      </thead>
      <tbody>
        ${invValueData.map(s => `
        <tr>
          <td class="store-name">${s.store_name}</td>
          <td class="num" style="color:#2563eb;font-weight:600">${fmtMoney(s.total_cost_value)}</td>
          <td class="num">${s.total_units.toLocaleString()}</td>
          <td class="num" style="color:#888">${s.item_count.toLocaleString()}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;

  document.getElementById('content').innerHTML = html;
}

// ── Snapshot save/load ────────────────────────────────────────────────────────
async function savePLSnapshot() {
  const range = getDateRange();
  if (!range?.start || !range?.end) { alert('Select a date range first.'); return; }
  if (!plData?.length) { alert('No P&L data loaded yet.'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '⏳ Saving...';

  const label = buildPeriodLabel();
  const storeId = currentStoreId || null;
  const periodType = currentPeriod === 'weekly' ? 'monthly' : (currentPeriod === 'quarterly' ? 'quarterly' : 'monthly');

  const res = await fetch('/api/owner/pl-snapshots', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ period_type: periodType, period_label: label, start_date: range.start, end_date: range.end, store_id: storeId, data: plData })
  });

  btn.disabled = false; btn.textContent = '💾 Save';
  if (res.ok) { btn.textContent = '✅ Saved'; setTimeout(() => btn.textContent = '💾 Save', 2000); }
  else { alert('Failed to save snapshot.'); }
}

function buildPeriodLabel() {
  const range = getDateRange();
  if (currentPeriod === 'weekly') {
    const d = new Date(range.start);
    return `Week of ${d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
  }
  if (currentPeriod === 'quarterly') {
    return document.getElementById('monthPicker').value || range.start;
  }
  if (currentPeriod === 'custom') return `${range.start} to ${range.end}`;
  // monthly
  const [y, m] = (document.getElementById('monthPicker').value || range.start).split('-');
  return new Date(y, m - 1).toLocaleString('en-US', { month: 'long', year: 'numeric' });
}

let snapshotPanelOpen = false;
async function toggleSnapshotPanel() {
  const panel = document.getElementById('snapshotPanel');
  snapshotPanelOpen = !snapshotPanelOpen;
  panel.style.display = snapshotPanelOpen ? '' : 'none';
  if (snapshotPanelOpen) await loadSnapshots();
}

async function loadSnapshots() {
  const list = document.getElementById('snapshotList');
  const snaps = await api('/api/owner/pl-snapshots');
  if (!snaps?.length) { list.innerHTML = '<div style="color:#999;font-size:13px;">No saved reports yet.</div>'; return; }

  list.innerHTML = `<table style="width:100%;border-collapse:collapse;font-size:13px;">
    <thead><tr style="text-align:left;">
      <th style="padding:6px 12px;background:#f9fafb;border-bottom:1px solid #e5e7eb;">Period</th>
      <th style="padding:6px 12px;background:#f9fafb;border-bottom:1px solid #e5e7eb;">Type</th>
      <th style="padding:6px 12px;background:#f9fafb;border-bottom:1px solid #e5e7eb;">Saved</th>
      <th style="padding:6px 12px;background:#f9fafb;border-bottom:1px solid #e5e7eb;"></th>
    </tr></thead>
    <tbody>${snaps.map(s => `
      <tr style="border-bottom:1px solid #f0f0f0;">
        <td style="padding:8px 12px;font-weight:500;">${s.period_label}</td>
        <td style="padding:8px 12px;color:#888;text-transform:capitalize;">${s.period_type}</td>
        <td style="padding:8px 12px;color:#888;">${new Date(s.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</td>
        <td style="padding:8px 12px;"><button onclick="loadSnapshot('${s.id}')" style="background:#2563eb;color:white;border:none;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:12px;">View</button></td>
      </tr>`).join('')}
    </tbody></table>`;
}

async function loadSnapshot(id) {
  const snap = await api(`/api/owner/pl-snapshots/${id}`);
  plData = snap.data;
  document.querySelector('.page-title').textContent = `P&L — ${snap.period_label} (saved)`;
  toggleSnapshotPanel();
  renderView();
}

    .metric-card .value { font-size: 18px; }
    th, td { padding: 7px 10px !important; }
    .exp-breakdown td { padding: 4px 10px !important; }
    .page-title::before { content: "Cloud 9 Vapor — "; }
  }`;
document.head.appendChild(printStyle);

function printPDF() {
  // Show a clean print header
  const range = getDateRange();
  const label = buildPeriodLabel();
  const storeLabel = currentStoreId
    ? stores.find(s => s.id === currentStoreId)?.name || ''
    : 'All Stores';
  const header = document.createElement('div');
  header.id = 'printHeader';
  header.style.cssText = 'display:none';
  header.innerHTML = `
    <div style="text-align:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #2563eb">
      <div style="font-size:20px;font-weight:800;color:#1a1a2e">Cloud 9 Vapor</div>
      <div style="font-size:15px;font-weight:600;margin-top:4px">P&L Statement — ${label}</div>
      <div style="font-size:13px;color:#666;margin-top:2px">${storeLabel} · ${range?.start} to ${range?.end}</div>
      <div style="font-size:12px;color:#999;margin-top:2px">Generated ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
    </div>`;
  document.querySelector('.page').prepend(header);
  printStyle.textContent += '@media print { #printHeader { display: block !important; } }';
  window.print();
  setTimeout(() => { header.remove(); }, 500);
}
