<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud 9 - New Purchase Order</title>
  <script src="/navbar.js?v=2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }
    .container { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .page-title { font-size: 24px; font-weight: 700; color: #1a1a2e; }
    .btn { border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-blue { background: #2f5597; color: white; }
    .btn-blue:hover { background: #1e3a6e; }
    .btn-gray { background: #666; color: white; }
    .btn-gray:hover { background: #444; }
    .btn-green { background: #38761d; color: white; }
    .btn-green:hover { background: #2a5a14; }
    .btn-red { background: #c00; color: white; }
    .btn:disabled { background: #bbb; cursor: not-allowed; }
    .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
    .card-title { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
    input[type="text"], select {
      width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0;
      border-radius: 8px; font-size: 14px; outline: none; font-family: inherit;
    }
    input[type="text"]:focus, select:focus { border-color: #2f5597; }
    .source-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab-btn { padding: 8px 20px; border-radius: 8px; border: 2px solid #e0e0e0; background: white; font-size: 13px; font-weight: 600; cursor: pointer; color: #666; }
    .tab-btn.active { border-color: #2f5597; background: #2f5597; color: white; }
    .items-table { width: 100%; border-collapse: collapse; }
    .items-table th { text-align: left; font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; padding: 8px 10px; background: #f8f9fa; border-bottom: 1px solid #f0f0f0; }
    .items-table td { padding: 8px 10px; border-bottom: 1px solid #f8f8f8; font-size: 13px; }
    .items-table tr:last-child td { border-bottom: none; }
    .qty-input { width: 70px; padding: 6px 8px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 13px; text-align: center; outline: none; }
    .qty-input:focus { border-color: #2f5597; }
    input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
    .total-bar { background: #f8f9fa; border-radius: 8px; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
    .total-label { font-size: 14px; color: #666; font-weight: 600; }
    .total-val { font-size: 22px; font-weight: 800; color: #1a1a2e; }
    .search-bar { width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 16px; }
    .search-bar:focus { border-color: #2f5597; }
    .loading { text-align: center; padding: 40px; color: #999; }
    .empty-msg { text-align: center; padding: 40px; color: #999; }
    .group-header td { background: #f0f4ff; font-weight: 700; color: #2f5597; font-size: 12px; padding: 6px 10px; }
    .suggested-badge { background: #d9ead3; color: #38761d; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .best-price-badge { background: #e8f4fd; color: #1565c0; padding: 2px 7px; border-radius: 8px; font-size: 10px; font-weight: 700; margin-left: 5px; white-space: nowrap; }
    .best-price-savings { color: #38761d; font-size: 10px; font-weight: 600; margin-left: 3px; }
    .manual-cat { margin-bottom: 6px; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
    .manual-cat-header { background: #f0f4ff; padding: 11px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 700; color: #2f5597; user-select: none; }
    .manual-cat-header:hover { background: #dce8ff; }
    .cat-count { font-size: 12px; font-weight: 400; color: #999; margin-left: 6px; }
    .cat-chevron { font-size: 12px; color: #999; }
    .manual-item-added td { background: #f0fff4; }
    .btn-add-item { border: none; padding: 5px 14px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; background: #2f5597; color: white; white-space: nowrap; }
    .btn-add-item:hover { background: #1e3a6e; }
    .btn-remove-item { border: none; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; background: #f5f5f5; color: #c00; white-space: nowrap; }
    .btn-remove-item:hover { background: #ffe0e0; }
  </style>
</head>
<body>

<div class="container">
  <div class="page-header">
    <div>
      <div class="page-title">➕ New Purchase Order</div>
    </div>
    <button class="btn btn-gray" onclick="window.location.href='/pos'">← Back</button>
  </div>

  <!-- Step 1: Distributor -->
  <div class="card" id="distroCard">
    <div class="card-title">📦 Distributor</div>
    <div id="distroSelector">
      <label for="distroInput">Distributor / Vendor Name</label>
      <input type="text" id="distroInput" placeholder="e.g. ABC Wholesale, Smith Distributors..." />
    </div>
  </div>

  <!-- Lead time mismatch warning -->
  <div id="leadTimeWarning" style="display:none;background:#fffbeb;border:2px solid #f6ad55;border-radius:10px;padding:16px 20px;margin-bottom:20px;color:#744210;"></div>

  <!-- Step 2: Item Source -->
  <div class="card">
    <div class="card-title">📋 Items to Order</div>

    <div class="source-tabs">
      <button class="tab-btn active" id="tabSuggested" onclick="switchTab('suggested')">⭐ From Suggested Orders</button>
      <button class="tab-btn" id="tabManual" onclick="switchTab('manual')">🔍 Add Manually</button>
    </div>

    <!-- Suggested Orders panel -->
    <div id="panelSuggested">
      <div id="suggestedContent" class="loading">Loading suggested orders...</div>
    </div>

    <!-- Manual panel -->
    <div id="panelManual" style="display:none">
      <div id="manualContent" class="loading">Loading inventory...</div>
    </div>
  </div>

  <!-- Order summary -->
  <div class="card" id="summaryCard" style="display:none">
    <div class="card-title">🧾 Order Summary</div>
    <div id="summaryTable"></div>
    <div class="total-bar">
      <span class="total-label">Estimated Total Cost</span>
      <span class="total-val" id="totalCostDisplay">$0.00</span>
    </div>
    <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end">
      <button class="btn btn-green" id="createBtn" onclick="createPO()">✅ Create Purchase Order</button>
    </div>
  </div>
</div>

<script>
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token) window.location.href = '/';

  const params = new URLSearchParams(window.location.search);
  const storeId = params.get('store');
  if (!storeId) window.location.href = '/pos';

  let allInventory = [];
  let suggestedItems = [];
  let selectedItems = {}; // itemId -> { item, qty }
  let currentTab = 'suggested';
  let fromSuggested = false;
  const manualExpandedCats = new Set(); // tracks which category accordions are open
  const manualExpandedGroups = new Set(); // tracks which item-group accordions are open
  let bestPrices = {}; // item_id -> { unit_cost, distributor_id, distributor_name }
  let distPrices = {}; // item_id -> unit_cost for the currently selected known distributor
  let selectedDistId = null; // id of the selected known distributor (null = "other")
  let knownDistributors = []; // list of distributor objects for this store
  let distLeadTimes = {}; // distributor_id -> lead_time_days for this store

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabSuggested').classList.toggle('active', tab === 'suggested');
    document.getElementById('tabManual').classList.toggle('active', tab === 'manual');
    document.getElementById('panelSuggested').style.display = tab === 'suggested' ? '' : 'none';
    document.getElementById('panelManual').style.display = tab === 'manual' ? '' : 'none';
  }

  async function loadSuggested() {
    try {
      const [invRes, priceRes, distRes, ltRes] = await Promise.all([
        fetch(`/api/inventory/items?store_id=${storeId}`, { headers: { 'Authorization': 'Bearer ' + token } }),
        fetch(`/api/distributors/best-prices?store_id=${storeId}`, { headers: { 'Authorization': 'Bearer ' + token } }),
        fetch(`/api/distributors`, { headers: { 'Authorization': 'Bearer ' + token } }),
        fetch(`/api/distributors/lead-times?store_id=${storeId}`, { headers: { 'Authorization': 'Bearer ' + token } })
      ]);
      const data = await invRes.json();
      allInventory = data.items || [];
      suggestedItems = allInventory.filter(i => (i.suggested_order || 0) > 0);

      if (priceRes.ok) {
        const priceData = await priceRes.json();
        bestPrices = priceData.best_prices || {};
      }
      if (ltRes.ok) {
        const ltData = await ltRes.json();
        distLeadTimes = {};
        (ltData.lead_times || []).forEach(lt => { distLeadTimes[lt.distributor_id] = lt.lead_time_days; });
      }
      if (distRes.ok) {
        const distData = await distRes.json();
        knownDistributors = distData.distributors || [];
        renderDistributorSelector();
      }

      // Always populate the manual tab now that inventory is loaded
      renderManualTable();

      if (suggestedItems.length === 0) {
        document.getElementById('suggestedContent').innerHTML = `
          <div class="empty-msg">
            <p>No suggested orders right now.</p>
            <p style="margin-top:8px;font-size:12px">Switch to "Add Manually" to build your PO from scratch.</p>
          </div>`;
        return;
      }

      // Pre-select all suggested items
      suggestedItems.forEach(item => {
        selectedItems[item.id] = { item, qty: item.suggested_order, fromSuggested: true };
      });
      fromSuggested = true;
      renderSuggestedTable();
      updateSummary();
    } catch (err) {
      document.getElementById('suggestedContent').innerHTML = '<div class="empty-msg">Error loading items.</div>';
    }
  }

  // ---- Distributor selector ----

  function renderDistributorSelector() {
    if (knownDistributors.length === 0) return; // keep plain text input
    const container = document.getElementById('distroSelector');
    container.innerHTML = `
      <label>Distributor</label>
      <select id="distroSelect" onchange="onDistributorChange(this)"
        style="width:100%;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;font-family:inherit">
        <option value="">— Select distributor —</option>
        ${knownDistributors.map(d => `<option value="${d.id}" data-name="${d.name.replace(/"/g,'&quot;')}">${d.name}</option>`).join('')}
        <option value="other">Other (type manually)...</option>
      </select>
      <div id="distroOtherWrap" style="display:none;margin-top:12px">
        <label>Distributor Name</label>
        <input type="text" id="distroInput" placeholder="e.g. ABC Wholesale, Smith Distributors..." style="width:100%;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;font-family:inherit" />
      </div>`;
  }

  async function onDistributorChange(select) {
    const val = select.value;
    document.getElementById('distroOtherWrap').style.display = val === 'other' ? '' : 'none';

    distPrices = {};
    selectedDistId = null;

    if (val && val !== 'other') {
      selectedDistId = val;
      try {
        const res = await fetch(`/api/distributors/${val}/prices?store_id=${storeId}`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        (data.prices || []).forEach(p => {
          if (p.unit_cost > 0) distPrices[p.item_id] = p.unit_cost;
        });
      } catch (e) {
        console.error('Error loading distributor prices:', e);
      }
    }

    renderSuggestedTable();
    renderManualTable();
    updateSummary();
    checkLeadTimeWarning();
  }

  // ---- Lead time mismatch warning ----

  function checkLeadTimeWarning() {
    const warningEl = document.getElementById('leadTimeWarning');
    if (!warningEl) return;
    warningEl.style.display = 'none';

    // Only warn if a known distributor is selected and suggested items exist
    if (!selectedDistId || suggestedItems.length === 0) return;

    const poLeadTime = distLeadTimes[selectedDistId];
    if (poLeadTime == null) return; // no lead time set for this dist — can't compare

    // Find items where cheapest source is a DIFFERENT distributor with a SHORTER lead time
    const affected = [];
    suggestedItems.forEach(item => {
      const best = bestPrices[item.id];
      if (!best || !best.distributor_id) return;
      if (best.distributor_id === selectedDistId) return; // same distributor, no issue
      const bestLeadTime = distLeadTimes[best.distributor_id];
      if (bestLeadTime == null) return; // unknown — can't compare
      if (poLeadTime > bestLeadTime) {
        // This item's suggested qty was based on best's (shorter) lead time
        // Extra days = poLeadTime - bestLeadTime
        affected.push({
          name: (item.group_name ? item.group_name + ' — ' : '') + item.variant_name,
          suggested: item.suggested_order,
          bestDist: best.distributor_name,
          bestLead: bestLeadTime,
          extraDays: poLeadTime - bestLeadTime
        });
      }
    });

    if (affected.length === 0) return;

    const poDistName = knownDistributors.find(d => d.id === selectedDistId)?.name || 'this distributor';
    const itemList = affected.slice(0, 5).map(a =>
      `<li><strong>${a.name}</strong> — suggested ${a.suggested} units (based on ${a.bestDist}'s ${a.bestLead}-day lead time, ${a.extraDays} extra days with ${poDistName})</li>`
    ).join('');
    const moreNote = affected.length > 5 ? `<li style="color:#888">...and ${affected.length - 5} more</li>` : '';

    warningEl.innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:12px">
        <span style="font-size:22px;line-height:1">⚠️</span>
        <div>
          <div style="font-weight:700;font-size:14px;margin-bottom:6px">
            Suggested quantities may be too low — ${poDistName} has a ${poLeadTime}-day lead time
          </div>
          <div style="font-size:13px;color:#744210;margin-bottom:8px">
            ${affected.length} item${affected.length !== 1 ? 's' : ''} ${affected.length !== 1 ? 'were' : 'was'} calculated using a faster distributor's lead time.
            Consider increasing these quantities to cover the extra transit days:
          </div>
          <ul style="font-size:12px;color:#744210;padding-left:18px;line-height:1.8">${itemList}${moreNote}</ul>
        </div>
      </div>`;
    warningEl.style.display = 'block';
  }

  // Returns the unit cost to use for a given item given the currently selected distributor
  function getUnitCost(item) {
    if (selectedDistId && distPrices.hasOwnProperty(item.id)) {
      return distPrices[item.id];
    }
    return item.cost || 0;
  }

  // Returns the display name of the currently selected distributor
  function getDistributorName() {
    const select = document.getElementById('distroSelect');
    if (!select) return (document.getElementById('distroInput')?.value || '').trim();
    if (!select.value || select.value === 'other') {
      return (document.getElementById('distroInput')?.value || '').trim();
    }
    return select.options[select.selectedIndex]?.dataset?.name || '';
  }

  // ---- Price badges ----

  function bestPriceBadge(itemId, invCost) {
    const bp = bestPrices[itemId];
    if (!bp || bp.unit_cost <= 0) return '';
    const savings = invCost > 0 && bp.unit_cost < invCost
      ? `<span class="best-price-savings">save $${(invCost - bp.unit_cost).toFixed(2)}</span>` : '';
    return `<span class="best-price-badge">💰 $${bp.unit_cost.toFixed(2)} · ${bp.distributor_name}</span>${savings}`;
  }

  function renderSuggestedTable() {
    const el = document.getElementById('suggestedContent');
    if (suggestedItems.length === 0) return;

    // Group by category
    const groups = {};
    suggestedItems.forEach(item => {
      const cat = item.category || 'No Category';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(item);
    });

    let html = `<table class="items-table">
      <thead><tr>
        <th style="width:32px"></th>
        <th>Item</th>
        <th>Cost</th>
        <th>Suggested Qty</th>
        <th>Order Qty</th>
        <th>Subtotal</th>
      </tr></thead><tbody>`;

    Object.keys(groups).sort().forEach(cat => {
      html += `<tr class="group-header"><td colspan="6">📁 ${cat}</td></tr>`;
      groups[cat].forEach(item => {
        const sel = selectedItems[item.id];
        const checked = sel ? 'checked' : '';
        const qty = sel ? sel.qty : item.suggested_order;
        const unitCost = getUnitCost(item);
        const subtotal = sel ? unitCost * sel.qty : 0;
        const costLabel = selectedDistId && distPrices.hasOwnProperty(item.id)
          ? `<span style="color:#2f5597;font-weight:700">$${unitCost.toFixed(2)}</span>`
          : `$${unitCost.toFixed(2)}`;
        html += `<tr>
          <td><input type="checkbox" ${checked} onchange="toggleItem('${item.id}', this.checked)" /></td>
          <td>
            <div style="font-weight:600">${item.group_name ? item.group_name + ' — ' : ''}${item.variant_name} ${bestPriceBadge(item.id, item.cost || 0)}</div>
            <div style="font-size:11px;color:#999">${item.category}</div>
          </td>
          <td>${costLabel}</td>
          <td><span class="suggested-badge">${item.suggested_order}</span></td>
          <td><input type="number" class="qty-input" id="qty_${item.id}" value="${qty}" min="1"
            onchange="updateQty('${item.id}', this.value)"
            ${!sel ? 'disabled' : ''} /></td>
          <td id="sub_${item.id}" style="font-weight:600">$${subtotal.toFixed(2)}</td>
        </tr>`;
      });
    });

    html += '</tbody></table>';
    el.innerHTML = html;
  }

  function renderManualTable() {
    const el = document.getElementById('manualContent');
    if (allInventory.length === 0) {
      el.innerHTML = '<div class="empty-msg">No inventory loaded.</div>';
      return;
    }

    // Build structure: category → { groups: { grpName: [items] }, standalone: [items] }
    const cats = {};
    allInventory.forEach(item => {
      const cat = item.category || 'No Category';
      if (!cats[cat]) cats[cat] = { groups: {}, standalone: [] };
      if (item.group_name) {
        if (!cats[cat].groups[item.group_name]) cats[cat].groups[item.group_name] = [];
        cats[cat].groups[item.group_name].push(item);
      } else {
        cats[cat].standalone.push(item);
      }
    });

    let html = '';
    Object.keys(cats).sort().forEach(cat => {
      const catKey = 'mcat-' + cat.replace(/[^a-zA-Z0-9]/g, '-');
      const { groups, standalone } = cats[cat];
      const groupNames = Object.keys(groups).sort();

      // Count added groups/items
      const addedGroups = groupNames.filter(g => groups[g].some(i => selectedItems[i.id])).length;
      const addedStandalone = standalone.filter(i => selectedItems[i.id]).length;
      const addedCount = addedGroups + addedStandalone;
      const totalCount = groupNames.length + standalone.length;
      const isExpanded = manualExpandedCats.has(cat);

      let rows = '';

      groupNames.forEach(grp => {
        const grpItems = groups[grp];
        const addedCountInGrp = grpItems.filter(i => selectedItems[i.id]).length;
        const repItem = grpItems[0];
        const grpKeySafe = catKey + '__' + grp.replace(/[^a-zA-Z0-9]/g, '_');
        const isGrpExpanded = manualExpandedGroups.has(grpKeySafe);

        // Group header row — expandable, no qty/add at this level
        rows += `<tr style="cursor:pointer" onclick="toggleManualGroup('${grpKeySafe}')">
          <td style="font-weight:600">
            <span style="display:inline-block;width:14px;color:#999">${isGrpExpanded ? '▾' : '▸'}</span>
            ${grp} <span style="color:#aaa;font-size:11px;font-weight:400">${grpItems.length} variant${grpItems.length!==1?'s':''}${addedCountInGrp > 0 ? ` · <span style="color:#38761d;font-weight:700">${addedCountInGrp} added</span>` : ''}</span> ${bestPriceBadge(repItem.id, repItem.cost||0)}
          </td>
          <td colspan="3"></td>
        </tr>`;

        if (isGrpExpanded) {
          grpItems.forEach(item => {
            const isAdded = !!selectedItems[item.id];
            const currentQty = isAdded ? selectedItems[item.id].qty : 1;
            const unitCost = getUnitCost(item);
            const costLabel = selectedDistId && distPrices.hasOwnProperty(item.id)
              ? `<span style="color:#2f5597;font-weight:700">$${unitCost.toFixed(2)}</span>`
              : `$${unitCost.toFixed(2)}`;

            if (isAdded) {
              rows += `<tr class="manual-item-added">
                <td style="padding-left:30px">${item.variant_name} ${bestPriceBadge(item.id, item.cost||0)}</td>
                <td>${costLabel}</td>
                <td><input type="number" class="qty-input" value="${currentQty}" min="1"
                  onchange="updateManualQty('${item.id}', this.value)" /></td>
                <td><button class="btn-remove-item" onclick="removeManualItem('${item.id}')">✕ Remove</button></td>
              </tr>`;
            } else {
              rows += `<tr>
                <td style="padding-left:30px">${item.variant_name} ${bestPriceBadge(item.id, item.cost||0)}</td>
                <td>${costLabel}</td>
                <td><input type="number" class="qty-input" id="mq_${item.id}" value="1" min="1" /></td>
                <td><button class="btn-add-item" onclick="addManualItem('${item.id}')">+ Add</button></td>
              </tr>`;
            }
          });
        }
      });

      if (standalone.length > 0) {
        if (groupNames.length > 0) {
          rows += `<tr><td colspan="4" style="background:#fafafa;color:#888;font-size:12px;font-style:italic;padding:6px 10px">— No variant group —</td></tr>`;
        }
        standalone.forEach(item => {
          const isAdded = !!selectedItems[item.id];
          const currentQty = isAdded ? selectedItems[item.id].qty : 1;
          const unitCost = getUnitCost(item);
          const costLabel = selectedDistId && distPrices.hasOwnProperty(item.id)
            ? `<span style="color:#2f5597;font-weight:700">$${unitCost.toFixed(2)}</span>`
            : `$${unitCost.toFixed(2)}`;

          if (isAdded) {
            rows += `<tr class="manual-item-added">
              <td style="font-weight:600">${item.variant_name} ${bestPriceBadge(item.id, item.cost||0)}</td>
              <td>${costLabel}</td>
              <td><input type="number" class="qty-input" value="${currentQty}" min="1"
                onchange="updateManualQty('${item.id}', this.value)" /></td>
              <td><button class="btn-remove-item" onclick="removeManualItem('${item.id}')">✕ Remove</button></td>
            </tr>`;
          } else {
            rows += `<tr>
              <td style="font-weight:500">${item.variant_name} ${bestPriceBadge(item.id, item.cost||0)}</td>
              <td>${costLabel}</td>
              <td><input type="number" class="qty-input" id="mq_${item.id}" value="1" min="1" /></td>
              <td><button class="btn-add-item" onclick="addManualItem('${item.id}')">+ Add</button></td>
            </tr>`;
          }
        });
      }

      html += `<div class="manual-cat">
        <div class="manual-cat-header" onclick="toggleManualCat('${cat.replace(/'/g,"\\'")}', '${catKey}')">
          <span>${cat} <span class="cat-count">${totalCount} group${totalCount!==1?'s':''}${addedCount > 0 ? ` · <span style="color:#38761d;font-weight:700">${addedCount} added</span>` : ''}</span></span>
          <span class="cat-chevron" id="chev-${catKey}">${isExpanded ? '▲' : '▼'}</span>
        </div>
        <div id="${catKey}" style="${isExpanded ? '' : 'display:none'}">
          <table class="items-table">
            <thead><tr>
              <th>Variant Group / Item</th>
              <th>Cost</th>
              <th style="width:80px">Qty</th>
              <th style="width:100px"></th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
    });

    el.innerHTML = html;
  }

  function toggleManualCat(cat, catKey) {
    const el = document.getElementById(catKey);
    const chevron = document.getElementById('chev-' + catKey);
    if (!el) return;
    const isHidden = el.style.display === 'none';
    el.style.display = isHidden ? '' : 'none';
    if (chevron) chevron.textContent = isHidden ? '▲' : '▼';
    if (isHidden) manualExpandedCats.add(cat);
    else manualExpandedCats.delete(cat);
  }

  function toggleManualGroup(grpKeySafe) {
    if (manualExpandedGroups.has(grpKeySafe)) manualExpandedGroups.delete(grpKeySafe);
    else manualExpandedGroups.add(grpKeySafe);
    renderManualTable();
  }

  // Standalone item helpers
  function addManualItem(itemId) {
    const item = allInventory.find(i => i.id === itemId);
    if (!item) return;
    const qty = Math.max(1, parseInt(document.getElementById('mq_' + itemId)?.value) || 1);
    selectedItems[itemId] = { item, qty };
    updateSummary();
    renderManualTable();
  }

  function updateManualQty(itemId, val) {
    const qty = Math.max(1, parseInt(val) || 1);
    if (selectedItems[itemId]) { selectedItems[itemId].qty = qty; updateSummary(); }
  }

  function removeManualItem(itemId) {
    delete selectedItems[itemId];
    updateSummary();
    renderManualTable();
  }

  // Keep toggleItem for the suggested tab (still uses checkboxes)
  function toggleItem(itemId, checked) {
    const item = allInventory.find(i => i.id === itemId);
    if (!item) return;

    if (checked) {
      const defaultQty = item.suggested_order || 1;
      selectedItems[itemId] = { item, qty: defaultQty };
      const qtyInput = document.getElementById('qty_' + itemId);
      if (qtyInput) { qtyInput.value = defaultQty; qtyInput.disabled = false; }
    } else {
      delete selectedItems[itemId];
      const qtyInput = document.getElementById('qty_' + itemId);
      if (qtyInput) qtyInput.disabled = true;
    }

    updateSubtotal(itemId);
    updateSummary();
  }

  function updateQty(itemId, val) {
    const qty = Math.max(1, parseInt(val) || 1);
    if (selectedItems[itemId]) {
      selectedItems[itemId].qty = qty;
      updateSubtotal(itemId);
      updateSummary();
    }
  }

  function updateSubtotal(itemId) {
    const subEl = document.getElementById('sub_' + itemId);
    if (!subEl) return;
    const sel = selectedItems[itemId];
    if (sel) {
      const sub = getUnitCost(sel.item) * sel.qty;
      subEl.textContent = '$' + sub.toFixed(2);
    } else {
      subEl.textContent = '$0.00';
    }
  }

  function updateSummary() {
    const items = Object.values(selectedItems);
    const total = items.reduce((sum, s) => sum + getUnitCost(s.item) * s.qty, 0);
    document.getElementById('totalCostDisplay').textContent = '$' + total.toFixed(2);

    const card = document.getElementById('summaryCard');
    if (items.length === 0) {
      card.style.display = 'none';
      return;
    }

    card.style.display = '';

    // Group summary by category
    const groups = {};
    items.forEach(s => {
      const cat = s.item.category || 'No Category';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(s);
    });

    let html = `<table class="items-table">
      <thead><tr><th>Item</th><th>Qty</th><th>Unit Cost</th><th>Subtotal</th></tr></thead><tbody>`;

    Object.keys(groups).sort().forEach(cat => {
      html += `<tr class="group-header"><td colspan="4">📁 ${cat}</td></tr>`;
      groups[cat].forEach(s => {
        html += `<tr>
          <td><strong>${s.item.group_name ? s.item.group_name + ' — ' : ''}${s.item.variant_name}</strong></td>
          <td>${s.qty}</td>
          <td>$${getUnitCost(s.item).toFixed(2)}</td>
          <td>$${(getUnitCost(s.item) * s.qty).toFixed(2)}</td>
        </tr>`;
      });
    });

    html += '</tbody></table>';
    document.getElementById('summaryTable').innerHTML = html;
  }

  async function createPO() {
    const distributor = getDistributorName();
    if (!distributor) { alert('Please select or enter a distributor name.'); return; }

    const items = Object.values(selectedItems);
    if (items.length === 0) { alert('Please select at least one item.'); return; }

    const btn = document.getElementById('createBtn');
    btn.disabled = true;
    btn.textContent = 'Creating...';

    const payload = {
      store_id: storeId,
      distributor,
      from_suggested: items.some(s => s.fromSuggested),
      items: items.map(s => ({
        item_id: s.item.id,
        category: s.item.category,
        group_name: s.item.group_name,
        variant_name: s.item.variant_name,
        unit_cost: getUnitCost(s.item),
        unit_price: s.item.price || 0,
        ordered_qty: s.qty
      }))
    };

    try {
      const res = await fetch('/api/pos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      if (data.needs_approval) {
        alert('This PO would put this week\'s spending over the 30% budget line, so it needs admin approval before it can be ordered. It\'s been saved and flagged for approval.');
      }
      window.location.href = `/pos/view?id=${data.po.id}`;
    } catch (err) {
      alert('Error creating PO: ' + err.message);
      btn.disabled = false;
      btn.textContent = '✅ Create Purchase Order';
    }
  }

  // Load data
  loadSuggested();
</script>
<script>loadNavbar();</script>
</body>
</html>
