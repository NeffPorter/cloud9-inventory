<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store To-Do</title>
<script src="/navbar.js?v=5"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
#navbar-container { position: sticky; top: 0; z-index: 100; }
.page { max-width: 860px; margin: 0 auto; padding: 24px 16px; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.page-title { font-size: 22px; font-weight: 600; }
.store-pills { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.store-pill { padding: 6px 16px; border: 1.5px solid #ddd; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; background: white; color: #555; transition: all .15s; white-space: nowrap; }
.store-pill:hover { border-color: #2563eb; color: #2563eb; }
.store-pill.active { background: #2563eb; color: white; border-color: #2563eb; }
.btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity .15s; }
.btn:hover { opacity: .85; }
.btn-primary { background: #2563eb; color: white; }
.btn-ghost { background: transparent; border: 1px solid #ddd; color: #444; }
.btn-sm { padding: 5px 12px; font-size: 13px; }

.section-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: #888; margin: 20px 0 10px; }
.empty { text-align: center; padding: 48px 20px; color: #888; }
.empty-icon { font-size: 40px; margin-bottom: 10px; }

.task-card { background: white; border-radius: 12px; border: 1px solid #e5e7eb; padding: 16px 18px; display: flex; align-items: flex-start; gap: 14px; margin-bottom: 10px; }
.task-card:hover { border-color: #93c5fd; }
.task-icon { font-size: 24px; flex-shrink: 0; margin-top: 2px; }
.task-info { flex: 1; min-width: 0; }
.task-title { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.task-desc { font-size: 13px; color: #666; margin-bottom: 6px; }
.task-due { font-size: 12px; color: #888; }
.task-due.overdue { color: #dc2626; font-weight: 600; }
.task-actions { display: flex; gap: 8px; flex-shrink: 0; }

.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-pending { background: #fef9c3; color: #854d0e; }
.badge-in_progress { background: #dbeafe; color: #1d4ed8; }

.all-done { text-align: center; padding: 48px 20px; }
.all-done-icon { font-size: 48px; margin-bottom: 12px; }
.all-done h3 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
.all-done p { color: #888; font-size: 14px; }
</style>
</head>
<body>
<div id="navbar-container"></div>
<div class="page">
  <div class="page-header">
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
      <h1 class="page-title">✅ Store To-Do</h1>
      <div class="store-pills" id="storePills"></div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="loadTasks()">↻ Refresh</button>
  </div>

  <div id="taskContent">
    <div class="empty"><div class="empty-icon">✅</div><div>Select a store to see its to-do list</div></div>
  </div>
</div>

<script>
const token = localStorage.getItem('token');
let stores = [], currentStoreId = null;

async function api(path) {
  const res = await fetch(path, { headers: { Authorization: 'Bearer ' + token } });
  return res.json();
}

async function init() {
  if (!token) { window.location.href = '/'; return; }
  const data = await api('/api/inventory/stores');
  stores = data.stores || [];

  const params = new URLSearchParams(location.search);
  const urlStore = params.get('store');
  const defaultStore = urlStore || (stores.length === 1 ? stores[0].id : null);

  const pills = document.getElementById('storePills');
  if (stores.length <= 1) {
    pills.style.display = 'none';
  } else {
    pills.innerHTML = stores.map(s =>
      `<button class="store-pill${s.id === defaultStore ? ' active' : ''}" onclick="selectStore('${s.id}', this)">${s.name}</button>`
    ).join('');
  }

  if (defaultStore) {
    currentStoreId = defaultStore;
    loadTasks();
  }
}

function selectStore(storeId, btn) {
  document.querySelectorAll('#storePills .store-pill').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  currentStoreId = storeId;
  loadTasks();
}

async function loadTasks() {
  const content = document.getElementById('taskContent');
  if (!currentStoreId) { content.innerHTML = '<div class="empty"><div class="empty-icon">✅</div><div>Select a store to see its to-do list</div></div>'; return; }

  content.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div><div>Loading tasks...</div></div>';

  // Fetch store tasks + assigned tasks in parallel
  const [storeTasks, assignedData] = await Promise.all([
    api(`/api/store-tasks?store_id=${currentStoreId}`),
    api('/api/assigned-tasks/mine').catch(() => ({ tasks: [] }))
  ]);

  const assigned = assignedData.tasks || [];
  const tasks = Array.isArray(storeTasks) ? storeTasks : [];

  if (tasks.length === 0 && assigned.length === 0) {
    content.innerHTML = `
      <div class="all-done">
        <div class="all-done-icon">🎉</div>
        <h3>All caught up!</h3>
        <p>No pending tasks for this store right now.</p>
      </div>`;
    return;
  }

  let html = '';

  // Assigned tasks section (from managers)
  if (assigned.length) {
    html += `<div class="section-label">📋 Assigned Tasks</div>` + assigned.map(t => renderAssignedTask(t)).join('');
  }

  const proposals = tasks.filter(t => t.task_type === 'sale_proposal');
  const stocktakes = tasks.filter(t => t.task_type === 'stocktake');

  if (proposals.length) {
    html += `<div class="section-label">🎯 Sale Proposals</div>` + proposals.map(t => renderTask(t)).join('');
  }
  if (stocktakes.length) {
    html += `<div class="section-label">📦 Monthly Stocktakes</div>` + stocktakes.map(t => renderTask(t)).join('');
  }

  content.innerHTML = html;
}

function renderAssignedTask(task) {
  const today = new Date().toISOString().split('T')[0];
  const isOverdue = task.due_date && task.due_date < today;
  const dueLabel = task.due_date ? (isOverdue ? `⚠️ Due ${task.due_date} — OVERDUE` : `Due ${task.due_date}`) : '';
  const from = task.creator ? (task.creator.name || task.creator.email) : '';
  return `
  <div class="task-card" id="atask-${task.id}" style="border-left: 3px solid #2563eb;">
    <div class="task-icon">📋</div>
    <div class="task-info">
      <div class="task-title">${task.title}</div>
      ${task.description ? `<div class="task-desc">${task.description}</div>` : ''}
      ${from ? `<div class="task-desc" style="color:#2563eb;font-size:12px;">From: ${from}</div>` : ''}
      ${dueLabel ? `<div class="task-due ${isOverdue ? 'overdue' : ''}">${dueLabel}</div>` : ''}
    </div>
    <div class="task-actions">
      <button class="btn btn-primary btn-sm" onclick="completeAssigned('${task.id}')">✓ Mark Complete</button>
    </div>
  </div>`;
}

async function completeAssigned(taskId) {
  if (!confirm('Mark this task as complete?')) return;
  const res = await fetch(`/api/assigned-tasks/${taskId}/complete`, {
    method: 'PUT',
    headers: { Authorization: 'Bearer ' + token }
  });
  if (res.ok) loadTasks();
}

function renderTask(task) {
  const today = new Date().toISOString().split('T')[0];
  const isOverdue = task.due_date && task.due_date < today;
  const icon = task.task_type === 'stocktake' ? '\U0001F4E6' : '\U0001F3AF';
  return `
  <div class="task-card">
    <div class="task-icon">${icon}</div>
    <div class="task-info">
      <div class="task-title">${task.title || 'Untitled Task'}</div>
      ${task.description ? `<div class="task-desc">${task.description}</div>` : ''}
      ${task.due_date ? `<div class="task-due ${isOverdue ? 'overdue' : ''}">Due ${task.due_date}${isOverdue ? ' \u2014 OVERDUE' : ''}</div>` : ''}
    </div>
    <div class="task-actions">
      <span class="badge badge-${task.status || 'pending'}">${task.status === 'in_progress' ? 'In Progress' : 'Pending'}</span>
    </div>
  </div>`;
}

init();
</script>
<script>loadNavbar();</script>
</body>
</html>
