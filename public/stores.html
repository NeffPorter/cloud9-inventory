<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud 9 - Stores</title>
  <script src="/navbar.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 32px 24px; }
    .page-title { font-size: 24px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    .page-subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }
    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }
    .label-hint { font-weight: 400; color: #999; font-size: 12px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #2f5597; }
    .submit-btn {
      background: #2f5597;
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .submit-btn:hover { background: #1e3a6e; }
    .submit-btn:disabled { background: #999; cursor: not-allowed; }
    .error {
      background: #fee;
      color: #c00;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }
    .success {
      background: #efe;
      color: #060;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }
    .store-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .store-row:last-child { border-bottom: none; }
    .store-info h3 { font-size: 15px; font-weight: 600; color: #1a1a2e; }
    .store-info p { font-size: 12px; color: #999; margin-top: 2px; }
    .delete-btn {
      background: #fee;
      color: #c00;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .empty { color: #999; font-size: 14px; text-align: center; padding: 24px 0; }
    .oauth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: #1a8a3c;
      color: white;
      border: none;
      padding: 16px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .oauth-btn:hover { background: #136b2e; }
    .oauth-btn:disabled { background: #999; cursor: not-allowed; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #aaa;
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }
    .banner {
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 24px;
      display: none;
    }
    .banner.success { background: #efe; color: #060; display: block; }
    .banner.error   { background: #fee; color: #c00; display: block; }
  </style>
</head>
<body>
  <script>loadNavbar();</script>

  <div class="container">
    <div class="page-title">Manage Stores</div>
    <div class="page-subtitle">Add and manage your Clover store connections</div>

    <div id="pageBanner" class="banner"></div>

    <div class="card">
      <div class="card-title">➕ Add New Store</div>
      <button class="oauth-btn" onclick="connectViaOAuth()" id="oauthBtn">
        🔗 Connect Store via Clover
      </button>
      <div class="divider">or enter credentials manually</div>
      <div class="form-group">
        <label>Store Name</label>
        <input type="text" id="storeName" placeholder="e.g. Cloud 9 - Phoenix">
      </div>
      <div class="form-group">
        <label>Merchant ID <span class="label-hint">(from Clover dashboard)</span></label>
        <input type="text" id="merchantId" placeholder="e.g. ABC123DEF456">
      </div>
      <div class="form-group">
        <label>API Token <span class="label-hint">(keep this secret!)</span></label>
        <input type="password" id="apiToken" placeholder="••••••••••••••••">
      </div>
      <button class="submit-btn" onclick="addStore()" id="addBtn">Add Store</button>
      <div class="error" id="errorMsg"></div>
      <div class="success" id="successMsg"></div>
    </div>

    <div class="card">
      <div class="card-title">🏪 Your Stores</div>
      <div id="storesList"><div class="empty">Loading stores...</div></div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!token) window.location.href = '/';
    if (user.role !== 'admin') window.location.href = '/dashboard';

    // Show banner based on query params
    const params = new URLSearchParams(window.location.search);
    const banner = document.getElementById('pageBanner');
    if (params.get('connected') === '1') {
      banner.textContent = '✅ Store connected successfully via Clover!';
      banner.className = 'banner success';
      history.replaceState({}, '', '/stores');
    } else if (params.get('error')) {
      const msgs = {
        missing_params: 'OAuth failed — missing parameters from Clover.',
        invalid_state:  'OAuth session expired. Please try again.',
        oauth_error:    'Could not connect to Clover. Check your app credentials.'
      };
      banner.textContent = '❌ ' + (msgs[params.get('error')] || 'Connection failed. Please try again.');
      banner.className = 'banner error';
      history.replaceState({}, '', '/stores');
    }

    async function connectViaOAuth() {
      const btn = document.getElementById('oauthBtn');
      btn.disabled = true;
      btn.textContent = 'Redirecting to Clover...';
      try {
        const res = await fetch('/api/auth/clover/start', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to start OAuth');
        window.location.href = data.url;
      } catch (err) {
        alert('Error: ' + err.message);
        btn.disabled = false;
        btn.textContent = '🔗 Connect Store via Clover';
      }
    }

    async function loadStores() {
      try {
        const res = await fetch('/api/inventory/stores', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const stores = data.stores || [];
        const list = document.getElementById('storesList');

        if (stores.length === 0) {
          list.innerHTML = '<div class="empty">No stores added yet</div>';
          return;
        }

        list.innerHTML = stores.map(store => `
          <div class="store-row">
            <div class="store-info">
              <h3>${store.name}</h3>
              <p>MID: ${store.merchant_id}</p>
            </div>
            <button class="delete-btn" onclick="deleteStore('${store.id}')">Remove</button>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('storesList').innerHTML = '<div class="empty">Error loading stores</div>';
      }
    }

    async function addStore() {
      const name = document.getElementById('storeName').value.trim();
      const merchant_id = document.getElementById('merchantId').value.trim();
      const api_token = document.getElementById('apiToken').value.trim();
      const btn = document.getElementById('addBtn');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!name || !merchant_id || !api_token) {
        errorMsg.textContent = 'All fields are required.';
        errorMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Adding...';

      try {
        const res = await fetch('/api/inventory/stores', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ name, merchant_id, api_token })
        });

        const data = await res.json();

        if (res.ok) {
          successMsg.textContent = '✅ Store added successfully!';
          successMsg.style.display = 'block';
          document.getElementById('storeName').value = '';
          document.getElementById('merchantId').value = '';
          document.getElementById('apiToken').value = '';
          loadStores();
        } else {
          errorMsg.textContent = data.error || 'Failed to add store.';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Could not connect to server.';
        errorMsg.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'Add Store';
    }

    async function deleteStore(id) {
      if (!confirm('Remove this store? This will permanently delete ALL inventory, sales, and schedule data for this store.')) return;
      try {
        const res = await fetch(`/api/inventory/stores/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          alert('Error removing store: ' + (data.error || res.statusText));
          return;
        }
        loadStores();
      } catch (err) {
        alert('Error removing store: ' + err.message);
      }
    }

    loadStores();
  </script>
</body>
</html>
