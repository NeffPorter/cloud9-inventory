<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud 9 - Inventory</title>
  <script src="/navbar.js?v=6"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-title { font-size: 24px; font-weight: 700; color: #1a1a2e; }
    .page-subtitle { color: #666; font-size: 14px; margin-top: 4px; }
    .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .store-pills { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
    .store-pill { padding: 6px 16px; border: 1.5px solid #ddd; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; background: white; color: #555; transition: all .15s; white-space: nowrap; }
    .store-pill:hover { border-color: #2563eb; color: #2563eb; }
    .store-pill.active { background: #2563eb; color: white; border-color: #2563eb; }
    .btn {
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-blue { background: #2f5597; color: white; }
    .btn-blue:hover { background: #1e3a6e; }
    .btn-gray { background: #666; color: white; }
    .btn-gray:hover { background: #444; }
    .btn-green { background: #38761d; color: white; }
    .btn-green:hover { background: #2a5a14; }
    .btn-orange { background: #c55a11; color: white; }
    .btn-orange:hover { background: #a34a0e; }
    .btn:disabled { background: #999; cursor: not-allowed; }
    .edit-mode-banner {
      display: none;
      background: #fff3cd;
      border: 2px solid #c55a11;
      border-radius: 10px;
      padding: 12px 20px;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 600;
      color: #c55a11;
      align-items: center;
      gap: 12px;
    }
    .edit-mode-banner.visible { display: flex; }
    .search-input {
      padding: 10px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      width: 250px;
    }
    .search-input:focus { border-color: #2f5597; }
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .mini-stat {
      background: white;
      border-radius: 10px;
      padding: 14px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .mini-stat.clickable { cursor: pointer; transition: box-shadow 0.15s, transform 0.15s; }
    .mini-stat.clickable:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.12); transform: translateY(-1px); }
    .mini-stat-value { font-size: 22px; font-weight: 800; color: #1a1a2e; }
    .mini-stat-label { font-size: 12px; color: #999; font-weight: 600; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: white; border-radius: 14px; padding: 24px; width: 100%; max-width: 700px; max-height: 85vh; overflow-y: auto; box-shadow: 0 16px 48px rgba(0,0,0,0.2); }
    .modal-box-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-box-title { font-size: 18px; font-weight: 800; color: #1a1a2e; }
    .modal-close-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: #999; line-height: 1; }
    .modal-close-btn:hover { color: #333; }
    .category-section { margin-bottom: 24px; }
    .category-header {
      background: #2f5597;
      color: white;
      padding: 12px 20px;
      border-radius: 10px 10px 0 0;
      font-size: 15px;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }
    .category-header:hover { background: #1e3a6e; }
    .category-count {
      background: rgba(255,255,255,0.2);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
    }
    .category-body {
      background: white;
      border-radius: 0 0 10px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 10px 14px;
      background: #f8f9fa;
      border-bottom: 2px solid #f0f0f0;
    }
    td {
      padding: 8px 14px;
      border-bottom: 1px solid #f8f8f8;
      font-size: 13px;
      color: #333;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbff; }
    .group-row td {
      background: #f0f4ff;
      font-weight: 700;
      color: #2f5597;
      font-size: 13px;
    }
    .item-name { font-weight: 500; }
    .stock-good { color: #38761d; font-weight: 700; }
    .stock-low { color: #c55a11; font-weight: 700; }
    .stock-out { color: #c00; font-weight: 700; }
    .stock-negative { color: #800; font-weight: 700; }
    .add-stock-btn { background:none; border:1px solid #d1d5db; border-radius:6px; padding:1px 6px; font-size:11px; color:#2563eb; cursor:pointer; margin-left:6px; line-height:1.6; }
    .add-stock-btn:hover { background:#eff6ff; }
    .add-stock-inline { display:inline-flex; align-items:center; gap:4px; margin-left:6px; }
    .add-stock-inline input { width:52px; padding:2px 4px; border:1px solid #2563eb; border-radius:5px; font-size:12px; text-align:center; }
    .add-stock-inline button { padding:2px 7px; border-radius:5px; font-size:11px; cursor:pointer; border:none; }
    .add-stock-confirm { background:#2563eb; color:white; }
    .add-stock-cancel { background:#f3f4f6; color:#555; }
    .suggested-badge {
      background: #fff2cc;
      color: #c55a11;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
    }
    .clear-suggested-btn {
      border: none; background: none; color: #ccc; cursor: pointer;
      padding: 2px 5px; border-radius: 4px; font-size: 11px; margin-left: 3px;
      vertical-align: middle; line-height: 1;
    }
    .clear-suggested-btn:hover { color: #c00; background: #fff0f0; }
    .ungrouped-row td { background: #f9f9f9; color: #aaa; font-style: italic; font-size: 12px; }
    .status-select {
      padding: 4px 8px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 12px;
      background: white;
      cursor: pointer;
    }
    .group-status-select {
      font-size: 11px;
      padding: 3px 6px;
      background: white;
      border: 1px solid #aaa;
      color: #1a1a2e;
      border-radius: 5px;
      cursor: pointer;
    }
    .group-status-select option { background: white; color: #1a1a2e; }
    .edit-input {
      width: 70px;
      padding: 4px 8px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      background: #f8f9ff;
      transition: border-color 0.2s;
    }
    .edit-input:focus { outline: none; border-color: #2f5597; }
    .edit-input.changed { border-color: #c55a11; background: #fff8f0; }
    .loading { text-align: center; padding: 60px; color: #999; font-size: 16px; }
    .empty { text-align: center; padding: 40px; color: #999; }
    .sync-status { font-size: 13px; color: #666; padding: 8px 16px; background: #f0f4ff; border-radius: 8px; }
    .dropping-row td { opacity: 0.5; text-decoration: line-through; }
    .hold-row td { opacity: 0.7; color: #999; }
    .not-tracking-row td { opacity: 0.3; color: #999; }
    .changes-bar {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1a1a2e;
      color: white;
      padding: 16px 24px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 14px;
      font-weight: 600;
      transform: translateY(150px);
      transition: transform 0.3s;
    }
    .changes-bar.visible { transform: translateY(0); }

    /* ── Products Feed section ── */
    .feed-section { margin-top: 32px; }
    .feed-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
    .feed-section-title { font-size: 20px; font-weight: 700; color: #1a1a2e; }
    .feed-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .feed-period-tab { padding: 6px 14px; border-radius: 8px; border: 1.5px solid #ddd; background: white; font-size: 12px; font-weight: 600; cursor: pointer; color: #555; transition: all .15s; }
    .feed-period-tab:hover  { border-color: #2563eb; color: #2563eb; }
    .feed-period-tab.active { border-color: #2563eb; background: #2563eb; color: white; }
    .feed-picker-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    .feed-picker-row input, .feed-picker-row select { padding: 7px 11px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 13px; outline: none; }
    .feed-picker-row input:focus, .feed-picker-row select:focus { border-color: #2563eb; }
    .feed-cards-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 768px) { .feed-cards-row { grid-template-columns: 1fr; } }
    .feed-panel { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 6px rgba(0,0,0,.06); }
    .feed-panel-title { font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .feed-count { background: #f3f4f6; color: #374151; font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .feed-range { font-size: 12px; color: #aaa; font-weight: 400; }
    .feed-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .feed-card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; background: #fafafa; }
    .feed-card-name { font-size: 13px; font-weight: 700; color: #1a1a2e; margin-bottom: 3px; }
    .feed-card-variant { font-size: 12px; color: #666; margin-bottom: 6px; }
    .feed-card-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .feed-tag { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
    .feed-tag-store    { background: #e0f2fe; color: #0369a1; }
    .feed-tag-dropping { background: #fee2e2; color: #dc2626; }
    .feed-tag-new      { background: #d1fae5; color: #065f46; }
    .feed-tag-category { background: #f3e8ff; color: #7c3aed; }
    .feed-tag-qty      { background: #f9fafb; color: #374151; border: 1px solid #e5e7eb; }
    .feed-days         { font-size: 11px; color: #aaa; margin-top: 5px; }
    .feed-empty        { text-align: center; padding: 28px; color: #bbb; font-size: 13px; }
  </style>
</head>
<body>

  <div class="changes-bar" id="changesBar">
    <span id="changesCount">Edit mode active</span>
    <button class="btn btn-gray" onclick="cancelEditMode()">✖ Cancel</button>
    <button class="btn btn-green" onclick="saveAllChanges()">💾 Save Changes</button>
  </div>

  <div class="container">
    <div class="page-header">
      <div>
        <div class="page-title" id="pageTitle">📦 Inventory</div>
        <div class="page-subtitle" id="pageSubtitle">Loading...</div>
      </div>
      <div class="header-actions">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search items..." oninput="filterItems()">
        <span class="sync-status" id="syncStatus"></span>
        <button class="btn btn-gray" onclick="toggleAllCategories()" id="collapseBtn">📂 Expand All</button>
        <button class="btn btn-orange" onclick="toggleEditMode()" id="editBtn">✏️ Edit</button>
        <button class="btn btn-blue" onclick="loadInventory()" id="refreshBtn">🔄 Refresh</button>
      </div>
    </div>

  <div class="store-pills" id="storePills"></div>

    <div class="edit-mode-banner" id="editBanner">
      ✏️ Edit Mode — Make your changes below then click Save Changes
    </div>

    <div class="stats-row" id="statsRow"></div>
    <div id="inventoryContainer" class="loading">Loading inventory...</div>

    <!-- Products Feed section -->
    <div class="feed-section" id="feedSection" style="display:none">
      <div class="feed-section-header">
        <div class="feed-section-title">🆕 Products Feed</div>
        <div class="feed-controls">
          <button class="feed-period-tab" onclick="feedSetPeriod('daily',this)">Daily</button>
          <button class="feed-period-tab" onclick="feedSetPeriod('weekly',this)">Weekly</button>
          <button class="feed-period-tab active" onclick="feedSetPeriod('monthly',this)">Monthly</button>
          <button class="feed-period-tab" onclick="feedSetPeriod('quarterly',this)">Quarterly</button>
          <button class="feed-period-tab" onclick="feedSetPeriod('custom',this)">Custom</button>
        </div>
      </div>
      <div class="feed-picker-row" id="feedPickerRow" style="display:none">
        <input type="date" id="feedDatePicker" onchange="feedLoadFromPicker()">
        <select id="feedWeekPicker" style="display:none" onchange="feedLoadFromPicker()"></select>
      </div>
      <div class="feed-picker-row" id="feedMonthRow">
        <input type="month" id="feedMonthPicker" onchange="feedLoadFromPicker()">
      </div>
      <div class="feed-picker-row" id="feedQuarterRow" style="display:none">
        <input type="text" id="feedQuarterPicker" placeholder="e.g. 2026-Q2" onchange="feedLoadFromPicker()">
      </div>
      <div class="feed-picker-row" id="feedCustomRow" style="display:none">
        <span style="font-size:12px;color:#666;font-weight:600">From</span>
        <input type="date" id="feedStartDate" onchange="feedLoadFromPicker()">
        <span style="font-size:12px;color:#666;font-weight:600">To</span>
        <input type="date" id="feedEndDate" onchange="feedLoadFromPicker()">
      </div>
      <div class="feed-cards-row">
        <div class="feed-panel">
          <div class="feed-panel-title">🔻 Dropping Products <span class="feed-count" id="feedDroppingCount">0</span></div>
          <div id="feedDroppingGrid"><div class="feed-empty">Loading...</div></div>
        </div>
        <div class="feed-panel">
          <div class="feed-panel-title">✨ New Arrivals <span class="feed-count" id="feedNewCount">0</span> <span class="feed-range" id="feedNewRange"></span></div>
          <div id="feedNewGrid"><div class="feed-empty">Loading...</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="statModal">
    <div class="modal-box">
      <div class="modal-box-header">
        <div class="modal-box-title" id="statModalTitle">Items</div>
        <button class="modal-close-btn" onclick="closeStatModal()">✕</button>
      </div>
      <div id="statModalBody"></div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!token) window.location.href = '/';

    const params = new URLSearchParams(window.location.search);
    let storeId = params.get('store');
    const isMultiStoreRole = ['him', 'admin', 'regional_manager', 'owner'].includes(user.role);

    let allItems = [];
    let storeName = '';
    let allCollapsedState = true;
    let pendingChanges = {};
    let editMode = false;
    let categorySettings = {};

    function getLowStockThreshold(category) {
      const cat = category || 'No Category';
      const setting = categorySettings[cat];
      return setting && setting.low_stock_threshold != null ? setting.low_stock_threshold : 5;
    }

    // Returns the suggested order to display — uses stored value if set, otherwise
    // calculates the restock-to-threshold amount for any active low-stock item
    const NO_ORDER_STATUSES = new Set(['Dropping', 'Not Tracking', 'discontinued']);
    function getSuggestedDisplay(item) {
      if (NO_ORDER_STATUSES.has(item.status)) return 0;
      if (item.suggested_order > 0) return item.suggested_order;
      const threshold = getLowStockThreshold(item.category);
      const qty = item.clover_qty || 0;
      if (qty <= threshold) return Math.max(1, threshold - qty);
      return 0;
    }

    async function loadCategorySettings() {
      try {
        const res = await fetch(`/api/inventory/category-settings?store_id=${storeId}`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        categorySettings = {};
        (data.settings || []).forEach(s => { categorySettings[s.category] = s; });
      } catch (err) {
        categorySettings = {};
      }
    }

    async function loadStoreName() {
      const res = await fetch('/api/inventory/stores', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      const store = (data.stores || []).find(s => s.id === storeId);
      if (store) {
        storeName = store.name;
        document.getElementById('pageTitle').textContent = `📦 ${store.name} — Inventory`;
        document.getElementById('pageSubtitle').textContent = 'Live Clover inventory levels';
      }
    }

    async function loadInventory() {
      try {
        const res = await fetch(`/api/inventory/items?store_id=${storeId}`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        allItems = data.items || [];

        if (allItems.length === 0) {
          document.getElementById('inventoryContainer').innerHTML = `
            <div class="empty">
              <h3 style="font-size:18px;color:#666;margin-bottom:8px">No inventory yet</h3>
              <p style="color:#999">Inventory will populate automatically from Clover</p>
            </div>`;
          updateStats([]);
          return;
        }

        const lastSync = allItems[0]?.last_synced
          ? new Date(allItems[0].last_synced).toLocaleString()
          : '—';
        document.getElementById('syncStatus').textContent = `Last sync: ${lastSync}`;

        updateStats(allItems);
        renderInventory(allItems);
      } catch (err) {
        document.getElementById('inventoryContainer').innerHTML = '<div class="empty">Error loading inventory</div>';
      }
    }

    function updateStats(items) {
      const total = items.length;
      const lowStock = items.filter(i => i.clover_qty > 0 && i.clover_qty <= getLowStockThreshold(i.category) && i.status === 'Active').length;
      const outOfStock = items.filter(i => i.clover_qty <= 0 && i.status === 'Active').length;
      const suggested = items.filter(i => getSuggestedDisplay(i) > 0).length;

      document.getElementById('statsRow').innerHTML = `
        <div class="mini-stat">
          <div class="mini-stat-value">${total}</div>
          <div class="mini-stat-label">Total Items</div>
        </div>
        <div class="mini-stat clickable" onclick="openStatModal('low')">
          <div class="mini-stat-value" style="color:#c55a11">${lowStock}</div>
          <div class="mini-stat-label">Low Stock</div>
        </div>
        <div class="mini-stat clickable" onclick="openStatModal('out')">
          <div class="mini-stat-value" style="color:#c00">${outOfStock}</div>
          <div class="mini-stat-label">Out of Stock</div>
        </div>
        <div class="mini-stat clickable" onclick="window.location.href='/suggested?store=${storeId}'">
          <div class="mini-stat-value" style="color:#c55a11">${suggested}</div>
          <div class="mini-stat-label">Need Ordering</div>
        </div>
      `;
    }

    function openStatModal(type) {
      let items, title;
      if (type === 'low') {
        items = allItems.filter(i => i.clover_qty > 0 && i.clover_qty <= getLowStockThreshold(i.category) && i.status === 'Active');
        title = '⚠️ Low Stock Items';
      } else {
        items = allItems.filter(i => i.clover_qty <= 0 && i.status === 'Active');
        title = '🚫 Out of Stock Items';
      }

      document.getElementById('statModalTitle').textContent = `${title} (${items.length})`;
      document.getElementById('statModalBody').innerHTML = renderStatItemsList(items);
      document.getElementById('statModal').classList.add('open');
    }

    function closeStatModal() {
      document.getElementById('statModal').classList.remove('open');
    }

    function renderStatItemsList(items) {
      if (items.length === 0) return '<div class="empty">No items</div>';

      const categories = {};
      items.forEach(item => {
        const cat = item.category || 'No Category';
        if (!categories[cat]) categories[cat] = [];
        categories[cat].push(item);
      });

      return Object.keys(categories).sort().map(catName => {
        const catItems = categories[catName];
        const catId = 'modalcat-' + catName.replace(/[^a-zA-Z0-9]/g, '-');

        const rows = catItems.map(item => {
          const qty = item.clover_qty || 0;
          const qtyClass = qty < 0 ? 'stock-negative' : qty === 0 ? 'stock-out' : qty <= getLowStockThreshold(item.category) ? 'stock-low' : 'stock-good';
          return `
            <tr>
              <td class="item-name">${item.variant_name}</td>
              <td>$${(item.cost || 0).toFixed(2)}</td>
              <td>$${(item.price || 0).toFixed(2)}</td>
              <td class="${qtyClass}">${qty}</td>
              <td>${getSuggestedDisplay(item) > 0 ? `<span class="suggested-badge">Order ${getSuggestedDisplay(item)}</span>` : '—'}</td>
            </tr>`;
        }).join('');

        return `
          <div class="category-section">
            <div class="category-header" onclick="toggleCategory('${catId}')">
              ${catName}
              <span class="category-count">${catItems.length} items</span>
            </div>
            <div class="category-body" id="${catId}" style="display:none">
              <table>
                <thead>
                  <tr>
                    <th>Item / Variant</th>
                    <th>Cost</th>
                    <th>Price</th>
                    <th>Clover Qty</th>
                    <th>Suggested Order</th>
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>`;
      }).join('');
    }

    function renderInventory(items) {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const filtered = searchTerm
        ? items.filter(i =>
            i.variant_name?.toLowerCase().includes(searchTerm) ||
            i.group_name?.toLowerCase().includes(searchTerm) ||
            i.category?.toLowerCase().includes(searchTerm))
        : items;

      const categories = {};
      filtered.forEach(item => {
        const cat = item.category || 'No Category';
        if (!categories[cat]) categories[cat] = {};
        const grp = item.group_name || '___standalone';
        if (!categories[cat][grp]) categories[cat][grp] = [];
        categories[cat][grp].push(item);
      });

      // Fallback grouping: Clover sometimes leaves a variant out of its item
      // group (e.g. when it's priced differently). If an "ungrouped" item's
      // name starts with an existing group's name in this category, fold it
      // into that group instead of showing it as a standalone item.
      Object.keys(categories).forEach(cat => {
        const groups = categories[cat];
        const namedGroups = Object.keys(groups).filter(g => g !== '___standalone');
        if (namedGroups.length === 0 || !groups['___standalone']) return;

        groups['___standalone'] = groups['___standalone'].filter(item => {
          const name = (item.variant_name || '').toLowerCase().trim();
          const match = namedGroups.find(g => name.startsWith(g.toLowerCase().trim() + ' '));
          if (match) {
            groups[match].push(item);
            return false;
          }
          return true;
        });

        if (groups['___standalone'].length === 0) delete groups['___standalone'];
      });

      const container = document.getElementById('inventoryContainer');

      if (Object.keys(categories).length === 0) {
        container.innerHTML = '<div class="empty">No items match your search</div>';
        return;
      }

      container.innerHTML = Object.keys(categories).sort().map(catName => {
        const groups = categories[catName];
        const itemCount = Object.values(groups).flat().length;
        const catId = 'cat-' + catName.replace(/[^a-zA-Z0-9]/g, '-');

        const hasNamedGroups = Object.keys(groups).some(g => g !== '___standalone');

        const rows = Object.keys(groups).sort().map(grpName => {
          const items = groups[grpName];
          let html = '';

          if (grpName !== '___standalone') {
            const escapedGrp = grpName.replace(/"/g, '&quot;');
            const escapedCat = catName.replace(/"/g, '&quot;');
            html += `<tr class="group-row">
              <td colspan="5">${grpName}</td>
              <td>
                <select class="group-status-select" title="Set status for all items in this group"
                  data-group="${escapedGrp}" data-cat="${escapedCat}"
                  onchange="updateGroupStatus(this)">
                  <option value="">Set all...</option>
                  <option value="Active">Active</option>
                  <option value="Dropping">Dropping</option>
                  <option value="On Hold">On Hold</option>
                  <option value="Not Tracking">Not Tracking</option>
                </select>
              </td>
            </tr>`;
          } else if (hasNamedGroups) {
            // Clearly separate ungrouped items when mixed with grouped items
            html += `<tr class="group-row ungrouped-row"><td colspan="6">— Other items (no group) —</td></tr>`;
          }

          html += items.map(item => {
            const qty = item.clover_qty || 0;
            const qtyClass = qty < 0 ? 'stock-negative' : qty === 0 ? 'stock-out' : qty <= getLowStockThreshold(item.category) ? 'stock-low' : 'stock-good';
            const rowClass = item.status === 'Dropping' ? 'dropping-row' :
                            item.status === 'On Hold' ? 'hold-row' :
                            item.status === 'Not Tracking' ? 'not-tracking-row' : '';

            if (editMode) {
              return `
                <tr class="${rowClass}">
                  <td class="item-name">${item.variant_name}</td>
                  <td>
                    <input type="number" step="0.01" class="edit-input" data-field="cost" data-item="${item.id}" data-original="${(item.cost || 0).toFixed(2)}"
                      value="${(item.cost || 0).toFixed(2)}" onchange="markChanged(this)">
                  </td>
                  <td>
                    <input type="number" step="0.01" class="edit-input" data-field="price" data-item="${item.id}" data-original="${(item.price || 0).toFixed(2)}"
                      value="${(item.price || 0).toFixed(2)}" onchange="markChanged(this)">
                  </td>
                  <td>
                    <input type="number" class="edit-input" data-field="clover_qty" data-item="${item.id}" data-original="${qty}"
                      value="${qty}" onchange="markChanged(this)">
                    <button class="add-stock-btn" onclick="showAddStock('${item.id}', this)" title="Receive stock">+</button>
                  </td>
                  <td>${getSuggestedDisplay(item) > 0 ? `<span class="suggested-badge">Order ${getSuggestedDisplay(item)}</span>${item.suggested_order > 0 ? `<button class="clear-suggested-btn" onclick="clearSuggestedOrder('${item.id}')" title="Clear suggested order">✕</button>` : ''}` : '—'}</td>
                  <td>
                    <select class="status-select" onchange="updateStatus('${item.id}', this.value)">
                      <option value="Active" ${item.status === 'Active' ? 'selected' : ''}>Active</option>
                      <option value="Dropping" ${item.status === 'Dropping' ? 'selected' : ''}>Dropping</option>
                      <option value="On Hold" ${item.status === 'On Hold' ? 'selected' : ''}>On Hold</option>
                      <option value="Not Tracking" ${item.status === 'Not Tracking' ? 'selected' : ''}>Not Tracking</option>
                    </select>
                  </td>
                </tr>`;
            } else {
              return `
                <tr class="${rowClass}">
                  <td class="item-name">${item.variant_name}</td>
                  <td>$${(item.cost || 0).toFixed(2)}</td>
                  <td>$${(item.price || 0).toFixed(2)}</td>
                  <td class="${qtyClass}">
                    ${qty}
                    <button class="add-stock-btn" onclick="showAddStock('${item.id}', this)" title="Receive stock">+</button>
                  </td>
                  <td>${getSuggestedDisplay(item) > 0 ? `<span class="suggested-badge">Order ${getSuggestedDisplay(item)}</span>${item.suggested_order > 0 ? `<button class="clear-suggested-btn" onclick="clearSuggestedOrder('${item.id}')" title="Clear suggested order">✕</button>` : ''}` : '—'}</td>
                  <td>
                    <select class="status-select" onchange="updateStatus('${item.id}', this.value)">
                      <option value="Active" ${item.status === 'Active' ? 'selected' : ''}>Active</option>
                      <option value="Dropping" ${item.status === 'Dropping' ? 'selected' : ''}>Dropping</option>
                      <option value="On Hold" ${item.status === 'On Hold' ? 'selected' : ''}>On Hold</option>
                      <option value="Not Tracking" ${item.status === 'Not Tracking' ? 'selected' : ''}>Not Tracking</option>
                    </select>
                  </td>
                </tr>`;
            }
          }).join('');

          return html;
        }).join('');

        return `
          <div class="category-section">
            <div class="category-header" onclick="toggleCategory('${catId}')">
              ${catName}
              <span class="category-count">${itemCount} items</span>
            </div>
            <div class="category-body" id="${catId}" style="${allCollapsedState ? 'display:none' : ''}">
              <table>
                <thead>
                  <tr>
                    <th>Item / Variant</th>
                    <th>Cost</th>
                    <th>Price</th>
                    <th>Clover Qty</th>
                    <th>Suggested Order</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>`;
      }).join('');
    }

    function toggleEditMode() {
      editMode = !editMode;
      pendingChanges = {};

      const editBtn = document.getElementById('editBtn');
      const banner = document.getElementById('editBanner');
      const bar = document.getElementById('changesBar');

      if (editMode) {
        editBtn.textContent = '✖ Exit Edit';
        editBtn.classList.remove('btn-orange');
        editBtn.classList.add('btn-gray');
        banner.classList.add('visible');
        bar.classList.add('visible');
      } else {
        editBtn.textContent = '✏️ Edit';
        editBtn.classList.add('btn-orange');
        editBtn.classList.remove('btn-gray');
        banner.classList.remove('visible');
        bar.classList.remove('visible');
      }

      renderInventory(allItems);
    }

    function cancelEditMode() {
      editMode = false;
      pendingChanges = {};
      document.getElementById('editBtn').textContent = '✏️ Edit';
      document.getElementById('editBtn').classList.add('btn-orange');
      document.getElementById('editBtn').classList.remove('btn-gray');
      document.getElementById('editBanner').classList.remove('visible');
      document.getElementById('changesBar').classList.remove('visible');
      renderInventory(allItems);
    }

    function markChanged(input) {
      const itemId = input.dataset.item;
      const field = input.dataset.field;
      const value = input.value;
      const original = input.dataset.original;

      if (value !== original) {
        input.classList.add('changed');
        if (!pendingChanges[itemId]) pendingChanges[itemId] = {};
        pendingChanges[itemId][field] = field === 'clover_qty'
          ? (parseInt(value) || 0)
          : (parseFloat(value) || 0);
      } else {
        input.classList.remove('changed');
        if (pendingChanges[itemId]) {
          delete pendingChanges[itemId][field];
          if (Object.keys(pendingChanges[itemId]).length === 0) {
            delete pendingChanges[itemId];
          }
        }
      }

      const count = Object.keys(pendingChanges).length;
      document.getElementById('changesCount').textContent =
        count > 0 ? `${count} item${count > 1 ? 's' : ''} changed` : 'Edit mode active';
    }

    async function saveAllChanges() {
      const itemIds = Object.keys(pendingChanges);
      if (itemIds.length === 0) { cancelEditMode(); return; }

      document.getElementById('changesCount').textContent = 'Saving...';

      let saved = 0;
      for (const itemId of itemIds) {
        try {
          const res = await fetch(`/api/inventory/items/${itemId}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify(pendingChanges[itemId])
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const item = allItems.find(i => i.id === itemId);
          if (item) Object.assign(item, pendingChanges[itemId]);
          saved++;
        } catch (err) {
          console.error('Save error for item', itemId, ':', err);
        }
      }

      document.getElementById('changesCount').textContent = `✅ Saved ${saved} items!`;
      pendingChanges = {};
      setTimeout(() => cancelEditMode(), 1500);
    }

    document.getElementById('statModal').addEventListener('click', function(e) {
      if (e.target === this) closeStatModal();
    });

    function toggleCategory(id) {
      const el = document.getElementById(id);
      if (el) el.style.display = el.style.display === 'none' ? '' : 'none';
    }

    function toggleAllCategories() {
      allCollapsedState = !allCollapsedState;
      document.querySelectorAll('[id^="cat-"]').forEach(el => {
        el.style.display = allCollapsedState ? 'none' : '';
      });
      document.getElementById('collapseBtn').textContent =
        allCollapsedState ? '📂 Expand All' : '📂 Collapse All';
    }

    function filterItems() {
      renderInventory(allItems);
    }

    async function updateStatus(itemId, status) {
      try {
        await fetch(`/api/inventory/items/${itemId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ status })
        });
        const item = allItems.find(i => i.id === itemId);
        if (item) item.status = status;
        renderInventory(allItems);
      } catch (err) {
        console.error('Update status error:', err);
      }
    }

    async function updateGroupStatus(selectEl) {
      const status = selectEl.value;
      if (!status) return;
      const groupName = selectEl.dataset.group;
      const catName = selectEl.dataset.cat;

      const groupItems = allItems.filter(i =>
        i.group_name === groupName &&
        (i.category || 'No Category') === catName
      );

      selectEl.disabled = true;
      for (const item of groupItems) {
        try {
          await fetch(`/api/inventory/items/${item.id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ status })
          });
          item.status = status;
        } catch (err) {
          console.error('Error updating group status:', err);
        }
      }
      renderInventory(allItems);
    }

    function showAddStock(itemId, btn) {
      // Close any other open add-stock inputs
      document.querySelectorAll('.add-stock-inline').forEach(el => el.remove());
      document.querySelectorAll('.add-stock-btn').forEach(el => el.style.display = '');

      btn.style.display = 'none';
      const wrap = document.createElement('span');
      wrap.className = 'add-stock-inline';
      wrap.innerHTML = `
        <input type="number" placeholder="+/- qty" id="addStockInput_${itemId}" autofocus>
        <button class="add-stock-confirm" onclick="confirmAddStock('${itemId}')">✓</button>
        <button class="add-stock-cancel" onclick="cancelAddStock('${itemId}', this)">✕</button>
      `;
      btn.insertAdjacentElement('afterend', wrap);
      wrap.querySelector('input').focus();
      wrap.querySelector('input').addEventListener('keydown', e => {
        if (e.key === 'Enter') confirmAddStock('${itemId}');
        if (e.key === 'Escape') cancelAddStock('${itemId}', wrap.querySelector('.add-stock-cancel'));
      });
    }

    function cancelAddStock(itemId, btn) {
      const wrap = btn.closest('.add-stock-inline');
      const addBtn = wrap ? wrap.previousElementSibling : null;
      if (wrap) wrap.remove();
      if (addBtn && addBtn.classList.contains('add-stock-btn')) addBtn.style.display = '';
    }

    async function confirmAddStock(itemId) {
      const input = document.getElementById('addStockInput_' + itemId);
      const qty = parseInt(input?.value);
      if (!qty || qty === 0) return;

      const wrap = input?.closest('.add-stock-inline');
      const addBtn = wrap?.previousElementSibling;
      if (wrap) wrap.innerHTML = '<span style="font-size:11px;color:#888">Saving...</span>';

      try {
        const r = await fetch('/api/inventory/add-stock', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ store_id: storeId, item_id: itemId, qty_received: qty })
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Failed');

        // Update local item
        const item = allItems.find(i => i.id === itemId);
        if (item) {
          item.clover_qty = data.new_qty;
          item.suggested_order = data.new_suggested;
        }
        if (wrap) wrap.remove();
        if (addBtn && addBtn.classList.contains('add-stock-btn')) addBtn.style.display = '';
        updateStats(allItems);
        renderInventory(allItems);
      } catch (err) {
        if (wrap) wrap.innerHTML = '<span style="color:red;font-size:11px">' + err.message + '</span>';
      }
    }

    async function clearSuggestedOrder(itemId) {
      try {
        await fetch(`/api/inventory/items/${itemId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ suggested_order: 0 })
        });
        const item = allItems.find(i => i.id === itemId);
        if (item) item.suggested_order = 0;
        updateStats(allItems);
        renderInventory(allItems);
      } catch (err) {
        console.error('Error clearing suggested order:', err);
      }
    }

    async function init() {
      if (!storeId) {
        if (!isMultiStoreRole) { window.location.href = '/dashboard'; return; }

        // Multi-store role with no store: inject a store selector and wait
        document.getElementById('pageTitle').textContent = '📦 Inventory';
        document.getElementById('pageSubtitle').textContent = 'Select a store to get started';
        document.getElementById('inventoryContainer').innerHTML = `
          <div style="text-align:center;padding:80px 20px;color:#999;">
            <div style="font-size:52px;margin-bottom:16px">📦</div>
            <div style="font-size:17px;font-weight:600;color:#666;">Select a store above to view inventory</div>
          </div>`;

        try {
          const res = await fetch('/api/inventory/stores', { headers: { 'Authorization': 'Bearer ' + token } });
          const data = await res.json();
          const stores = data.stores || [];
          const pills = document.getElementById('storePills');
          pills.innerHTML = stores.map(s =>
            `<button class="store-pill" onclick="selectInventoryStore('${s.id}', this)">${s.name}</button>`
          ).join('');

    function selectInventoryStore(id, btn) {
      document.querySelectorAll('#storePills .store-pill').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      storeId = id;
      history.replaceState(null, '', `/inventory?store=${storeId}`);
      loadStoreName();
      loadCategorySettings().then(() => { loadInventory(); showFeed(); });
    }

    init();

    // Auto-refresh every 30s — only when a store is selected and not in edit mode
    setInterval(() => {
      if (!editMode && storeId) loadInventory();
    }, 30000);

    // ── Products Feed ────────────────────────────────────────────────────────
    let feedPeriod = 'monthly', feedStart, feedEnd;
    let feedStoresMap = null;
    const feedPad = n => String(n).padStart(2,'0');

    function feedBuildWeeks(sel) {
      const now = new Date();
      const diff = now.getDay() === 0 ? -6 : 1 - now.getDay();
      const mon = new Date(now); mon.setDate(now.getDate() + diff); mon.setHours(0,0,0,0);
      let html = '';
      for (let i = -4; i <= 52; i++) {
        const m = new Date(mon); m.setDate(mon.getDate() - i * 7);
        const s = new Date(m); s.setDate(m.getDate() + 6);
        const val = m.toISOString().split('T')[0];
        const lbl = m.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + ' – ' + s.toLocaleDateString('en-US',{month:'short',day:'numeric'});
        html += `<option value="${val}"${i===0?' selected':''}>${lbl}</option>`;
      }
      sel.innerHTML = html;
    }

    function feedSetPeriod(period, btn) {
      feedPeriod = period;
      document.querySelectorAll('.feed-period-tab').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      const now = new Date();
      const todayStr = `${now.getFullYear()}-${feedPad(now.getMonth()+1)}-${feedPad(now.getDate())}`;
      document.getElementById('feedPickerRow').style.display  = 'none';
      document.getElementById('feedMonthRow').style.display   = 'none';
      document.getElementById('feedQuarterRow').style.display = 'none';
      document.getElementById('feedCustomRow').style.display  = 'none';
      if (period === 'daily') {
        document.getElementById('feedPickerRow').style.display = '';
        document.getElementById('feedDatePicker').style.display = '';
        document.getElementById('feedWeekPicker').style.display = 'none';
        const p = document.getElementById('feedDatePicker');
        if (!p.value) p.value = todayStr;
        const d = new Date(p.value + 'T00:00:00');
        feedStart = new Date(d); feedStart.setHours(0,0,0,0);
        feedEnd   = new Date(d); feedEnd.setHours(23,59,59,999);
      } else if (period === 'weekly') {
        document.getElementById('feedPickerRow').style.display = '';
        document.getElementById('feedDatePicker').style.display = 'none';
        const ws = document.getElementById('feedWeekPicker');
        ws.style.display = '';
        if (!ws.options.length) feedBuildWeeks(ws);
        const d = new Date(ws.value + 'T00:00:00');
        const diff2 = d.getDay() === 0 ? -6 : 1 - d.getDay();
        feedStart = new Date(d); feedStart.setDate(d.getDate() + diff2); feedStart.setHours(0,0,0,0);
        feedEnd   = new Date(feedStart); feedEnd.setDate(feedStart.getDate() + 6); feedEnd.setHours(23,59,59,999);
      } else if (period === 'monthly') {
        document.getElementById('feedMonthRow').style.display = '';
        const p = document.getElementById('feedMonthPicker');
        if (!p.value) p.value = `${now.getFullYear()}-${feedPad(now.getMonth()+1)}`;
        const [y, m] = p.value.split('-');
        const last = new Date(y, m, 0).getDate();
        feedStart = new Date(`${y}-${m}-01T00:00:00`);
        feedEnd   = new Date(`${y}-${m}-${feedPad(last)}T23:59:59`);
      } else if (period === 'quarterly') {
        document.getElementById('feedQuarterRow').style.display = '';
        const p = document.getElementById('feedQuarterPicker');
        if (!p.value) { const q = Math.ceil((now.getMonth()+1)/3); p.value = `${now.getFullYear()}-Q${q}`; }
        const match = p.value.match(/(\d{4})-Q(\d)/);
        if (!match) return;
        const [, y, q] = match;
        const sm = (parseInt(q)-1)*3+1, em = sm+2;
        feedStart = new Date(`${y}-${feedPad(sm)}-01T00:00:00`);
        feedEnd   = new Date(`${y}-${feedPad(em)}-${feedPad(new Date(y,em,0).getDate())}T23:59:59`);
      } else if (period === 'custom') {
        document.getElementById('feedCustomRow').style.display = '';
        const s = document.getElementById('feedStartDate').value;
        const e = document.getElementById('feedEndDate').value;
        if (!s || !e) return;
        feedStart = new Date(s + 'T00:00:00');
        feedEnd   = new Date(e + 'T23:59:59');
      }
      loadFeed();
    }

    function feedLoadFromPicker() { feedSetPeriod(feedPeriod, document.querySelector('.feed-period-tab.active')); }

    function feedCard(item) {
      const name = feedStoresMap ? (feedStoresMap[item.store_id] || item.store_id) : item.store_id;
      const daysOld = item.created_at ? Math.floor((Date.now() - new Date(item.created_at)) / 86400000) : null;
      const isDropping = item.status === 'Dropping';
      return `<div class="feed-card">
        <div class="feed-card-name">${item.group_name || item.variant_name || item.id}</div>
        ${item.variant_name && item.group_name ? `<div class="feed-card-variant">${item.variant_name}</div>` : ''}
        <div class="feed-card-meta">
          <span class="feed-tag feed-tag-store">${name}</span>
          ${isDropping ? '<span class="feed-tag feed-tag-dropping">Dropping</span>' : '<span class="feed-tag feed-tag-new">New</span>'}
          ${item.category ? `<span class="feed-tag feed-tag-category">${item.category}</span>` : ''}
          ${item.clover_qty != null ? `<span class="feed-tag feed-tag-qty">Qty: ${item.clover_qty}</span>` : ''}
        </div>
        ${daysOld !== null ? `<div class="feed-days">Added ${daysOld === 0 ? 'today' : daysOld + 'd ago'}</div>` : ''}
      </div>`;
    }

    async function ensureFeedStoresMap() {
      if (feedStoresMap) return;
      try {
        const r = await fetch('/api/inventory/stores', { headers: { Authorization: 'Bearer ' + token } });
        const d = await r.json();
        feedStoresMap = {};
        (d.stores || d || []).forEach(s => { feedStoresMap[s.id] = s.name; });
      } catch (e) { feedStoresMap = {}; }
    }

    async function loadFeed() {
      if (!feedStart || !feedEnd) return;
      document.getElementById('feedDroppingGrid').innerHTML = '<div class="feed-empty">Loading...</div>';
      document.getElementById('feedNewGrid').innerHTML      = '<div class="feed-empty">Loading...</div>';
      await ensureFeedStoresMap();
      let url = '/api/inventory/items?limit=500';
      if (storeId) url += `&store_id=${storeId}`;
      try {
        const r = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
        const data = await r.json();
        const items = data.items || data || [];
        const dropping = items.filter(i => i.status === 'Dropping');
        const newItems = items.filter(i => {
          if (i.status === 'Dropping' || !i.created_at) return false;
          const t = new Date(i.created_at).getTime();
          return t >= feedStart.getTime() && t <= feedEnd.getTime();
        });
        document.getElementById('feedDroppingCount').textContent = dropping.length;
        document.getElementById('feedNewCount').textContent      = newItems.length;
        document.getElementById('feedNewRange').textContent = `(${feedStart.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${feedEnd.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})})`;
        document.getElementById('feedDroppingGrid').innerHTML = dropping.length
          ? `<div class="feed-grid">${dropping.map(feedCard).join('')}</div>`
          : '<div class="feed-empty">No products currently marked as Dropping.</div>';
        document.getElementById('feedNewGrid').innerHTML = newItems.length
          ? `<div class="feed-grid">${newItems.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).map(feedCard).join('')}</div>`
          : '<div class="feed-empty">No new products in this period.</div>';
      } catch (e) {
        document.getElementById('feedDroppingGrid').innerHTML = '<div class="feed-empty">Error loading feed.</div>';
        document.getElementById('feedNewGrid').innerHTML      = '<div class="feed-empty">Error loading feed.</div>';
      }
    }

    function showFeed() {
      document.getElementById('feedSection').style.display = '';
      feedSetPeriod('monthly', document.querySelector('.feed-period-tab.active'));
    }
  </script>
  <script>loadNavbar();</script>
</body>
</html>
