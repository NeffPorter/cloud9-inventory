<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud 9 - Dashboard</title>
  <script src="/navbar.js?v=6"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    @media (max-width: 700px) {
      .container { padding: 16px 12px; }
      .store-quick-stats { grid-template-columns: 1fr; }
    }
    .page-title { font-size: 24px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    .page-subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .stat-label {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .stat-value { font-size: 28px; font-weight: 800; color: #1a1a2e; }
    .section-title { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; }
    .stores-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .store-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-left: 4px solid #2f5597;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .store-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .store-name { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .store-mid { font-size: 12px; color: #999; margin-bottom: 16px; }
    .store-quick-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .quick-stat {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .quick-stat-value { font-size: 18px; font-weight: 700; color: #1a1a2e; }
    .quick-stat-label { font-size: 10px; color: #999; font-weight: 600; text-transform: uppercase; margin-top: 2px; }
    .store-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .action-btn {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .action-btn:hover { opacity: 0.8; }
    .btn-blue { background: #dce8f8; color: #2f5597; }
    .btn-green { background: #d9ead3; color: #38761d; }
    .btn-orange { background: #fce8b2; color: #c55a11; }
    .empty-state { text-align: center; padding: 60px 20px; color: #999; }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: #666; }
    .add-store-btn {
      background: #2f5597;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
    }
    .loading { text-align: center; padding: 60px; color: #999; }
  </style>
</head>
<body>
  <script>loadNavbar();</script>

  <div class="container">
    <div class="page-title">Dashboard</div>
    <div class="page-subtitle" id="pageSubtitle">Welcome back!</div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Stores</div>
        <div class="stat-value" id="totalStores">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Today's Sales</div>
        <div class="stat-value" id="todaySales">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Orders Today</div>
        <div class="stat-value" id="todayOrders">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active POs</div>
        <div class="stat-value" id="activePOs">—</div>
      </div>
    </div>

    <div class="section-title">Your Stores</div>
    <div id="storesContainer" class="loading">Loading stores...</div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!token) window.location.href = '/';

    document.getElementById('pageSubtitle').textContent = `Welcome back, ${user.name || 'there'}!`;

    async function loadStores() {
      try {
        const res = await fetch('/api/inventory/stores', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.status === 401) { window.location.href = '/'; return; }
        const data = await res.json();
        const stores = data.stores || [];

        document.getElementById('totalStores').textContent = stores.length;

        const container = document.getElementById('storesContainer');
        if (stores.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <h3>No stores yet</h3>
              <p>Add your first store to get started</p>
              ${['admin','him','regional_manager'].includes(user.role) ? '<button class="add-store-btn" onclick="window.location.href=\'/stores\'">+ Add Store</button>' : ''}
            </div>`;
          return;
        }

        container.className = 'stores-grid';
        container.innerHTML = stores.map(s => `
          <div class="store-card">
            <div class="store-name">${s.name}</div>
            <div class="store-mid">MID: ${s.merchant_id}</div>
            <div class="store-quick-stats">
              <div class="quick-stat">
                <div class="quick-stat-value" id="sales-${s.id}">—</div>
                <div class="quick-stat-label">Today's Sales</div>
              </div>
              <div class="quick-stat">
                <div class="quick-stat-value" id="orders-${s.id}">—</div>
                <div class="quick-stat-label">Orders</div>
              </div>
            </div>
            <div class="store-actions">
              <button class="action-btn btn-blue" onclick="window.location.href='/inventory?store=${s.id}'">📦 Inventory</button>
              <button class="action-btn btn-orange" onclick="window.location.href='/pos?store=${s.id}'">🛒 POs</button>
              <button class="action-btn btn-green" onclick="window.location.href='/suggested?store=${s.id}'">📋 Suggested</button>
            </div>
          </div>
        `).join('');

        loadTodaysSales(stores);
      } catch (err) {
        document.getElementById('storesContainer').innerHTML = '<div class="empty-state"><h3>Error loading stores</h3></div>';
      }
    }

    async function loadTodaysSales(stores) {
      try {
        const now = new Date();
        const start = new Date(now); start.setHours(0,0,0,0);
        const end = new Date(now); end.setHours(23,59,59,999);

        const res = await fetch(`/api/sales/by-store?start=${start.toISOString()}&end=${end.toISOString()}`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const storeData = data.stores || [];

        let totalSales = 0;
        let totalOrders = 0;

        storeData.forEach(s => {
          totalSales += s.net || 0;
          totalOrders += s.orders || 0;
        });

        document.getElementById('todaySales').textContent = '$' + totalSales.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        document.getElementById('todayOrders').textContent = totalOrders;
        document.getElementById('activePOs').textContent = '—';

        stores.forEach(store => {
          const storeStats = storeData.find(s => s.store_id === store.id);
          if (storeStats) {
            const salesEl = document.getElementById(`sales-${store.id}`);
            const ordersEl = document.getElementById(`orders-${store.id}`);
            if (salesEl) salesEl.textContent = '$' + (storeStats.net || 0).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            if (ordersEl) ordersEl.textContent = storeStats.orders || 0;
          }
        });
      } catch (err) {
        console.error('Error loading today sales:', err);
      }
    }

    loadStores();
  </script>
</body>
</html>
