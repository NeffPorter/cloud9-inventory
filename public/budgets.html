<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Reports – Cloud 9</title>
  <script src="/navbar.js?v=2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; color: #1a1a2e; }

    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 32px 20px; }

    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
    }
    .page-title { font-size: 26px; font-weight: 800; }
    .page-title span { color: #2f5597; }

    .store-pills { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .store-pill { padding: 6px 16px; border: 1.5px solid #ddd; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; background: white; color: #555; transition: all .15s; white-space: nowrap; }
    .store-pill:hover { border-color: #2563eb; color: #2563eb; }
    .store-pill.active { background: #2563eb; color: white; border-color: #2563eb; }

    /* Current week card */
    .current-card {
      background: linear-gradient(135deg, #1a1a2e 0%, #2f5597 100%);
      border-radius: 16px; padding: 28px; color: white;
      margin-bottom: 32px; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(47,85,151,0.3);
    }
    .current-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(47,85,151,0.4); }
    .current-card-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; margin-bottom: 8px; }
    .current-card-title { font-size: 22px; font-weight: 800; margin-bottom: 16px; }

    .current-stats { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 18px; }
    .current-stat { flex: 1; min-width: 120px; }
    .current-stat-label { font-size: 11px; opacity: 0.7; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .current-stat-value { font-size: 20px; font-weight: 800; }

    .budget-bar-wrap { margin-top: 4px; }
    .budget-bar-bg { background: rgba(255,255,255,0.2); border-radius: 6px; height: 10px; overflow: hidden; }
    .budget-bar-fill { height: 100%; border-radius: 6px; transition: width 0.5s; }
    .budget-bar-label { font-size: 12px; opacity: 0.8; margin-top: 6px; }

    .current-status-badge {
      display: inline-block; padding: 4px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* Quarter sections */
    .section-title {
      font-size: 13px; font-weight: 700; color: #888;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin: 28px 0 12px;
    }

    .budget-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 8px rgba(0,0,0,0.07); margin-bottom: 4px; }
    .budget-table th {
      background: #f8f9fa; font-size: 11px; font-weight: 700; color: #888;
      text-transform: uppercase; letter-spacing: 0.5px;
      padding: 10px 16px; text-align: left; border-bottom: 1px solid #f0f0f0;
    }
    .budget-table td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid #f7f7f7; vertical-align: middle; }
    .budget-table tr:last-child td { border-bottom: none; }
    .budget-table tr.clickable:hover td { background: #f0f4ff; cursor: pointer; }

    .status-badge {
      display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .status-active { background: #e8f5e9; color: #2e7d32; }
    .status-pending { background: #fff3e0; color: #e65100; }
    .status-approved { background: #e3f2fd; color: #1565c0; }
    .status-complete { background: #f3f3f3; color: #666; }

    .progress-mini { width: 80px; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 8px; }
    .progress-mini-fill { height: 100%; border-radius: 3px; }

    .empty-state { text-align: center; padding: 48px 20px; color: #aaa; font-size: 15px; }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

    .loading { text-align: center; padding: 48px; color: #aaa; font-size: 15px; }

    /* Completed budgets tree */
    .cb-year { font-size: 18px; font-weight: 800; color: #1a1a2e; margin: 32px 0 12px; padding-bottom: 6px; border-bottom: 2px solid #e8ecf4; }
    .cb-quarter { margin-bottom: 20px; }
    .cb-quarter-header {
      display: flex; align-items: center; justify-content: space-between;
      background: #eef2fb; border-radius: 10px; padding: 11px 16px;
      cursor: pointer; user-select: none; margin-bottom: 4px;
    }
    .cb-quarter-header:hover { background: #e0e8f7; }
    .cb-quarter-title { font-size: 14px; font-weight: 700; color: #2f5597; }
    .cb-quarter-meta { font-size: 12px; color: #666; }
    .cb-quarter-chevron { font-size: 12px; color: #999; transition: transform 0.2s; }
    .cb-quarter-body { padding-left: 8px; }
    .cb-month { margin-bottom: 8px; }
    .cb-month-header {
      font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase;
      letter-spacing: 0.5px; padding: 6px 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
    }
    .cb-month-header:hover { color: #555; }
    .cb-month-weeks { }
    .cb-week-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 16px; border-radius: 8px; cursor: pointer;
      transition: background 0.15s; font-size: 13px;
    }
    .cb-week-row:hover { background: #f0f4ff; }
    .cb-week-dates { font-weight: 600; color: #1a1a2e; flex: 1; }
    .cb-week-spent { color: #1a1a2e; font-weight: 600; width: 90px; text-align: right; }
    .cb-week-bar { width: 60px; height: 5px; background: #e8ecf4; border-radius: 3px; overflow: hidden; margin: 0 12px; }
    .cb-week-bar-fill { height: 100%; border-radius: 3px; }
    .cb-week-pct { width: 42px; text-align: right; font-size: 12px; color: #888; }
    .cb-week-link { color: #2f5597; font-size: 12px; font-weight: 600; margin-left: 12px; white-space: nowrap; }
    .cb-week-link:hover { text-decoration: underline; }

    /* Completed budgets tree */
    .cb-year { font-size: 18px; font-weight: 800; color: #1a1a2e; margin: 32px 0 12px; padding-bottom: 6px; border-bottom: 2px solid #e8ecf4; }
    .cb-quarter { margin-bottom: 20px; }
    .cb-quarter-header {
      display: flex; align-items: center; justify-content: space-between;
      background: #eef2fb; border-radius: 10px; padding: 11px 16px;
      cursor: pointer; user-select: none; margin-bottom: 4px;
    }
    .cb-quarter-header:hover { background: #e0e8f7; }
    .cb-quarter-title { font-size: 14px; font-weight: 700; color: #2f5597; }
    .cb-quarter-meta { font-size: 12px; color: #666; }
    .cb-quarter-chevron { font-size: 12px; color: #999; transition: transform 0.2s; }
    .cb-quarter-body { padding-left: 8px; }
    .cb-month { margin-bottom: 6px; }
    .cb-month-header {
      font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase;
      letter-spacing: 0.5px; padding: 6px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .cb-week-row {
      display: flex; align-items: center;
      padding: 9px 16px; border-radius: 8px; cursor: pointer;
      transition: background 0.15s; font-size: 13px;
    }
    .cb-week-row:hover { background: #f0f4ff; }
    .cb-week-dates { font-weight: 600; color: #1a1a2e; flex: 1; }
    .cb-week-spent { color: #1a1a2e; font-weight: 600; width: 90px; text-align: right; }
    .cb-week-bar { width: 60px; height: 5px; background: #e8ecf4; border-radius: 3px; overflow: hidden; margin: 0 12px; }
    .cb-week-bar-fill { height: 100%; border-radius: 3px; }
    .cb-week-pct { width: 42px; text-align: right; font-size: 12px; color: #888; }
    .cb-week-link { color: #2f5597; font-size: 12px; font-weight: 600; margin-left: 12px; white-space: nowrap; }
  </style>
</head>
<body>
<script>loadNavbar();</script>

<div class="page-wrap">
  <div class="page-header">
    <div class="page-title">💰 <span>Budget</span> Reports</div>
    <div class="store-pills" id="storePills" style="display:none"></div>
  </div>

  <div id="mainContent"><div class="loading">Loading budgets…</div></div>
</div>

<script>
const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user') || '{}');

let currentStoreId = null;
let stores = [];

// Get store_id from URL or user
const urlParams = new URLSearchParams(window.location.search);
const urlStore = urlParams.get('store');

async function init() {
  if (!token) { window.location.href = '/'; return; }

  if (['admin', 'him', 'regional_manager'].includes(user.role)) {
    // Load all stores, show selector
    const res = await fetch('/api/inventory/stores', { headers: { Authorization: 'Bearer ' + token } });
    const data = await res.json();
    stores = data.stores || [];

    currentStoreId = urlStore || stores[0]?.id;
    if (stores.length > 1) {
      const pills = document.getElementById('storePills');
      pills.style.display = 'flex';
      pills.innerHTML = stores.map(s =>
        `<button class="store-pill${s.id === currentStoreId ? ' active' : ''}" onclick="selectBudgetStore('${s.id}', this)">${s.name}</button>`
      ).join('');
    } else {
    }
  } else {
    currentStoreId = user.store_id || urlStore;
  }

  if (currentStoreId) {
    loadBudgets(currentStoreId);
  } else {
    document.getElementById('mainContent').innerHTML =
      '<div class="empty-state"><div class="icon">⚠️</div>No store found for your account. Contact an admin to make sure your user has a store assigned.</div>';
  }
}

function selectBudgetStore(storeId, btn) {
  document.querySelectorAll('#storePills .store-pill').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  currentStoreId = storeId;
  loadBudgets(storeId);
}

async function loadBudgets(storeId) {
  document.getElementById('mainContent').innerHTML = '<div class="loading">Loading budgets…</div>';

  try {
    // Auto-create / fetch current week
    const [currentRes, listRes] = await Promise.all([
      fetch(`/api/budgets/current/${storeId}`, { headers: { Authorization: 'Bearer ' + token } }),
      fetch(`/api/budgets?store_id=${storeId}`, { headers: { Authorization: 'Bearer ' + token } })
    ]);

    const currentData = await currentRes.json();
    const listData = await listRes.json();

    if (!currentRes.ok) {
      throw new Error(currentData.error || `Failed to load current budget (${currentRes.status})`);
    }
    if (!listRes.ok) {
      throw new Error(listData.error || `Failed to load budget history (${listRes.status})`);
    }

    const currentBudget = currentData.budget;
    const allBudgets = (listData.budgets || []);

    // Remove current week from history list to avoid duplication
    const history = allBudgets.filter(b => b.id !== currentBudget?.id);

    renderPage(currentBudget, history, storeId);
  } catch (err) {
    document.getElementById('mainContent').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div>Couldn't load budgets: ${err.message}</div>`;
    console.error('loadBudgets error:', err);
  }
}

function formatDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${m}/${day}/${y.slice(2)}`;
}

function formatMoney(n) {
  return '$' + (n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function getStatusBadge(status) {
  const map = {
    active: { cls: 'status-active', label: 'Active' },
    pending_approval: { cls: 'status-pending', label: 'Needs Approval' },
    approved_extended: { cls: 'status-approved', label: 'Extended' },
    complete: { cls: 'status-complete', label: 'Complete' }
  };
  const s = map[status] || { cls: 'status-active', label: status };
  return `<span class="status-badge ${s.cls}">${s.label}</span>`;
}

function spendColor(pct) {
  if (pct >= 100) return '#e53e3e';
  if (pct >= 85) return '#e65100';
  return '#2f5597';
}

function renderPage(current, history, storeId) {
  let html = '';

  // ── Current Week ──────────────────────────────────────────────────────────
  if (current) {
    const budget = current.status === 'approved_extended' ? current.budget_45 : current.budget_30;
    const spent = current.total_invoiced || 0;
    const pct = budget > 0 ? Math.min(100, (spent / budget) * 100) : 0;
    const color = spendColor(pct);
    const remaining = Math.max(0, budget - spent);

    const statusBadgeMap = {
      active: { bg: 'rgba(255,255,255,0.2)', color: 'white', label: 'Active' },
      pending_approval: { bg: '#ff9800', color: 'white', label: '⚠️ Needs Approval' },
      approved_extended: { bg: '#42a5f5', color: 'white', label: '✅ Extended (45%)' },
      complete: { bg: 'rgba(255,255,255,0.2)', color: 'white', label: '✔ Complete' }
    };
    const sb = statusBadgeMap[current.status] || statusBadgeMap.active;

    html += `
      <div class="current-card" onclick="window.location.href='/budget-view?id=${current.id}'">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:14px">
          <div>
            <div class="current-card-label">Current Week</div>
            <div class="current-card-title">Week of ${formatDate(current.week_start)} – ${formatDate(current.week_end)}</div>
          </div>
          <span class="current-status-badge" style="background:${sb.bg};color:${sb.color}">${sb.label}</span>
        </div>

        <div class="current-stats">
          <div class="current-stat">
            <div class="current-stat-label">Prev Week Sales</div>
            <div class="current-stat-value">${formatMoney(current.prev_week_net_sales)}</div>
          </div>
          <div class="current-stat">
            <div class="current-stat-label">Budget (30%)</div>
            <div class="current-stat-value">${formatMoney(current.budget_30)}</div>
          </div>
          ${current.status === 'approved_extended' ? `
          <div class="current-stat">
            <div class="current-stat-label">Extended (45%)</div>
            <div class="current-stat-value">${formatMoney(current.budget_45)}</div>
          </div>` : ''}
          <div class="current-stat">
            <div class="current-stat-label">Spent So Far</div>
            <div class="current-stat-value">${formatMoney(spent)}</div>
          </div>
          <div class="current-stat">
            <div class="current-stat-label">Remaining</div>
            <div class="current-stat-value">${formatMoney(remaining)}</div>
          </div>
        </div>

        <div class="budget-bar-wrap">
          <div class="budget-bar-bg">
            <div class="budget-bar-fill" style="width:${pct}%;background:${color}"></div>
          </div>
          <div class="budget-bar-label">${pct.toFixed(1)}% of budget used — click to view details</div>
        </div>
        ${current.prev_week_net_sales > 0 ? (() => {
          const sp = ((spent / current.prev_week_net_sales) * 100).toFixed(1);
          const spColor = sp > 45 ? '#f97316' : sp > 30 ? '#fbbf24' : '#86efac';
          return `<div style="margin-top:10px;display:flex;align-items:center;gap:10px;font-size:13px;opacity:0.9">
            <span>Spent as % of prev week sales:</span>
            <span style="font-weight:800;font-size:15px;color:${spColor}">${sp}%</span>
          </div>`;
        })() : ''}
      </div>`;
  }

  // ── Completed Budgets (Year > Quarter > Month > Week) ───────────────────
  if (history.length === 0) {
    html += `<div class="empty-state"><div class="icon">📂</div>No past budgets yet.</div>`;
  } else {
    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    const tree = {};
    history.forEach(b => {
      const d = new Date(b.week_start + 'T12:00:00');
      const yr = d.getFullYear();
      const mo = d.getMonth();
      const qn = Math.ceil((mo + 1) / 3);
      const qk = 'Q' + qn + ' ' + yr;
      if (!tree[yr]) tree[yr] = {};
      if (!tree[yr][qk]) tree[yr][qk] = {};
      if (!tree[yr][qk][mo]) tree[yr][qk][mo] = [];
      tree[yr][qk][mo].push(b);
    });

    html += `<div style="margin-top:8px;font-size:12px;color:#888;margin-bottom:4px">Past budget reports — click any week to view details.</div>`;

    Object.keys(tree).sort().reverse().forEach(yr => {
      html += `<div class="cb-year">${yr}</div>`;
      const yrQ = tree[yr];
      Object.keys(yrQ).sort().reverse().forEach(qk => {
        const months = yrQ[qk];
        let qSpent = 0, qBudget = 0, qWeeks = 0;
        Object.values(months).forEach(weeks => {
          weeks.forEach(b => {
            const bgt = b.status === 'approved_extended' ? b.budget_45 : b.budget_30;
            qSpent += b.total_invoiced || 0;
            qBudget += bgt || 0;
            qWeeks++;
          });
        });
        const qPct = qBudget > 0 ? ((qSpent / qBudget) * 100).toFixed(1) : '—';
        const qId = 'q_' + qk.replace(/[^a-z0-9]/gi, '_');

        html += `
        <div class="cb-quarter">
          <div class="cb-quarter-header" onclick="toggleSection('${qId}')">
            <div>
              <div class="cb-quarter-title">${qk}</div>
              <div class="cb-quarter-meta">${qWeeks} weeks &nbsp;·&nbsp; Spent ${formatMoney(qSpent)} of ${formatMoney(qBudget)} (${qPct}%)</div>
            </div>
            <div class="cb-quarter-chevron" id="${qId}_chev">▼</div>
          </div>
          <div class="cb-quarter-body" id="${qId}">`;

        Object.keys(months).map(Number).sort().forEach(mo => {
          const weeks = months[mo];
          let mSpent = 0, mBudget = 0;
          weeks.forEach(b => {
            const bgt = b.status === 'approved_extended' ? b.budget_45 : b.budget_30;
            mSpent += b.total_invoiced || 0;
            mBudget += bgt || 0;
          });
          const mPct = mBudget > 0 ? ((mSpent / mBudget) * 100).toFixed(1) : '—';

          html += `
            <div class="cb-month">
              <div class="cb-month-header">
                <span>${MONTHS[mo]}</span>
                <span style="font-weight:400;color:#aaa">${formatMoney(mSpent)} / ${formatMoney(mBudget)} &nbsp;(${mPct}%)</span>
              </div>
              <div class="cb-month-weeks">`;

          weeks.slice().sort((a,b) => a.week_start.localeCompare(b.week_start)).forEach(b => {
            const bgt = b.status === 'approved_extended' ? b.budget_45 : b.budget_30;
            const spent = b.total_invoiced || 0;
            const pct = bgt > 0 ? Math.min(110, (spent / bgt) * 100) : 0;
            const barColor = pct >= 100 ? '#e53e3e' : pct >= 85 ? '#e65100' : '#2f5597';
            html += `
                <div class="cb-week-row" onclick="window.location.href='/budget-view?id=${b.id}'">
                  <div class="cb-week-dates">Week of ${formatDate(b.week_start)} – ${formatDate(b.week_end)}</div>
                  <div class="cb-week-spent">${formatMoney(spent)}</div>
                  <div class="cb-week-bar"><div class="cb-week-bar-fill" style="width:${pct.toFixed(0)}%;background:${barColor}"></div></div>
                  <div class="cb-week-pct">${bgt > 0 ? ((spent/bgt)*100).toFixed(0)+'%' : '—'}</div>
                  <div class="cb-week-link">View →</div>
                </div>`;
          });

          html += `
              </div>
            </div>`;
        });

        html += `
          </div>
        </div>`;
      });
    });
  }

  document.getElementById('mainContent').innerHTML = html;
}

function toggleSection(id) {
  const el = document.getElementById(id);
  const chev = document.getElementById(id + '_chev');
  if (!el) return;
  const hidden = el.style.display === 'none';
  el.style.display = hidden ? '' : 'none';
  if (chev) chev.style.transform = hidden ? '' : 'rotate(-90deg)';
}

init();
</script>
</body>
</html>
