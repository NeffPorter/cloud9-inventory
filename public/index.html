<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud 9 Inventory</title>
  <link rel="icon" type="image/png" href="/logo-icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }
    .top-logo {
      max-width: 320px;
      width: 80%;
      height: auto;
    }
    .login-box {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo img {
      max-width: 80px;
      width: 100%;
      height: auto;
    }
    .logo p {
      color: #666;
      font-size: 14px;
      margin-top: 4px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #2f5597; }
    button {
      width: 100%;
      padding: 14px;
      background: #2f5597;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    button:hover { background: #1e3a6e; }
    button:disabled { background: #999; cursor: not-allowed; }
    .error {
      background: #fee;
      color: #c00;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }
    .success {
      background: #efe;
      color: #060;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <img class="top-logo" src="/logo-wordmark.png" alt="Cloud 9 Vapor">
  <div class="login-box">
    <div class="logo">
      <img src="/logo-icon.png" alt="Cloud 9">
      <p>Inventory Management</p>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button onclick="login()" id="loginBtn">Sign In</button>
    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>
  </div>

  <script>
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!email || !password) {
        errorMsg.textContent = 'Please enter your email and password.';
        errorMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          successMsg.textContent = '✅ Logged in! Redirecting...';
          successMsg.style.display = 'block';
          setTimeout(() => window.location.href = '/dashboard', 1000);
        } else {
          errorMsg.textContent = data.error || 'Login failed.';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Could not connect to server.';
        errorMsg.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'Sign In';
    }

    document.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
