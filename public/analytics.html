<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics - Cloud 9</title>
  <script src="/navbar.js?v=5"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; }
    .page { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
    .page-header { margin-bottom: 24px; }
    .page-title { font-size: 24px; font-weight: 700; color: #1a1a2e; }
    .page-subtitle { color: #666; font-size: 14px; margin-top: 4px; }

    /* Standard controls — matches sales.html */
    .controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; margin-bottom: 24px; background: white; padding: 16px; border-radius: 12px; border: 1px solid #e5e7eb; }
    .control-group { display: flex; flex-direction: column; gap: 5px; }
    .control-group label { font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: .04em; }
    .controls input, .controls select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: white; }
    .preset-btn { padding: 7px 16px; border-radius: 8px; border: 1.5px solid #ddd; background: white; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; color: #555; }
    .preset-btn:hover { border-color: #2563eb; color: #2563eb; }
    .preset-btn.active { border-color: #2563eb; background: #2563eb; color: white; }
    .btn { padding: 8px 18px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }

    /* Section headers */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin: 28px 0 16px; }
    .section-title { font-size: 18px; font-weight: 700; color: #1a1a2e; }

    /* Platform cards */
    .platform-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; margin-bottom: 28px; }
    .platform-card { background: white; border-radius: 12px; border: 1px solid #e5e7eb; overflow: hidden; }
    .platform-card-header { padding: 16px 18px 12px; border-bottom: 1px solid #f3f4f6; display: flex; align-items: center; gap: 12px; }
    .platform-logo { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .logo-google { background: #fef2f2; }
    .logo-apple { background: #f5f5f5; }
    .logo-facebook { background: #eff6ff; }
    .platform-name { font-size: 15px; font-weight: 700; }
    .platform-status { margin-left: auto; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; }
    .badge-live { background: #d1fae5; color: #065f46; }
    .badge-unconfigured { background: #f3f4f6; color: #6b7280; }
    .badge-error { background: #fee2e2; color: #dc2626; }
    .badge-loading { background: #dbeafe; color: #1d4ed8; }
    .platform-card-body { padding: 14px 18px 18px; }
    .metric-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
    .metric-box { flex: 1; min-width: 80px; background: #f9fafb; border-radius: 8px; padding: 10px 12px; }
    .metric-val { font-size: 22px; font-weight: 700; }
    .metric-lbl { font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }
    .setup-banner { background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #92400e; }
    .setup-banner code { background: #fef3c7; padding: 1px 5px; border-radius: 4px; font-size: 12px; font-family: monospace; }
    .breakdown-toggle { font-size: 12px; font-weight: 600; color: #2563eb; cursor: pointer; margin-top: 8px; display: inline-block; }
    .breakdown-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
    .breakdown-table th { text-align: left; padding: 6px 8px; border-bottom: 1px solid #e5e7eb; color: #888; font-weight: 600; text-transform: uppercase; font-size: 10px; }
    .breakdown-table td { padding: 7px 8px; border-bottom: 1px solid #f3f4f6; color: #374151; }

    /* Transaction section */
    .summary-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .summary-card { background: white; border-radius: 10px; border: 1px solid #e5e7eb; padding: 16px 18px; }
    .summary-card .val { font-size: 26px; font-weight: 700; }
    .summary-card .lbl { font-size: 11px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-top: 4px; }
    .val-green { color: #16a34a; }
    .val-red { color: #dc2626; }
    .val-blue { color: #2563eb; }
    .stores-table-wrap { background: white; border-radius: 12px; border: 1px solid #e5e7eb; overflow: hidden; }
    .stores-table { width: 100%; border-collapse: collapse; }
    .stores-table th { text-align: left; padding: 11px 16px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .04em; }
    .stores-table td { padding: 13px 16px; border-bottom: 1px solid #f3f4f6; font-size: 13px; }
    .stores-table tr:last-child td { border-bottom: none; }
    .stores-table .store-name { font-weight: 600; }
    .refund-val { color: #dc2626; }
    .loading-msg { text-align: center; padding: 32px; color: #999; font-size: 14px; }
    .error-msg { text-align: center; padding: 24px; color: #dc2626; font-size: 13px; }
  </style>
</head>
<body>
<script>loadNavbar();</script>

<div class="page">
  <div class="page-header">
    <div class="page-title">📊 Analytics</div>
    <div class="page-subtitle">Platform insights and sales data</div>
  </div>

  <!-- Standard controls bar -->
  <div class="controls">
    <div class="control-group">
      <label>Store</label>
      <select id="storeSelect" onchange="applyRange()">
        <option value="">All Stores</option>
      </select>
    </div>
    <div class="control-group">
      <label>From</label>
      <input type="date" id="startDate">
    </div>
    <div class="control-group">
      <label>To</label>
      <input type="date" id="endDate">
    </div>
    <div class="control-group">
      <label>&nbsp;</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="preset-btn active" onclick="setPreset('month',this)">This Month</button>
        <button class="preset-btn" onclick="setPreset(7,this)">7 Days</button>
        <button class="preset-btn" onclick="setPreset(30,this)">30 Days</button>
      </div>
    </div>
    <div class="control-group">
      <label>&nbsp;</label>
      <button class="btn btn-primary" onclick="applyRange()">Apply</button>
    </div>
  </div>

  <!-- Platform Analytics -->
  <div class="section-header">
    <div class="section-title">📡 Platform Analytics</div>
  </div>
  <div class="platform-grid">
    <div class="platform-card">
      <div class="platform-card-header">
        <div class="platform-logo logo-google">🔍</div>
        <div><div class="platform-name">Google Business</div></div>
        <div class="platform-status"><span class="badge badge-loading" id="badge-google">Loading...</span></div>
      </div>
      <div class="platform-card-body" id="body-google"><div class="loading-msg">Fetching data...</div></div>
    </div>
    <div class="platform-card">
      <div class="platform-card-header">
        <div class="platform-logo logo-apple">🍎</div>
        <div><div class="platform-name">Apple Business Connect</div></div>
        <div class="platform-status"><span class="badge badge-loading" id="badge-apple">Loading...</span></div>
      </div>
      <div class="platform-card-body" id="body-apple"><div class="loading-msg">Fetching data...</div></div>
    </div>
    <div class="platform-card">
      <div class="platform-card-header">
        <div class="platform-logo logo-facebook">📘</div>
        <div><div class="platform-name">Facebook Pages</div></div>
        <div class="platform-status"><span class="badge badge-loading" id="badge-facebook">Loading...</span></div>
      </div>
      <div class="platform-card-body" id="body-facebook"><div class="loading-msg">Fetching data...</div></div>
    </div>
  </div>

  <!-- Sales Analytics -->
  <div class="section-header">
    <div class="section-title">💰 Sales Analytics</div>
  </div>
  <div id="summaryCards" class="summary-cards"></div>
  <div id="storesTable"></div>
</div>

<script>
const token = localStorage.getItem('token');
const user  = JSON.parse(localStorage.getItem('user') || '{}');
const ALLOWED = ['regional_manager','him','admin','owner','media'];
if (!token || !ALLOWED.includes(user.role)) window.location.href = '/dashboard';

// ---- Date helpers ----
function todayStr() { return new Date().toISOString().split('T')[0]; }
function daysAgoStr(n) { const d = new Date(); d.setDate(d.getDate()-n+1); return d.toISOString().split('T')[0]; }
function monthStartStr() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`; }

function setPreset(val, btn) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (val === 'month') {
    document.getElementById('startDate').value = monthStartStr();
    document.getElementById('endDate').value   = todayStr();
  } else {
    document.getElementById('startDate').value = daysAgoStr(val);
    document.getElementById('endDate').value   = todayStr();
  }
  applyRange();
}

function applyRange() {
  const start = document.getElementById('startDate').value;
  const end   = document.getElementById('endDate').value;
  loadAllPlatforms(start, end);
  loadTransactions(start, end);
}

// ---- Store loader ----
async function loadStores() {
  try {
    const r = await fetch('/api/inventory/stores', { headers: { Authorization: 'Bearer ' + token } });
    const d = await r.json();
    const stores = d.stores || d || [];
    const sel = document.getElementById('storeSelect');
    stores.forEach(s => {
      const o = document.createElement('option');
      o.value = s.id; o.textContent = s.name;
      sel.appendChild(o);
    });
    // If user has only one store, auto-select it
    if (stores.length === 1) sel.value = stores[0].id;
  } catch(e) {}
}

// ---- Platform loaders ----
function fmt(n) { return (n||0).toLocaleString(); }

async function loadPlatform(key, start, end) {
  const badge = document.getElementById('badge-'+key);
  const body  = document.getElementById('body-'+key);
  badge.className = 'badge badge-loading'; badge.textContent = 'Loading...';
  body.innerHTML = '<div class="loading-msg">Fetching...</div>';
  try {
    const params = (start && end) ? `?start=${start}&end=${end}` : '';
    const res = await fetch(`/api/analytics/${key}${params}`, { headers: { Authorization: 'Bearer '+token } });
    const d = await res.json();
    if (!d.configured) {
      badge.className = 'badge badge-unconfigured'; badge.textContent = 'Not Configured';
      body.innerHTML = setupBanner(key); return;
    }
    if (d.error) {
      badge.className = 'badge badge-error'; badge.textContent = 'Error';
      body.innerHTML = `<div class="error-msg">⚠️ ${d.error}</div>`; return;
    }
    badge.className = 'badge badge-live'; badge.textContent = 'Live';
    body.innerHTML = renderPlatform(key, d);
  } catch(e) {
    badge.className = 'badge badge-error'; badge.textContent = 'Error';
    body.innerHTML = `<div class="error-msg">⚠️ ${e.message}</div>`;
  }
}

function setupBanner(key) {
  const hints = {
    google: 'Add store Google location IDs in Stores settings.',
    apple:  'Add store Apple location IDs in Stores settings.',
    facebook: 'Add Facebook page ID and token in Stores settings.'
  };
  return `<div class="setup-banner"><strong>Not configured.</strong> ${hints[key]}</div>`;
}

function renderPlatform(key, d) {
  const t = d.totals || {};
  if (key === 'google') return `
    <div class="metric-row">
      <div class="metric-box"><div class="metric-val">${fmt(t.impressions)}</div><div class="metric-lbl">Impressions</div></div>
      <div class="metric-box"><div class="metric-val">${fmt(t.calls)}</div><div class="metric-lbl">Calls</div></div>
      <div class="metric-box"><div class="metric-val">${fmt(t.directions)}</div><div class="metric-lbl">Directions</div></div>
      <div class="metric-box"><div class="metric-val">${fmt(t.websiteClicks)}</div><div class="metric-lbl">Website</div></div>
    </div>${breakdownTable(d.locations||[], ['Impressions','Calls','Dir.','Web'], l=>[fmt(l.impressions),fmt(l.calls),fmt(l.directions),fmt(l.websiteClicks)])}`;
  if (key === 'apple') return `
    <div class="metric-row">
      <div class="metric-box"><div class="metric-val">${fmt(t.impressions)}</div><div class="metric-lbl">Impressions</div></div>
      <div class="metric-box"><div class="metric-val">${fmt(t.taps)}</div><div class="metric-lbl">Taps</div></div>
      <div class="metric-box"><div class="metric-val">${fmt(t.calls)}</div><div class="metric-lbl">Calls</div></div>
      <div class="metric-box"><div class="metric-val">${fmt(t.directions)}</div><div class="metric-lbl">Directions</div></div>
    </div>${breakdownTable(d.locations||[], ['Impressions','Taps','Calls','Dir.'], l=>[fmt(l.impressions),fmt(l.taps),fmt(l.calls),fmt(l.directions)])}`;
  if (key === 'facebook') return `
    <div class="metric-row">
      <div class="metric-box"><div class="metric-val">${fmt(t.fans)}</div><div class="metric-lbl">Likes</div></div>
      <div class="metric-box"><div class="metric-val">${fmt(t.impressions)}</div><div class="metric-lbl">Impressions</div></div>
      <div class="metric-box"><div class="metric-val">${fmt(t.engaged)}</div><div class="metric-lbl">Engaged</div></div>
      <div class="metric-box"><div class="metric-val">${fmt(t.views)}</div><div class="metric-lbl">Views</div></div>
    </div>${breakdownTable(d.pages||[], ['Likes','Followers','Impressions','Views'], p=>[fmt(p.fans),fmt(p.followers),fmt(p.impressions),fmt(p.views)])}`;
  return '';
}

function breakdownTable(rows, headers, getVals) {
  if (rows.length <= 1) return '';
  return `<span class="breakdown-toggle" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'table':'none';this.textContent=(this.textContent.startsWith('▼')?'▲':'▼')+this.textContent.slice(1)">▼ Per-location breakdown</span>
  <table class="breakdown-table" style="display:none">
    <tr><th>Location</th>${headers.map(h=>`<th>${h}</th>`).join('')}</tr>
    ${rows.map(r=>`<tr><td>${r.name||r.locationId||r.pageId}</td>${getVals(r).map(v=>`<td>${v}</td>`).join('')}</tr>`).join('')}
  </table>`;
}

function loadAllPlatforms(start, end) {
  ['google','apple','facebook'].forEach(k => loadPlatform(k, start, end));
}

// ---- Transaction loader ----
function fmtMoney(v) { return '$'+Math.abs(v/100).toFixed(2); }

async function loadTransactions(start, end) {
  const storeId = document.getElementById('storeSelect').value;
  const params = new URLSearchParams();
  if (start)   params.set('start', start);
  if (end)     params.set('end', end);
  if (storeId) params.set('store_id', storeId);

  document.getElementById('summaryCards').innerHTML = '<div class="loading-msg" style="grid-column:1/-1">Loading...</div>';
  document.getElementById('storesTable').innerHTML = '';
  try {
    const res = await fetch('/api/analytics/transactions?'+params.toString(), { headers: { Authorization: 'Bearer '+token } });
    const data = await res.json();
    const stores = data.stores || [];
    if (!stores.length) {
      document.getElementById('summaryCards').innerHTML = '<div class="loading-msg" style="grid-column:1/-1">No data for this period.</div>';
      return;
    }
    const tot = stores.reduce((a,s)=>({ sales:a.sales+(s.sales||0), refunds:a.refunds+(s.refunds||0), gross:a.gross+(s.gross||0), net:a.net+(s.net||0) }), {sales:0,refunds:0,gross:0,net:0});
    document.getElementById('summaryCards').innerHTML = `
      <div class="summary-card"><div class="val val-blue">${tot.sales}</div><div class="lbl">Transactions</div></div>
      <div class="summary-card"><div class="val val-red">${tot.refunds}</div><div class="lbl">Refunds</div></div>
      <div class="summary-card"><div class="val val-green">${fmtMoney(tot.gross)}</div><div class="lbl">Gross Sales</div></div>
      <div class="summary-card"><div class="val ${tot.net<0?'val-red':'val-green'}">${fmtMoney(tot.net)}</div><div class="lbl">Net Revenue</div></div>`;
    if (stores.length > 1) {
      document.getElementById('storesTable').innerHTML = `
      <div class="stores-table-wrap"><table class="stores-table">
        <thead><tr><th>Store</th><th>Transactions</th><th>Refunds</th><th>Gross</th><th>Net</th></tr></thead>
        <tbody>${stores.map(s=>`<tr>
          <td class="store-name">${s.name}</td><td>${s.sales}</td>
          <td class="refund-val">${s.refunds}</td>
          <td>${fmtMoney(s.gross)}</td>
          <td class="${s.net<0?'refund-val':''}">${fmtMoney(s.net)}</td>
        </tr>`).join('')}</tbody>
      </table></div>`;
    }
  } catch(e) {
    document.getElementById('summaryCards').innerHTML = `<div class="error-msg" style="grid-column:1/-1">Failed: ${e.message}</div>`;
  }
}

// ---- Init ----
document.getElementById('startDate').value = monthStartStr();
document.getElementById('endDate').value   = todayStr();
loadStores().then(() => {
  loadAllPlatforms(monthStartStr(), todayStr());
  loadTransactions(monthStartStr(), todayStr());
});
</script>
</body>
</html>
