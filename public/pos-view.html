<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud 9 - Purchase Order</title>
  <script src="/navbar.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }
    .container { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }
    .btn { border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-blue { background: #2f5597; color: white; }
    .btn-blue:hover { background: #1e3a6e; }
    .btn-gray { background: #666; color: white; }
    .btn-gray:hover { background: #444; }
    .btn-green { background: #38761d; color: white; }
    .btn-green:hover { background: #2a5a14; }
    .btn-orange { background: #c55a11; color: white; }
    .btn-red { background: #c00; color: white; }
    .btn:disabled { background: #bbb; cursor: not-allowed; }
    .action-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .card { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
    .po-title { font-size: 24px; font-weight: 800; color: #1a1a2e; margin-bottom: 4px; }
    .po-meta { font-size: 14px; color: #666; margin-bottom: 4px; }
    .status-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; margin-top: 8px; }
    .status-ordered { background: #dce8f8; color: #2f5597; }
    .status-partial { background: #fff3cd; color: #c55a11; }
    .status-received { background: #d9ead3; color: #38761d; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 20px 0; }
    .stat-box { background: #f8f9fa; border-radius: 8px; padding: 14px; text-align: center; }
    .stat-val { font-size: 22px; font-weight: 800; color: #1a1a2e; }
    .stat-lbl { font-size: 11px; color: #999; font-weight: 600; margin-top: 4px; }
    .cat-section { margin-bottom: 20px; }
    .cat-header { background: #2f5597; color: white; padding: 10px 16px; border-radius: 8px 8px 0 0; font-size: 14px; font-weight: 700; display: flex; justify-content: space-between; }
    .cat-body { border: 1px solid #e0e0e0; border-top: none; border-radius: 0 0 8px 8px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; padding: 8px 12px; background: #f8f9fa; border-bottom: 1px solid #f0f0f0; }
    td { padding: 8px 12px; border-bottom: 1px solid #f8f8f8; font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    .fully-received td { background: #f0fff4; color: #666; }
    .qty-input { width: 70px; padding: 6px 8px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 13px; text-align: center; outline: none; }
    .qty-input:focus { border-color: #38761d; }
    .progress-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin-top: 8px; }
    .progress-fill { height: 100%; background: #38761d; border-radius: 4px; transition: width 0.3s; }
    .notes-area { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 80px; outline: none; }
    .notes-area:focus { border-color: #2f5597; }
    .loading { text-align: center; padding: 60px; color: #999; }
    @media print {
      .no-print { display: none !important; }
      nav { display: none !important; }
      body { background: white; }
      .container { padding: 0; max-width: 100%; }
      .card { box-shadow: none; border-radius: 0; padding: 20px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="action-bar no-print">
    <button class="btn btn-gray" onclick="window.location.href='/pos'">← Back to POs</button>
    <button class="btn btn-blue" onclick="window.print()">🖨️ Print</button>
    <div id="receiveBtn"></div>
    <div id="deleteBtn"></div>
  </div>

  <div id="poContainer" class="loading">Loading purchase order...</div>
</div>

<script>
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token) window.location.href = '/';

  const params = new URLSearchParams(window.location.search);
  const poId = params.get('id');
  if (!poId) window.location.href = '/pos';

  let po = null;
  let items = [];
  let receiveMode = false;

  async function loadPO() {
    try {
      const res = await fetch(`/api/pos/${poId}`, { headers: { 'Authorization': 'Bearer ' + token } });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      po = data.po;
      items = data.items;
      renderPO();
    } catch (err) {
      document.getElementById('poContainer').innerHTML = '<div class="loading">Error loading purchase order</div>';
    }
  }

  function renderPO() {
    const date = new Date(po.created_at).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const pctReceived = po.total_cost > 0
      ? Math.round(((po.total_cost - po.remaining_balance) / po.total_cost) * 100)
      : (po.status === 'received' ? 100 : 0);

    // Render action buttons
    if (po.status !== 'received') {
      document.getElementById('receiveBtn').innerHTML =
        `<button class="btn btn-green" onclick="toggleReceiveMode()">📦 Receive Items</button>`;
    }
    document.getElementById('deleteBtn').innerHTML =
      `<button class="btn btn-red" onclick="deletePO()">🗑️ Cancel PO</button>`;

    // Group items by category
    const catGroups = {};
    items.forEach(item => {
      const cat = item.category || 'No Category';
      if (!catGroups[cat]) catGroups[cat] = [];
      catGroups[cat].push(item);
    });

    let itemsHTML = '';
    if (items.length === 0) {
      itemsHTML = '<div style="text-align:center;padding:30px;color:#999">No items on this PO.</div>';
    } else {
      Object.keys(catGroups).sort().forEach(cat => {
        const catItems = catGroups[cat];
        itemsHTML += `
          <div class="cat-section">
            <div class="cat-header">
              <span>${cat}</span>
              <span style="font-size:12px;opacity:0.8">${catItems.length} item${catItems.length !== 1 ? 's' : ''}</span>
            </div>
            <div class="cat-body">
              <table>
                <thead><tr>
                  <th>Item</th>
                  <th>Unit Cost</th>
                  <th>Ordered</th>
                  <th>Received</th>
                  <th>Remaining</th>
                  ${receiveMode ? '<th>Receive Now</th>' : '<th>Subtotal</th>'}
                </tr></thead>
                <tbody>
                  ${catItems.map(item => {
                    const fullyReceived = item.remaining_qty === 0;
                    const rowClass = fullyReceived ? 'fully-received' : '';
                    const subtotal = (item.unit_cost * item.ordered_qty).toFixed(2);
                    return `<tr class="${rowClass}">
                      <td>
                        <strong>${item.group_name ? item.group_name + ' — ' : ''}${item.variant_name}</strong>
                      </td>
                      <td>$${(item.unit_cost || 0).toFixed(2)}</td>
                      <td>${item.ordered_qty}</td>
                      <td style="color:#38761d;font-weight:${item.received_qty > 0 ? '700' : '400'}">${item.received_qty}</td>
                      <td style="color:${item.remaining_qty > 0 ? '#c55a11' : '#38761d'};font-weight:700">${item.remaining_qty}</td>
                      ${receiveMode
                        ? `<td>${fullyReceived
                            ? '<span style="color:#38761d;font-weight:600;font-size:12px">✅ Done</span>'
                            : `<input type="number" class="qty-input" id="recv_${item.id}"
                                value="${item.remaining_qty}" min="0" max="${item.remaining_qty}"
                                placeholder="0" />`
                          }</td>`
                        : `<td>$${subtotal}</td>`
                      }
                    </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>
          </div>`;
      });
    }

    document.getElementById('poContainer').innerHTML = `
      <div class="card">
        <div class="po-title">🛒 PO ${po.po_number}</div>
        <div class="po-meta">📦 Distributor: <strong>${po.distributor}</strong></div>
        <div class="po-meta">📅 Created: ${date}</div>
        <div class="po-meta">👤 By: ${po.created_by_name || user.name || user.email || 'Unknown'}</div>
        <span class="status-badge status-${po.status}">${po.status === 'ordered' ? '📦 Ordered' : po.status === 'partial' ? '⏳ Partially Received' : '✅ Received'}</span>

        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-val">$${(po.total_cost || 0).toFixed(2)}</div>
            <div class="stat-lbl">Total Cost</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" style="color:#c55a11">$${(po.remaining_balance || 0).toFixed(2)}</div>
            <div class="stat-lbl">Remaining</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" style="color:#38761d">${pctReceived}%</div>
            <div class="stat-lbl">Received</div>
          </div>
          <div class="stat-box">
            <div class="stat-val">${items.length}</div>
            <div class="stat-lbl">Line Items</div>
          </div>
        </div>

        <div class="progress-bar">
          <div class="progress-fill" style="width:${pctReceived}%"></div>
        </div>
      </div>

      ${receiveMode ? `
        <div class="card" style="border:2px solid #38761d;background:#f0fff4" id="receiveBanner">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
            <div>
              <div style="font-size:16px;font-weight:700;color:#38761d">📦 Receiving Mode</div>
              <div style="font-size:13px;color:#666;margin-top:4px">Enter quantities received for each item. Leave blank or 0 to skip.</div>
            </div>
            <div style="display:flex;gap:10px">
              <button class="btn btn-gray" onclick="cancelReceive()">Cancel</button>
              <button class="btn btn-green" onclick="submitReceive()">✅ Confirm Receipt</button>
            </div>
          </div>
        </div>
      ` : ''}

      <div id="itemsList">${itemsHTML}</div>

      <div class="card no-print">
        <div style="font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:8px">📝 Notes</div>
        <textarea class="notes-area" id="notesArea" placeholder="Add notes about this PO...">${po.notes || ''}</textarea>
        <button class="btn btn-blue" style="margin-top:8px" onclick="saveNotes()">Save Notes</button>
      </div>
    `;
  }

  function toggleReceiveMode() {
    receiveMode = true;
    renderPO();
    // Scroll to receive banner
    const banner = document.getElementById('receiveBanner');
    if (banner) banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function cancelReceive() {
    receiveMode = false;
    renderPO();
  }

  async function submitReceive() {
    const receivedItems = items
      .filter(item => item.remaining_qty > 0)
      .map(item => {
        const input = document.getElementById('recv_' + item.id);
        const qty = input ? Math.min(parseInt(input.value) || 0, item.remaining_qty) : 0;
        return { id: item.id, received_qty: qty };
      })
      .filter(r => r.received_qty > 0);

    if (receivedItems.length === 0) {
      alert('Please enter quantities to receive for at least one item.');
      return;
    }

    const btn = document.querySelector('#receiveBanner .btn-green');
    if (btn) { btn.disabled = true; btn.textContent = 'Processing...'; }

    try {
      const res = await fetch(`/api/pos/${poId}/receive`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ items: receivedItems })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      receiveMode = false;
      await loadPO();
    } catch (err) {
      alert('Error receiving items: ' + err.message);
      if (btn) { btn.disabled = false; btn.textContent = '✅ Confirm Receipt'; }
    }
  }

  async function saveNotes() {
    const notes = document.getElementById('notesArea').value;
    try {
      await fetch(`/api/pos/${poId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ notes })
      });
      alert('Notes saved!');
    } catch (err) {
      alert('Error saving notes');
    }
  }

  async function deletePO() {
    const hasRemaining = items.some(i => i.remaining_qty > 0);
    let msg = 'Cancel and delete this purchase order?';
    if (hasRemaining) msg += '\n\nPush remaining quantities back to Suggested Orders?';

    if (!confirm(msg)) return;

    const pushBack = hasRemaining ? confirm('Push unordered quantities back to Suggested Orders?') : false;

    try {
      const res = await fetch(`/api/pos/${poId}?push_back=${pushBack ? 1 : 0}`, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) throw new Error('Delete failed');
      window.location.href = '/pos';
    } catch (err) {
      alert('Error deleting PO: ' + err.message);
    }
  }

  loadPO();
</script>
<script>loadNavbar();</script>
</body>
</html>
