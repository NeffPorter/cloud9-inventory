<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud 9 - Purchase Order</title>
  <script src="/navbar.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }
    .container { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }
    .btn { border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-blue { background: #2f5597; color: white; }
    .btn-blue:hover { background: #1e3a6e; }
    .btn-gray { background: #666; color: white; }
    .btn-gray:hover { background: #444; }
    .btn-green { background: #38761d; color: white; }
    .btn-green:hover { background: #2a5a14; }
    .btn-orange { background: #c55a11; color: white; }
    .btn-red { background: #c00; color: white; }
    .btn:disabled { background: #bbb; cursor: not-allowed; }
    .action-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .card { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
    .po-title { font-size: 24px; font-weight: 800; color: #1a1a2e; margin-bottom: 4px; }
    .po-meta { font-size: 14px; color: #666; margin-bottom: 4px; }
    .status-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; margin-top: 8px; }
    .status-ordered { background: #dce8f8; color: #2f5597; }
    .status-partial { background: #fff3cd; color: #c55a11; }
    .status-received { background: #d9ead3; color: #38761d; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 20px 0; }
    .stat-box { background: #f8f9fa; border-radius: 8px; padding: 14px; text-align: center; }
    .stat-val { font-size: 22px; font-weight: 800; color: #1a1a2e; }
    .stat-lbl { font-size: 11px; color: #999; font-weight: 600; margin-top: 4px; }
    .cat-section { margin-bottom: 20px; }
    .cat-header { background: #2f5597; color: white; padding: 10px 16px; border-radius: 8px 8px 0 0; font-size: 14px; font-weight: 700; display: flex; justify-content: space-between; }
    .cat-body { border: 1px solid #e0e0e0; border-top: none; border-radius: 0 0 8px 8px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; padding: 8px 12px; background: #f8f9fa; border-bottom: 1px solid #f0f0f0; }
    td { padding: 8px 12px; border-bottom: 1px solid #f8f8f8; font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    .fully-received td { background: #f0fff4; color: #666; }
    .qty-input { width: 70px; padding: 6px 8px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 13px; text-align: center; outline: none; }
    .qty-input:focus { border-color: #38761d; }
    .progress-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin-top: 8px; }
    .progress-fill { height: 100%; background: #38761d; border-radius: 4px; transition: width 0.3s; }
    .notes-area { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 80px; outline: none; }
    .notes-area:focus { border-color: #2f5597; }
    .loading { text-align: center; padding: 60px; color: #999; }
    .edit-qty-input { width: 65px; padding: 5px 7px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 13px; text-align: center; outline: none; }
    .edit-qty-input:focus { border-color: #c55a11; }
    .btn-remove-line { border: none; padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: 700; cursor: pointer; background: #ffe0e0; color: #c00; }
    .btn-remove-line:hover { background: #ffc0c0; }
    .add-items-panel { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; border: 2px solid #2f5597; }
    .add-items-panel h3 { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; }
    .add-search { width: 100%; padding: 9px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; outline: none; margin-bottom: 12px; }
    .add-search:focus { border-color: #2f5597; }
    .add-cat { margin-bottom: 5px; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
    .add-cat-header { background: #f0f4ff; padding: 10px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 700; color: #2f5597; user-select: none; }
    .add-cat-header:hover { background: #dce8ff; }
    .add-item-row td { padding: 7px 12px; border-bottom: 1px solid #f8f8f8; font-size: 13px; }
    .add-item-row:last-child td { border-bottom: none; }
    .add-qty-input { width: 65px; padding: 5px 7px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 13px; text-align: center; outline: none; }
    .add-qty-input:focus { border-color: #2f5597; }
    .btn-add-line { border: none; padding: 5px 13px; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; background: #2f5597; color: white; }
    .btn-add-line:hover { background: #1e3a6e; }
    @media print {
      .no-print { display: none !important; }
      nav { display: none !important; }
      body { background: white; }
      .container { padding: 0; max-width: 100%; }
      .card { box-shadow: none; border-radius: 0; padding: 20px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="action-bar no-print">
    <button class="btn btn-gray" onclick="window.location.href='/pos'">← Back to POs</button>
    <button class="btn btn-blue" onclick="window.print()">🖨️ Print</button>
    <div id="receiveBtn"></div>
    <div id="editItemsBtn"></div>
    <div id="addItemsBtn"></div>
    <div id="deleteBtn"></div>
  </div>

  <div class="add-items-panel no-print" id="addItemsPanel" style="display:none">
    <h3>➕ Add Items to PO</h3>
    <input type="text" class="add-search" id="addItemSearch" placeholder="Search items..." oninput="renderAddItemsList()" />
    <div id="addItemsList"></div>
    <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end">
      <button class="btn btn-gray" onclick="closeAddItems()">Close</button>
    </div>
  </div>

  <div id="poContainer" class="loading">Loading purchase order...</div>
</div>

<script>
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token) window.location.href = '/';

  const params = new URLSearchParams(window.location.search);
  const poId = params.get('id');
  if (!poId) window.location.href = '/pos';

  let po = null;
  let items = [];
  let receiveMode = false;
  let editItemsMode = false;

  async function loadPO() {
    try {
      const res = await fetch(`/api/pos/${poId}`, { headers: { 'Authorization': 'Bearer ' + token } });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      po = data.po;
      items = data.items;
      renderPO();
    } catch (err) {
      document.getElementById('poContainer').innerHTML = '<div class="loading">Error loading purchase order</div>';
    }
  }

  function renderPO() {
    const date = new Date(po.created_at).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const pctReceived = po.total_cost > 0
      ? Math.round(((po.total_cost - po.remaining_balance) / po.total_cost) * 100)
      : (po.status === 'received' ? 100 : 0);

    // Render action buttons
    if (po.status !== 'received') {
      document.getElementById('receiveBtn').innerHTML =
        `<button class="btn btn-green" onclick="toggleReceiveMode()">📦 Receive Items</button>`;
      document.getElementById('editItemsBtn').innerHTML =
        `<button class="btn btn-orange" onclick="toggleEditItemsMode()">✏️ Edit Items</button>`;
      document.getElementById('addItemsBtn').innerHTML =
        `<button class="btn btn-blue" onclick="openAddItems()">➕ Add Items</button>`;
    } else {
      document.getElementById('editItemsBtn').innerHTML = '';
      document.getElementById('addItemsBtn').innerHTML = '';
    }
    document.getElementById('deleteBtn').innerHTML =
      `<button class="btn btn-red" onclick="deletePO()">🗑️ Cancel PO</button>`;

    // Group items by category
    const catGroups = {};
    items.forEach(item => {
      const cat = item.category || 'No Category';
      if (!catGroups[cat]) catGroups[cat] = [];
      catGroups[cat].push(item);
    });

    let itemsHTML = '';
    if (items.length === 0) {
      itemsHTML = '<div style="text-align:center;padding:30px;color:#999">No items on this PO.</div>';
    } else {
      Object.keys(catGroups).sort().forEach(cat => {
        const catItems = catGroups[cat];
        itemsHTML += `
          <div class="cat-section">
            <div class="cat-header">
              <span>${cat}</span>
              <span style="font-size:12px;opacity:0.8">${catItems.length} item${catItems.length !== 1 ? 's' : ''}</span>
            </div>
            <div class="cat-body">
              <table>
                <thead><tr>
                  <th>Item</th>
                  <th>Unit Cost</th>
                  <th>${editItemsMode ? 'Order Qty' : 'Ordered'}</th>
                  <th>Received</th>
                  <th>Remaining</th>
                  ${receiveMode ? '<th>Receive Now</th>' : editItemsMode ? '<th></th>' : '<th>Subtotal</th>'}
                </tr></thead>
                <tbody>
                  ${catItems.map(item => {
                    const fullyReceived = item.remaining_qty === 0;
                    const rowClass = fullyReceived ? 'fully-received' : '';
                    const subtotal = (item.unit_cost * item.ordered_qty).toFixed(2);
                    const canRemove = item.received_qty === 0;
                    return `<tr class="${rowClass}">
                      <td>
                        <strong>${item.group_name ? item.group_name + ' — ' : ''}${item.variant_name}</strong>
                      </td>
                      <td>$${(item.unit_cost || 0).toFixed(2)}</td>
                      <td>${editItemsMode
                        ? `<input type="number" class="edit-qty-input" value="${item.ordered_qty}" min="${item.received_qty}"
                            onchange="saveItemQty('${item.id}', this.value, this)" />`
                        : item.ordered_qty
                      }</td>
                      <td style="color:#38761d;font-weight:${item.received_qty > 0 ? '700' : '400'}">${item.received_qty}</td>
                      <td style="color:${item.remaining_qty > 0 ? '#c55a11' : '#38761d'};font-weight:700">${item.remaining_qty}</td>
                      ${receiveMode
                        ? `<td>${fullyReceived
                            ? '<span style="color:#38761d;font-weight:600;font-size:12px">✅ Done</span>'
                            : `<input type="number" class="qty-input" id="recv_${item.id}"
                                value="${item.remaining_qty}" min="0" max="${item.remaining_qty}"
                                placeholder="0" />`
                          }</td>`
                        : editItemsMode
                          ? `<td>${canRemove
                              ? `<button class="btn-remove-line" onclick="removeItem('${item.id}')">✕ Remove</button>`
                              : '<span style="font-size:11px;color:#aaa">Partial</span>'
                            }</td>`
                          : `<td>$${subtotal}</td>`
                      }
                    </tr>`;
                  }).join('')}
                </tbody>
              </table>
            </div>
          </div>`;
      });
    }

    document.getElementById('poContainer').innerHTML = `
      <div class="card">
        <div class="po-title">🛒 PO ${po.po_number}</div>
        <div class="po-meta">📦 Distributor: <strong>${po.distributor}</strong></div>
        <div class="po-meta">📅 Created: ${date}</div>
        <div class="po-meta">👤 By: ${po.created_by_name || user.name || user.email || 'Unknown'}</div>
        <span class="status-badge status-${po.status}">${po.status === 'ordered' ? '📦 Ordered' : po.status === 'partial' ? '⏳ Partially Received' : '✅ Received'}</span>

        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-val">$${(po.total_cost || 0).toFixed(2)}</div>
            <div class="stat-lbl">Total Cost</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" style="color:#c55a11">$${(po.remaining_balance || 0).toFixed(2)}</div>
            <div class="stat-lbl">Remaining</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" style="color:#38761d">${pctReceived}%</div>
            <div class="stat-lbl">Received</div>
          </div>
          <div class="stat-box">
            <div class="stat-val">${items.length}</div>
            <div class="stat-lbl">Line Items</div>
          </div>
        </div>

        <div class="progress-bar">
          <div class="progress-fill" style="width:${pctReceived}%"></div>
        </div>
      </div>

      ${receiveMode ? `
        <div class="card" style="border:2px solid #38761d;background:#f0fff4" id="receiveBanner">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
            <div>
              <div style="font-size:16px;font-weight:700;color:#38761d">📦 Receiving Mode</div>
              <div style="font-size:13px;color:#666;margin-top:4px">Enter quantities received for each item. Leave blank or 0 to skip.</div>
            </div>
            <div style="display:flex;gap:10px">
              <button class="btn btn-gray" onclick="cancelReceive()">Cancel</button>
              <button class="btn btn-green" onclick="submitReceive()">✅ Confirm Receipt</button>
            </div>
          </div>
        </div>
      ` : ''}

      ${editItemsMode ? `
        <div class="card no-print" style="border:2px solid #c55a11;background:#fff8f0">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
            <div>
              <div style="font-size:16px;font-weight:700;color:#c55a11">✏️ Editing Items</div>
              <div style="font-size:13px;color:#666;margin-top:4px">Change order quantities or remove items. Can't remove items already partially received.</div>
            </div>
            <button class="btn btn-gray" onclick="toggleEditItemsMode()">Done Editing</button>
          </div>
        </div>
      ` : ''}

      <div id="itemsList">${itemsHTML}</div>

      <div class="card no-print">
        <div style="font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:8px">📝 Notes</div>
        <textarea class="notes-area" id="notesArea" placeholder="Add notes about this PO...">${po.notes || ''}</textarea>
        <button class="btn btn-blue" style="margin-top:8px" onclick="saveNotes()">Save Notes</button>
      </div>
    `;
  }

  function toggleEditItemsMode() {
    editItemsMode = !editItemsMode;
    if (editItemsMode) receiveMode = false;
    renderPO();
  }

  async function saveItemQty(itemId, val, input) {
    const qty = Math.max(0, parseInt(val) || 0);
    try {
      const res = await fetch(`/api/pos/${poId}/items/${itemId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ ordered_qty: qty })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      await loadPO();
    } catch (err) {
      alert('Error updating qty: ' + err.message);
    }
  }

  async function removeItem(itemId) {
    if (!confirm('Remove this item from the PO?')) return;
    try {
      const res = await fetch(`/api/pos/${poId}/items/${itemId}`, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      await loadPO();
    } catch (err) {
      alert('Error removing item: ' + err.message);
    }
  }

  function toggleReceiveMode() {
    receiveMode = true;
    renderPO();
    // Scroll to receive banner
    const banner = document.getElementById('receiveBanner');
    if (banner) banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function cancelReceive() {
    receiveMode = false;
    renderPO();
  }

  async function submitReceive() {
    const receivedItems = items
      .filter(item => item.remaining_qty > 0)
      .map(item => {
        const input = document.getElementById('recv_' + item.id);
        const qty = input ? Math.min(parseInt(input.value) || 0, item.remaining_qty) : 0;
        return { id: item.id, received_qty: qty };
      })
      .filter(r => r.received_qty > 0);

    if (receivedItems.length === 0) {
      alert('Please enter quantities to receive for at least one item.');
      return;
    }

    const btn = document.querySelector('#receiveBanner .btn-green');
    if (btn) { btn.disabled = true; btn.textContent = 'Processing...'; }

    try {
      const res = await fetch(`/api/pos/${poId}/receive`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ items: receivedItems })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      receiveMode = false;
      await loadPO();
    } catch (err) {
      alert('Error receiving items: ' + err.message);
      if (btn) { btn.disabled = false; btn.textContent = '✅ Confirm Receipt'; }
    }
  }

  async function saveNotes() {
    const notes = document.getElementById('notesArea').value;
    try {
      await fetch(`/api/pos/${poId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ notes })
      });
      alert('Notes saved!');
    } catch (err) {
      alert('Error saving notes');
    }
  }

  async function deletePO() {
    const hasRemaining = items.some(i => i.remaining_qty > 0);
    let msg = 'Cancel and delete this purchase order?';
    if (hasRemaining) msg += '\n\nPush remaining quantities back to Suggested Orders?';

    if (!confirm(msg)) return;

    const pushBack = hasRemaining ? confirm('Push unordered quantities back to Suggested Orders?') : false;

    try {
      const res = await fetch(`/api/pos/${poId}?push_back=${pushBack ? 1 : 0}`, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) throw new Error('Delete failed');
      window.location.href = '/pos';
    } catch (err) {
      alert('Error deleting PO: ' + err.message);
    }
  }

  // ---- Add Items to PO ----
  let allInventory = [];
  const addExpandedCats = new Set();

  async function loadInventoryForAdd() {
    if (allInventory.length > 0) return; // already loaded
    const storeId = po?.store_id;
    if (!storeId) return;
    const res = await fetch(`/api/inventory/items?store_id=${storeId}`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    allInventory = (data.items || []).filter(i => i.status !== 'Not Tracking');
  }

  async function openAddItems() {
    const panel = document.getElementById('addItemsPanel');
    panel.style.display = '';
    await loadInventoryForAdd();
    renderAddItemsList();
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function closeAddItems() {
    document.getElementById('addItemsPanel').style.display = 'none';
    addExpandedCats.clear();
  }

  function renderAddItemsList() {
    const el = document.getElementById('addItemsList');
    const search = (document.getElementById('addItemSearch')?.value || '').toLowerCase();
    const filtered = allInventory.filter(i => {
      const name = `${i.group_name} ${i.variant_name} ${i.category}`.toLowerCase();
      return !search || name.includes(search);
    });

    if (filtered.length === 0) {
      el.innerHTML = '<div style="text-align:center;padding:30px;color:#999">No items found.</div>';
      return;
    }

    const cats = {};
    filtered.forEach(item => {
      const cat = item.category || 'No Category';
      if (!cats[cat]) cats[cat] = [];
      cats[cat].push(item);
    });

    let html = '';
    Object.keys(cats).sort().forEach(cat => {
      const catKey = 'addcat-' + cat.replace(/[^a-zA-Z0-9]/g, '-');
      const isExpanded = !!search || addExpandedCats.has(cat);
      const catItems = cats[cat];

      html += `<div class="add-cat">
        <div class="add-cat-header" onclick="toggleAddCat('${cat.replace(/'/g, "\\'")}', '${catKey}')">
          <span>${cat} <span style="font-size:12px;font-weight:400;color:#999">${catItems.length} items</span></span>
          <span id="achev-${catKey}">${isExpanded ? '▲' : '▼'}</span>
        </div>
        <div id="${catKey}" style="${isExpanded ? '' : 'display:none'}">
          <table style="width:100%;border-collapse:collapse">
            <thead><tr style="background:#f8f9fa">
              <th style="text-align:left;padding:7px 12px;font-size:11px;color:#999;font-weight:700;text-transform:uppercase">Item</th>
              <th style="text-align:left;padding:7px 12px;font-size:11px;color:#999;font-weight:700;text-transform:uppercase">Cost</th>
              <th style="text-align:left;padding:7px 12px;font-size:11px;color:#999;font-weight:700;text-transform:uppercase;width:80px">Qty</th>
              <th style="width:90px"></th>
            </tr></thead>
            <tbody>`;

      catItems.forEach(item => {
        const label = (item.group_name ? item.group_name + ' — ' : '') + item.variant_name;
        html += `<tr class="add-item-row">
          <td style="font-weight:500">${label}</td>
          <td>$${(item.cost || 0).toFixed(2)}</td>
          <td><input type="number" class="add-qty-input" id="aq_${item.id}" value="1" min="1" /></td>
          <td><button class="btn-add-line" onclick="addItemToPO('${item.id}')">+ Add</button></td>
        </tr>`;
      });

      html += `</tbody></table></div></div>`;
    });

    el.innerHTML = html;
  }

  function toggleAddCat(cat, catKey) {
    const el = document.getElementById(catKey);
    const chev = document.getElementById('achev-' + catKey);
    if (!el) return;
    const isHidden = el.style.display === 'none';
    el.style.display = isHidden ? '' : 'none';
    if (chev) chev.textContent = isHidden ? '▲' : '▼';
    if (isHidden) addExpandedCats.add(cat);
    else addExpandedCats.delete(cat);
  }

  async function addItemToPO(itemId) {
    const item = allInventory.find(i => i.id === itemId);
    if (!item) return;
    const qtyInput = document.getElementById('aq_' + itemId);
    const qty = Math.max(1, parseInt(qtyInput?.value) || 1);

    const btn = qtyInput?.parentElement?.nextElementSibling?.querySelector('button');
    if (btn) { btn.disabled = true; btn.textContent = '...'; }

    try {
      const res = await fetch(`/api/pos/${poId}/items`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({
          items: [{
            item_id: item.id,
            category: item.category || '',
            group_name: item.group_name || '',
            variant_name: item.variant_name || '',
            unit_cost: item.cost || 0,
            unit_price: item.price || 0,
            ordered_qty: qty
          }]
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      if (btn) { btn.textContent = '✓ Added'; btn.style.background = '#38761d'; }
      if (qtyInput) qtyInput.value = 1;

      // Refresh PO data
      await loadPO();
    } catch (err) {
      alert('Error adding item: ' + err.message);
      if (btn) { btn.disabled = false; btn.textContent = '+ Add'; }
    }
  }

  loadPO();
</script>
<script>loadNavbar();</script>
</body>
</html>
