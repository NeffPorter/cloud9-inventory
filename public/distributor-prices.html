<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud 9 - Price Sheet</title>
  <script src="/navbar.js?v=6"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px 100px; }
    .btn { border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-blue { background: #2f5597; color: white; } .btn-blue:hover { background: #1e3a6e; }
    .btn-gray { background: #666; color: white; } .btn-gray:hover { background: #444; }
    .btn-green { background: #38761d; color: white; } .btn-green:hover { background: #2a5a14; }
    .btn:disabled { background: #bbb; cursor: not-allowed; }
    .card { background: white; border-radius: 12px; padding: 20px 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 16px; }
    .dist-title { font-size: 22px; font-weight: 800; color: #1a1a2e; }
    .dist-meta { font-size: 13px; color: #888; margin-top: 3px; }
    .action-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
    .store-chip { padding: 6px 16px; border-radius: 20px; border: 1.5px solid #ddd; background: white; font-size: 13px; font-weight: 600; cursor: pointer; color: #555; transition: all .15s; }
    .store-chip:hover { border-color: #2563eb; color: #2563eb; }
    .store-chip.active { border-color: #2563eb; background: #2563eb; color: white; }
    /* Category accordion */
    .cat-section { margin-bottom: 12px; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .cat-header { background: #2f5597; color: white; padding: 12px 18px; font-size: 14px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
    .cat-header:hover { background: #1e3a6e; }
    .cat-body { background: white; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; padding: 9px 14px; background: #f8f9fa; border-bottom: 2px solid #f0f0f0; }
    td { padding: 9px 14px; border-bottom: 1px solid #f8f8f8; font-size: 13px; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbff; }
    .group-row td { background: #f0f4ff; font-weight: 700; color: #2f5597; font-size: 13px; padding: 7px 14px; }
    .standalone-header td { background: #fafafa; font-weight: 600; color: #888; font-size: 12px; font-style: italic; padding: 6px 14px; border-top: 1px solid #eee; }
    .price-input { width: 90px; padding: 6px 9px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 13px; text-align: center; outline: none; }
    .price-input:focus { border-color: #2f5597; }
    .price-input.changed { border-color: #c55a11; background: #fff8f0; }
    .price-input:read-only { background: #f8f9fa; color: #888; cursor: default; border-color: #eee; }
    .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
    .badge-save { background: #d9ead3; color: #38761d; }
    .badge-over { background: #fce8e6; color: #c00; }
    .changes-bar {
      position: fixed; bottom: 24px; right: 24px; background: #1a1a2e; color: white;
      padding: 16px 24px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      z-index: 1000; display: flex; align-items: center; gap: 16px; font-size: 14px; font-weight: 600;
      transform: translateY(150px); transition: transform 0.3s;
    }
    .changes-bar.visible { transform: translateY(0); }
    .loading { text-align: center; padding: 60px; color: #999; }
    .store-prompt { text-align: center; padding: 60px; }
    .store-prompt h3 { font-size: 18px; color: #444; margin-bottom: 16px; }
    .store-grid { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .store-btn { padding: 10px 28px; background: #2563eb; color: white; border: none; border-radius: 20px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all .15s; }
    .store-btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>

<div class="changes-bar" id="changesBar">
  <span id="changesCount">0 changes</span>
  <button class="btn btn-gray" onclick="cancelChanges()">✖ Cancel</button>
  <button class="btn btn-green" id="saveBtn" onclick="saveChanges()">💾 Save Prices</button>
</div>

<div class="container">
  <div class="action-row">
    <button class="btn btn-gray" onclick="window.location.href='/distributors'">← Back</button>
    <div id="storeFilterRow" style="display:flex;gap:8px;flex-wrap:wrap"></div>
    <div style="margin-left:auto" id="exportBtn"></div>
  </div>

  <div id="distInfo" class="loading">Loading...</div>
  <div id="pricesContainer"></div>
</div>

<script>
  const token = localStorage.getItem('token');
  const user = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token) window.location.href = '/';

  const params = new URLSearchParams(window.location.search);
  const distId = params.get('id');
  if (!distId) window.location.href = '/distributors';

  let distributor = null;
  let allInventory = [];
  let priceMap = {};     // item_id -> unit_cost (from DB)
  let pendingChanges = {}; // groupKey -> unit_cost  (key = 'g:cat:grp' or 'i:itemId')
  const isAdmin = ['admin', 'him', 'regional_manager'].includes(user.role);

  let allStores = [];
  let selectedStore = params.get('store') || '';

  async function init() {
    // Load distributor info
    const res = await fetch(`/api/distributors/${distId}/prices`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    if (!res.ok) { document.getElementById('distInfo').innerHTML = `<div style="padding:40px;color:#c00">Error: ${data.error}</div>`; return; }
    distributor = data.distributor;

    // Load stores
    const sRes = await fetch('/api/inventory/stores', { headers: { 'Authorization': 'Bearer ' + token } });
    const sData = await sRes.json();
    allStores = sData.stores || [];
    if (allStores.length === 1 && !selectedStore) selectedStore = allStores[0].id;

    renderHeader();
    renderStoreFilter();

    if (selectedStore) {
      await loadForStore(selectedStore);
    } else {
      document.getElementById('pricesContainer').innerHTML = renderStorePrompt();
    }
  }

  function renderStorePrompt() {
    return `<div class="store-prompt">
      <h3>Select a store to view price sheet</h3>
      <div class="store-grid">${allStores.map(s =>
        `<button class="store-btn" onclick="selectStore('${s.id}')">${s.name}</button>`
      ).join('')}</div>
    </div>`;
  }

  function renderStoreFilter() {
    if (allStores.length <= 1) return;
    document.getElementById('storeFilterRow').innerHTML = allStores.map(s =>
      `<button class="store-chip ${selectedStore === s.id ? 'active' : ''}" onclick="selectStore('${s.id}')">${s.name}</button>`
    ).join('');
  }

  async function selectStore(storeId) {
    selectedStore = storeId;
    pendingChanges = {};
    renderStoreFilter();
    await loadForStore(storeId);
  }

  async function loadForStore(storeId) {
    document.getElementById('pricesContainer').innerHTML = '<div class="loading">Loading...</div>';
    try {
      const [priceRes, invRes] = await Promise.all([
        fetch(`/api/distributors/${distId}/prices?store_id=${storeId}`, { headers: { 'Authorization': 'Bearer ' + token } }),
        fetch(`/api/inventory/items?store_id=${storeId}`, { headers: { 'Authorization': 'Bearer ' + token } })
      ]);
      const priceData = await priceRes.json();
      const invData = await invRes.json();

      priceMap = {};
      (priceData.prices || []).forEach(p => { priceMap[p.item_id] = p.unit_cost; });
      allInventory = (invData.items || []).filter(i => i.status !== 'Not Tracking');

      renderPrices();
    } catch (err) {
      document.getElementById('pricesContainer').innerHTML = `<div style="padding:40px;color:#c00">Error: ${err.message}</div>`;
    }
  }

  function renderHeader() {
    const d = distributor;
    document.getElementById('distInfo').innerHTML = `
      <div class="card" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
        <div>
          <div class="dist-title">🏭 ${d.name}</div>
          ${d.rep_name ? `<div class="dist-meta">👤 ${d.rep_name}${d.rep_phone ? ` · <a href="tel:${d.rep_phone}" style="color:#2f5597">${d.rep_phone}</a>` : ''}${d.rep_email ? ` · <a href="mailto:${d.rep_email}" style="color:#2f5597">${d.rep_email}</a>` : ''}</div>` : ''}
          ${d.website ? `<div class="dist-meta">🌐 <a href="${d.website}" target="_blank" style="color:#2f5597">${d.website}</a></div>` : ''}
        </div>
        ${isAdmin ? `<button class="btn btn-blue" onclick="exportCSV()">⬇ Export CSV</button>` : ''}
      </div>`;
  }

  // Build a unique key for a variant group or standalone item
  function groupKey(cat, grpName) { return `g:${cat}:${grpName}`; }
  function itemKey(itemId) { return `i:${itemId}`; }

  // Get display price for a group (first item's price since all should match)
  function getGroupPrice(items) {
    for (const item of items) {
      const p = pendingChanges.hasOwnProperty(groupKey(item.category || 'No Category', item.group_name))
        ? pendingChanges[groupKey(item.category || 'No Category', item.group_name)]
        : (priceMap[item.id] ?? null);
      if (p !== null) return p;
    }
    return '';
  }

  function getStandalonePrice(item) {
    const cat = item.category || 'No Category';
    const k = itemKey(item.id);
    return pendingChanges.hasOwnProperty(k) ? pendingChanges[k] : (priceMap[item.id] ?? '');
  }

  function savingsBadge(price, invCost) {
    const p = parseFloat(price);
    if (!p || !invCost) return '<span style="color:#aaa">—</span>';
    const diff = invCost - p;
    if (diff > 0.005) return `<span class="badge badge-save">Save $${diff.toFixed(2)}</span>`;
    if (diff < -0.005) return `<span class="badge badge-over">+$${Math.abs(diff).toFixed(2)}</span>`;
    return '<span style="color:#999;font-size:11px">Same</span>';
  }

  function renderPrices() {
    const el = document.getElementById('pricesContainer');

    // Build structure: category → { groups: { grpName: [items] }, standalone: [items] }
    const cats = {};
    allInventory.forEach(item => {
      const cat = item.category || 'No Category';
      if (!cats[cat]) cats[cat] = { groups: {}, standalone: [] };
      if (item.group_name) {
        if (!cats[cat].groups[item.group_name]) cats[cat].groups[item.group_name] = [];
        cats[cat].groups[item.group_name].push(item);
      } else {
        cats[cat].standalone.push(item);
      }
    });

    let html = '';
    Object.keys(cats).sort().forEach(cat => {
      const { groups, standalone } = cats[cat];
      const groupNames = Object.keys(groups).sort();
      const totalGroups = groupNames.length + standalone.length;
      const pricedGroups = groupNames.filter(g => {
        const k = groupKey(cat, g);
        const p = pendingChanges.hasOwnProperty(k) ? pendingChanges[k] : (priceMap[groups[g][0]?.id] ?? 0);
        return p > 0;
      }).length + standalone.filter(i => (pendingChanges[itemKey(i.id)] ?? priceMap[i.id] ?? 0) > 0).length;

      let rows = '';

      groupNames.forEach(grp => {
        const grpItems = groups[grp];
        const k = groupKey(cat, grp);
        const price = pendingChanges.hasOwnProperty(k) ? pendingChanges[k] : getGroupPrice(grpItems);
        const invCost = grpItems[0]?.cost || 0;
        const changed = pendingChanges.hasOwnProperty(k);
        const inputAttrs = isAdmin
          ? `oninput="markGroupChanged('${k.replace(/'/g, "\\'")}', this.value)"`
          : 'readonly';

        rows += `<tr>
          <td style="font-weight:600">${grp} <span style="color:#aaa;font-size:11px;font-weight:400">${grpItems.length} variant${grpItems.length !== 1 ? 's' : ''}</span></td>
          <td style="color:#666">$${invCost.toFixed(2)}</td>
          <td><span style="color:#888;margin-right:2px">$</span><input type="number" step="0.01" min="0" class="price-input ${changed ? 'changed' : ''}"
            value="${price}" placeholder="—" id="pi_${k.replace(/[^a-zA-Z0-9]/g,'_')}" ${inputAttrs} /></td>
          <td>${savingsBadge(price, invCost)}</td>
        </tr>`;
      });

      if (standalone.length > 0) {
        if (groupNames.length > 0) {
          rows += `<tr class="standalone-header"><td colspan="4">— No variant group —</td></tr>`;
        }
        standalone.forEach(item => {
          const k = itemKey(item.id);
          const price = getStandalonePrice(item);
          const changed = pendingChanges.hasOwnProperty(k);
          const inputAttrs = isAdmin
            ? `oninput="markItemChanged('${item.id}', this.value)"`
            : 'readonly';
          rows += `<tr>
            <td style="font-weight:500">${item.variant_name}</td>
            <td style="color:#666">$${(item.cost || 0).toFixed(2)}</td>
            <td><span style="color:#888;margin-right:2px">$</span><input type="number" step="0.01" min="0" class="price-input ${changed ? 'changed' : ''}"
              value="${price}" placeholder="—" id="pi_i_${item.id}" ${inputAttrs} /></td>
            <td>${savingsBadge(price, item.cost || 0)}</td>
          </tr>`;
        });
      }

      html += `<div class="cat-section">
        <div class="cat-header" onclick="toggleCat('catbody_${cat.replace(/[^a-zA-Z0-9]/g,'_')}', this)">
          <span>${cat}</span>
          <span style="font-size:12px;opacity:0.8">${pricedGroups}/${totalGroups} priced ▼</span>
        </div>
        <div class="cat-body" id="catbody_${cat.replace(/[^a-zA-Z0-9]/g,'_')}">
          <table>
            <thead><tr>
              <th>Variant Group / Item</th>
              <th>Inventory Cost</th>
              <th>${distributor.name} Price</th>
              <th>vs. Inventory</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
    });

    el.innerHTML = html || '<div style="padding:40px;text-align:center;color:#999">No inventory items found for this store.</div>';
  }

  function toggleCat(bodyId, header) {
    const body = document.getElementById(bodyId);
    if (!body) return;
    const isHidden = body.style.display === 'none';
    body.style.display = isHidden ? '' : 'none';
    const chevron = header.querySelector('span:last-child');
    if (chevron) chevron.textContent = chevron.textContent.replace(isHidden ? '▶' : '▼', isHidden ? '▼' : '▶');
  }

  function markGroupChanged(k, val) {
    const num = parseFloat(val);
    if (!isNaN(num) && num >= 0) {
      pendingChanges[k] = num;
    } else {
      delete pendingChanges[k];
    }
    updateChangesBar();
    // update savings badge in-place
    const inputId = 'pi_' + k.replace(/[^a-zA-Z0-9]/g,'_');
    const inp = document.getElementById(inputId);
    if (inp) inp.classList.toggle('changed', pendingChanges.hasOwnProperty(k));
  }

  function markItemChanged(itemId, val) {
    const k = itemKey(itemId);
    const num = parseFloat(val);
    if (!isNaN(num) && num >= 0) {
      pendingChanges[k] = num;
    } else {
      delete pendingChanges[k];
    }
    updateChangesBar();
    const inp = document.getElementById('pi_i_' + itemId);
    if (inp) inp.classList.toggle('changed', pendingChanges.hasOwnProperty(k));
  }

  function updateChangesBar() {
    const count = Object.keys(pendingChanges).length;
    document.getElementById('changesBar').classList.toggle('visible', count > 0);
    document.getElementById('changesCount').textContent = `${count} change${count !== 1 ? 's' : ''}`;
  }

  function cancelChanges() {
    pendingChanges = {};
    updateChangesBar();
    renderPrices();
  }

  async function saveChanges() {
    if (!selectedStore) { alert('Please select a store first.'); return; }
    const entries = Object.entries(pendingChanges);
    if (entries.length === 0) return;

    // Expand group keys to individual item entries
    const itemPrices = {};

    // Build lookup: cat+grp → items
    const catGrpMap = {};
    allInventory.forEach(item => {
      const cat = item.category || 'No Category';
      if (item.group_name) {
        const k = groupKey(cat, item.group_name);
        if (!catGrpMap[k]) catGrpMap[k] = [];
        catGrpMap[k].push(item.id);
      }
    });

    entries.forEach(([k, price]) => {
      if (k.startsWith('i:')) {
        const itemId = k.slice(2);
        itemPrices[itemId] = price;
      } else if (k.startsWith('g:')) {
        const ids = catGrpMap[k] || [];
        ids.forEach(id => { itemPrices[id] = price; });
      }
    });

    const prices = Object.entries(itemPrices).map(([item_id, unit_cost]) => ({ item_id, unit_cost }));

    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving...';

    try {
      const res = await fetch(`/api/distributors/${distId}/prices`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ prices, store_id: selectedStore })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      // Apply to priceMap
      Object.entries(itemPrices).forEach(([id, cost]) => { priceMap[id] = cost; });
      pendingChanges = {};
      updateChangesBar();
      renderPrices();
    } catch (err) {
      alert('Error saving: ' + err.message);
    } finally {
      btn.disabled = false; btn.textContent = '💾 Save Prices';
    }
  }

  function exportCSV() {
    const rows = [['Variant Group', 'Item', 'Category', 'Inventory Cost', `${distributor.name} Price`, 'Savings']];
    allInventory.forEach(item => {
      const price = priceMap[item.id] ?? '';
      const savings = price && item.cost ? (item.cost - price).toFixed(2) : '';
      rows.push([item.group_name || '', item.variant_name, item.category || '', (item.cost || 0).toFixed(2), price !== '' ? parseFloat(price).toFixed(2) : '', savings]);
    });
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = `${distributor.name.replace(/[^a-z0-9]/gi,'_')}_prices.csv`;
    a.click();
  }

  init();
</script>
<script>loadNavbar();</script>
</body>
</html>
