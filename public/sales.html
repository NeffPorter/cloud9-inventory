<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud 9 - Sales</title>
  <script src="/navbar.js?v=6"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }
    .page { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .page-title { font-size: 24px; font-weight: 700; color: #1a1a2e; }
    .page-subtitle { color: #666; font-size: 14px; margin-top: 4px; }
    /* Period controls — matches P&L */
    .controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; margin-bottom: 16px; background: white; padding: 16px; border-radius: 12px; border: 1px solid #e5e7eb; }
    .control-group { display: flex; flex-direction: column; gap: 5px; }
    .control-group label { font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: .04em; }
    .controls input, .controls select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: white; }
    .period-tab { padding: 7px 16px; border-radius: 8px; border: 1.5px solid #ddd; background: white; font-size: 13px; font-weight: 600; cursor: pointer; color: #555; transition: all .15s; }
    .period-tab:hover { border-color: #2563eb; color: #2563eb; }
    .period-tab.active { border-color: #2563eb; background: #2563eb; color: white; }
    .preset-btn { padding: 7px 16px; border-radius: 8px; border: 1.5px solid #ddd; background: white; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; color: #555; }
    .preset-btn:hover { border-color: #2563eb; color: #2563eb; }
    .preset-btn.active { border-color: #2563eb; background: #2563eb; color: white; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .stat-label {
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 6px;
    }
    .stat-change { font-size: 12px; font-weight: 600; }
    .stat-change.up { color: #38761d; }
    .stat-change.down { color: #c00; }
    .stat-change.neutral { color: #999; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }
    .card-title { font-size: 16px; font-weight: 700; color: #1a1a2e; margin-bottom: 20px; }
    .chart-container { position: relative; height: 300px; }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 12px;
      border-bottom: 2px solid #f0f0f0;
    }
    td {
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
      color: #333;
    }
    tr:last-child td { border-bottom: none; }
    .grand-total td { font-weight: 700; background: #f8f9ff; color: #1a1a2e; }
    .margin-good { color: #38761d; font-weight: 600; }
    .margin-ok { color: #c55a11; font-weight: 600; }
    .margin-bad { color: #c00; font-weight: 600; }
    .loading { text-align: center; padding: 40px; color: #999; }
    .store-filter {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .store-filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1.5px solid #ddd;
      background: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: #555;
      transition: all 0.15s;
    }
    .store-filter-btn:hover { border-color: #2563eb; color: #2563eb; }
    .store-filter-btn.active { border-color: #2563eb; background: #2563eb; color: white; }
    .perf-category { margin-bottom: 24px; }
    .perf-category:last-child { margin-bottom: 0; }
    .perf-category-title {
      font-size: 13px;
      font-weight: 700;
      color: #2f5597;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 2px solid #f0f0f0;
    }
    .perf-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 700px) {
      .perf-grid { grid-template-columns: 1fr; }
    }
    .perf-col-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .perf-col-label.top { color: #38761d; }
    .perf-col-label.bottom { color: #c00; }
    .perf-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      background: #f8f9fa;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .perf-row-name { font-weight: 600; color: #333; }
    .perf-row-stats { color: #888; font-size: 12px; text-align: right; white-space: nowrap; margin-left: 8px; }
  </style>
</head>
<body>
  <script>loadNavbar();</script>

  <div class="page">
    <div class="page-header">
      <div>
        <div class="page-title">📊 Sales Overview</div>
        <div class="page-subtitle" id="periodLabel">Loading...</div>
      </div>
    </div>
  <!-- Controls card (matches P&L) -->
  <div class="controls">
    <div class="control-group">
      <label>Period</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="period-tab active" onclick="setPeriod('daily',this)">Daily</button>
        <button class="period-tab" onclick="setPeriod('weekly',this)">Weekly</button>
        <button class="period-tab" onclick="setPeriod('monthly',this)">Monthly</button>
        <button class="period-tab" onclick="setPeriod('quarterly',this)">Quarterly</button>
        <button class="period-tab" onclick="setPeriod('custom',this)">Custom</button>
      </div>
    </div>
    <div class="control-group" id="periodPickerWrap">
      <label id="periodPickerLabel">Date</label>
      <input type="date" id="singleDatePicker" onchange="loadFromPicker()">
      <select id="weekSelectPicker" style="display:none;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:white;cursor:pointer" onchange="loadFromPicker()"></select>
    </div>
    <div class="control-group" id="monthPickerWrap" style="display:none">
      <label>Month</label>
      <input type="month" id="monthPicker" onchange="loadFromPicker()">
    </div>
    <div class="control-group" id="quarterPickerWrap" style="display:none">
      <label>Quarter</label>
      <input type="text" id="quarterPicker" placeholder="e.g. 2026-Q2" onchange="loadFromPicker()">
    </div>
    <div class="control-group" id="customDateWrap" style="display:none;flex-direction:row;gap:8px;align-items:flex-end">
      <div><label style="display:block;font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">From</label><input type="date" id="startDate" onchange="loadFromPicker()"></div>
      <div><label style="display:block;font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">To</label><input type="date" id="endDate" onchange="loadFromPicker()"></div>
    </div>
  </div>
  <div class="store-filter" id="storeFilter" style="margin-bottom:16px"></div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Net Sales</div>
        <div class="stat-value" id="statNet">—</div>
        <div class="stat-change" id="changeNet">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Gross Profit</div>
        <div class="stat-value" id="statProfit">—</div>
        <div class="stat-change" id="changeProfit">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Margin</div>
        <div class="stat-value" id="statMargin">—</div>
        <div class="stat-change" id="changeMargin">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Orders</div>
        <div class="stat-value" id="statOrders">—</div>
        <div class="stat-change" id="changeOrders">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Ticket</div>
        <div class="stat-value" id="statAvg">—</div>
        <div class="stat-change" id="changeAvg">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Refunds</div>
        <div class="stat-value" id="statRefunds">—</div>
        <div class="stat-change neutral" id="changeRefunds">vs prev period</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Discounts</div>
        <div class="stat-value" id="statDiscounts">—</div>
        <div class="stat-change neutral" id="changeDiscounts">vs prev period</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title" id="chartTitle">Sales — This Period vs Previous Period</div>
      <div class="chart-container">
        <canvas id="salesChart"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
        <span>📈 Sales Trends</span>
        <div class="date-controls">
          <button class="preset-btn trend-toggle-btn active" id="trendWeekBtn" onclick="loadTrends('week', this)">Week-over-Week</button>
          <button class="preset-btn trend-toggle-btn" id="trendMonthBtn" onclick="loadTrends('month', this)">Month-over-Month</button>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="trendsChart"></canvas>
      </div>
    </div>

    <div class="card" id="storeBreakdownCard">
      <div class="card-title">🏪 By Store</div>
      <div id="storeBreakdown" class="loading">Loading...</div>
    </div>

    <div class="card" id="itemPerformanceCard">
      <div class="card-title">📦 Item Performance by Category</div>
      <div id="itemPerformance" class="loading">Loading...</div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!token) window.location.href = '/';

    const isMultiStoreUser = ['admin', 'him', 'regional_manager', 'owner'].includes(user.role);
    if (!isMultiStoreUser) {
      document.getElementById('storeBreakdownCard').style.display = 'none';
    }

    let chart = null;
    let trendsChart = null;
    let currentStart = null;
    let currentEnd = null;
    let selectedStore = '';
    let trendGranularity = 'week';

    function fmt(n) { return '$' + (n || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
    function pct(n) { return (n * 100).toFixed(1) + '%'; }

    function changeBadge(elId, current, previous, invertColor = false) {
      const el = document.getElementById(elId);
      if (!previous || previous === 0) { el.textContent = '— vs prev'; el.className = 'stat-change neutral'; return; }
      const diff = ((current - previous) / Math.abs(previous)) * 100;
      const up = diff >= 0;
      const colorUp = invertColor ? 'down' : 'up';
      const colorDown = invertColor ? 'up' : 'down';
      el.textContent = `${up ? '↑' : '↓'} ${Math.abs(diff).toFixed(1)}% vs prev`;
      el.className = `stat-change ${up ? colorUp : colorDown}`;
    }

    let currentPeriod = 'daily';

    function setPeriod(period, btn) {
      currentPeriod = period;
      document.querySelectorAll('.period-tab').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');

      const now = new Date();
      const pad = n => String(n).padStart(2,'0');
      const todayStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;

      document.getElementById('periodPickerWrap').style.display  = 'none';
      document.getElementById('monthPickerWrap').style.display   = 'none';
      document.getElementById('quarterPickerWrap').style.display = 'none';
      document.getElementById('customDateWrap').style.display    = 'none';

      if (period === 'daily') {
        document.getElementById('periodPickerWrap').style.display = '';
        document.getElementById('periodPickerLabel').textContent = 'Date';
        document.getElementById('singleDatePicker').style.display = '';
        document.getElementById('weekSelectPicker').style.display = 'none';
        const picker = document.getElementById('singleDatePicker');
        if (!picker.value) picker.value = todayStr;
        const d = new Date(picker.value + 'T00:00:00');
        currentStart = new Date(d); currentStart.setHours(0,0,0,0);
        currentEnd   = new Date(d); currentEnd.setHours(23,59,59,999);
      } else if (period === 'weekly') {
        document.getElementById('periodPickerWrap').style.display = '';
        document.getElementById('periodPickerLabel').textContent = 'Week of';
        document.getElementById('singleDatePicker').style.display = 'none';
        const weekSel = document.getElementById('weekSelectPicker');
        weekSel.style.display = '';
        if (!weekSel.options.length) buildWeekOptions(weekSel);
        const d = new Date(weekSel.value + 'T00:00:00');
        const diff2 = d.getDay() === 0 ? -6 : 1 - d.getDay();
        currentStart = new Date(d); currentStart.setDate(d.getDate() + diff2); currentStart.setHours(0,0,0,0);
        currentEnd   = new Date(currentStart); currentEnd.setDate(currentStart.getDate() + 6); currentEnd.setHours(23,59,59,999);
      } else if (period === 'monthly') {
        document.getElementById('monthPickerWrap').style.display = '';
        const picker = document.getElementById('monthPicker');
        if (!picker.value) picker.value = `${now.getFullYear()}-${pad(now.getMonth()+1)}`;
        const [y, m] = picker.value.split('-');
        const lastDay = new Date(y, m, 0).getDate();
        currentStart = new Date(`${y}-${m}-01T00:00:00`);
        currentEnd   = new Date(`${y}-${m}-${pad(lastDay)}T23:59:59`);
      } else if (period === 'quarterly') {
        document.getElementById('quarterPickerWrap').style.display = '';
        const picker = document.getElementById('quarterPicker');
        if (!picker.value) { const q = Math.ceil((now.getMonth()+1)/3); picker.value = `${now.getFullYear()}-Q${q}`; }
        const match = picker.value.match(/(\d{4})-Q(\d)/);
        if (!match) return;
        const [, y, q] = match;
        const sm = (parseInt(q)-1)*3+1; const em = sm+2;
        currentStart = new Date(`${y}-${pad(sm)}-01T00:00:00`);
        currentEnd   = new Date(`${y}-${pad(em)}-${pad(new Date(y,em,0).getDate())}T23:59:59`);
      } else if (period === 'custom') {
        document.getElementById('customDateWrap').style.display = 'flex';
        const s = document.getElementById('startDate').value;
        const e = document.getElementById('endDate').value;
        if (!s || !e) return;
        currentStart = new Date(s + 'T00:00:00');
        currentEnd   = new Date(e + 'T23:59:59');
      }

      loadSales();
    }

    function loadFromPicker() { setPeriod(currentPeriod, document.querySelector('.period-tab.active')); }
    function setCustom() { loadFromPicker(); }

    async function loadStoreFilter() {
      if (!['admin', 'him', 'regional_manager', 'owner'].includes(user.role)) return;
      const res = await fetch('/api/inventory/stores', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      const stores = data.stores || [];
      const filter = document.getElementById('storeFilter');
      filter.innerHTML = `<button class="store-filter-btn active" onclick="filterStore('', this)">All Stores</button>` +
        stores.map(s => `<button class="store-filter-btn" onclick="filterStore('${s.id}', this)">${s.name}</button>`).join('');
    }

    function filterStore(storeId, btn) {
      selectedStore = storeId;
      document.querySelectorAll('.store-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('storeBreakdownCard').style.display = storeId ? 'none' : 'block';
      loadSales();
      loadTrends(trendGranularity);
    }

    async function loadTrends(granularity, btnEl) {
      trendGranularity = granularity;
      document.getElementById('trendWeekBtn').classList.toggle('active', granularity === 'week');
      document.getElementById('trendMonthBtn').classList.toggle('active', granularity === 'month');

      const params = new URLSearchParams({ granularity, periods: 8 });
      if (selectedStore) params.append('store_id', selectedStore);

      try {
        const res = await fetch(`/api/sales/trends?${params}`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const periods = data.periods || [];

        const labels = periods.map(p => p.label);
        const netVals = periods.map(p => p.net);
        const profitVals = periods.map(p => p.grossProfit);

        if (trendsChart) trendsChart.destroy();
        const ctx = document.getElementById('trendsChart').getContext('2d');
        trendsChart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels,
            datasets: [
              {
                label: 'Net Sales',
                data: netVals,
                backgroundColor: 'rgba(47,85,151,0.7)',
                borderRadius: 4
              },
              {
                label: 'Gross Profit',
                data: profitVals,
                backgroundColor: 'rgba(56,118,29,0.6)',
                borderRadius: 4
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: 'top' },
              tooltip: {
                callbacks: {
                  label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.parsed.y)}`
                }
              }
            },
            scales: {
              y: { ticks: { callback: val => '$' + val.toLocaleString() } }
            }
          }
        });
      } catch (err) {
        console.error('Trends load error:', err);
      }
    }

    async function loadSales() {
      const params = new URLSearchParams({
        start: currentStart.toISOString(),
        end: currentEnd.toISOString()
      });
      if (selectedStore) params.append('store_id', selectedStore);

      const periodDays = Math.round((currentEnd - currentStart) / (1000 * 60 * 60 * 24));
      document.getElementById('periodLabel').textContent =
        `${currentStart.toLocaleDateString()} — ${currentEnd.toLocaleDateString()} (${periodDays} days)`;

      try {
        const res = await fetch(`/api/sales/overview?${params}`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        const c = data.current;
        const p = data.previous;

        document.getElementById('statNet').textContent = fmt(c.net);
        document.getElementById('statProfit').textContent = fmt(c.grossProfit);
        document.getElementById('statMargin').textContent = pct(c.margin);
        document.getElementById('statOrders').textContent = c.orders;
        document.getElementById('statAvg').textContent = fmt(c.avgTicket);
        document.getElementById('statRefunds').textContent = fmt(c.refunds);
        document.getElementById('statDiscounts').textContent = fmt(c.discounts);
        document.getElementById('changeDiscounts').textContent = p.discounts > 0 ? `${((c.discounts - p.discounts) / p.discounts * 100).toFixed(1)}% vs prev` : 'vs prev period';

        changeBadge('changeNet', c.net, p.net);
        changeBadge('changeProfit', c.grossProfit, p.grossProfit);
        changeBadge('changeMargin', c.margin, p.margin);
        changeBadge('changeOrders', c.orders, p.orders);
        changeBadge('changeAvg', c.avgTicket, p.avgTicket);

        const currentDays = Object.keys(data.chartData.current);
        const prevDays = Object.keys(data.chartData.previous);
        // Keys are ISO dates (YYYY-MM-DD) — sort chronologically, then format for display
        const allKeys = [...new Set([...currentDays, ...prevDays])].sort();
        const allLabels = allKeys.map(k => new Date(k + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
        const currentVals = allKeys.map(d => data.chartData.current[d] || 0);
        const prevVals = allKeys.map(d => data.chartData.previous[d] || 0);

        if (chart) chart.destroy();
        const ctx = document.getElementById('salesChart').getContext('2d');
        chart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: allLabels,
            datasets: [
              {
                label: 'Current Period',
                data: currentVals,
                borderColor: '#2f5597',
                backgroundColor: 'rgba(47,85,151,0.1)',
                borderWidth: 2,
                pointRadius: 4,
                fill: true,
                tension: 0.3
              },
              {
                label: 'Previous Period',
                data: prevVals,
                borderColor: '#aaa',
                backgroundColor: 'rgba(170,170,170,0.05)',
                borderWidth: 2,
                pointRadius: 4,
                borderDash: [5,5],
                fill: false,
                tension: 0.3
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: 'top' },
              tooltip: {
                callbacks: {
                  label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.parsed.y)}`
                }
              }
            },
            scales: {
              y: { ticks: { callback: val => '$' + val.toLocaleString() } }
            }
          }
        });

        if (isMultiStoreUser && !selectedStore) loadStoreBreakdown();

        if (!isMultiStoreUser || selectedStore) {
          loadItemPerformance();
        } else {
          document.getElementById('itemPerformance').innerHTML = 'Select a store above to view item performance.';
        }

      } catch (err) {
        console.error('Sales load error:', err);
      }
    }

    async function loadItemPerformance() {
      const el = document.getElementById('itemPerformance');
      el.className = 'loading';
      el.innerHTML = 'Loading...';

      const params = new URLSearchParams({
        start: currentStart.toISOString(),
        end: currentEnd.toISOString()
      });
      if (selectedStore) params.append('store_id', selectedStore);

      try {
        const res = await fetch(`/api/sales/item-performance?${params}`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) {
          el.className = '';
          el.innerHTML = '<div style="color:#999;font-size:13px">No item performance data for this store.</div>';
          return;
        }
        const data = await res.json();
        const categories = data.categories || [];

        if (!categories.length) {
          el.className = '';
          el.innerHTML = '<div style="color:#999;font-size:13px">No sales data for this period.</div>';
          return;
        }

        const renderRow = (g) => `
          <div class="perf-row">
            <div class="perf-row-name">${g.name}</div>
            <div class="perf-row-stats">${g.units % 1 === 0 ? g.units : g.units.toFixed(1)} sold &nbsp;•&nbsp; ${fmt(g.revenue)}</div>
          </div>`;

        el.className = '';
        el.innerHTML = categories.map(c => `
          <div class="perf-category">
            <div class="perf-category-title">${c.category}</div>
            <div class="perf-grid">
              <div>
                <div class="perf-col-label top">🔥 Top Sellers</div>
                ${c.top.length ? c.top.map(renderRow).join('') : '<div style="color:#bbb;font-size:12px">No data</div>'}
              </div>
              <div>
                <div class="perf-col-label bottom">📉 Lowest Sellers</div>
                ${c.bottom.length ? c.bottom.map(renderRow).join('') : '<div style="color:#bbb;font-size:12px">No data</div>'}
              </div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error('Item performance error:', err);
        el.className = '';
        el.innerHTML = '<div style="color:#c00;font-size:13px">Error loading item performance.</div>';
      }
    }

    async function loadStoreBreakdown() {
      const params = new URLSearchParams({
        start: currentStart.toISOString(),
        end: currentEnd.toISOString()
      });

      const res = await fetch(`/api/sales/by-store?${params}`, {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      const stores = data.stores || [];

      const grandNet = stores.reduce((a, s) => a + s.net, 0);
      const grandProfit = stores.reduce((a, s) => a + s.grossProfit, 0);
      const grandOrders = stores.reduce((a, s) => a + s.orders, 0);
      const grandMargin = grandNet > 0 ? grandProfit / grandNet : 0;

      document.getElementById('storeBreakdown').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Store</th>
              <th>Gross</th>
              <th>Discounts</th>
              <th>Tax</th>
              <th>Refunds</th>
              <th>Net Sales</th>
              <th>Orders</th>
              <th>Avg Ticket</th>
              <th>Cost</th>
              <th>Profit</th>
              <th>Margin</th>
            </tr>
          </thead>
          <tbody>
            ${stores.map(s => `
              <tr>
                <td><strong>${s.name}</strong></td>
                <td>${fmt(s.gross)}</td>
                <td>${fmt(-s.discounts)}</td>
                <td>${fmt(-s.tax)}</td>
                <td>${fmt(-s.refunds)}</td>
                <td>${fmt(s.net)}</td>
                <td>${s.orders}</td>
                <td>${fmt(s.avgTicket)}</td>
                <td>${fmt(s.totalCost)}</td>
                <td>${fmt(s.grossProfit)}</td>
                <td class="${s.margin >= 0.4 ? 'margin-good' : s.margin >= 0.2 ? 'margin-ok' : 'margin-bad'}">${pct(s.margin)}</td>
              </tr>
            `).join('')}
            <tr class="grand-total">
              <td>🌟 GRAND TOTAL</td>
              <td colspan="4"></td>
              <td>${fmt(grandNet)}</td>
              <td>${grandOrders}</td>
              <td>${fmt(grandOrders > 0 ? grandNet / grandOrders : 0)}</td>
              <td></td>
              <td>${fmt(grandProfit)}</td>
              <td class="${grandMargin >= 0.4 ? 'margin-good' : grandMargin >= 0.2 ? 'margin-ok' : 'margin-bad'}">${pct(grandMargin)}</td>
            </tr>
          </tbody>
        </table>`;
    }

    function buildWeekOptions(sel) {
      const now = new Date();
      const day = now.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      const thisMonday = new Date(now); thisMonday.setDate(now.getDate() + diff); thisMonday.setHours(0,0,0,0);
      let html = '';
      // 4 weeks ahead, 52 weeks back
      for (let i = -4; i <= 52; i++) {
        const mon = new Date(thisMonday); mon.setDate(thisMonday.getDate() - i * 7);
        const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
        const val = mon.toISOString().split('T')[0];
        const label = mon.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'})
                    + ' – ' + sun.toLocaleDateString('en-US', {month:'short',day:'numeric'});
        html += `<option value="${val}"${i === 0 ? ' selected' : ''}>${label}</option>`;
      }
      sel.innerHTML = html;
    }

    loadStoreFilter();
    setPeriod('daily', document.querySelector('.period-tab.active'));
    loadTrends('week');
  </script>
</div>
</body>
